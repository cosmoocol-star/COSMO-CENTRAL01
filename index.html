<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="COSMO Hub">
  <meta name="theme-color" content="#0a0f1a">
  <meta name="mobile-web-app-capable" content="yes">
<title>COSMO — Hub Cósmico</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

:root{
  --bg:#030508;
  --accent:#7c3aed;--accent2:#a855f7;
  --teal:#06b6d4;--teal2:#22d3ee;
  --gold:#f59e0b;--green:#22c55e;
  --red:#ef4444;--orange:#f97316;
  --text:#e2e8f0;--muted:#475569;
  --surface:rgba(12,18,32,0.95);
  --border:rgba(124,58,237,0.25);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  width:100vw;height:100vh;overflow:hidden;
  display:flex;flex-direction:column;
}

/* STARS BG */
#starfield{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* HEADER */
header{
  position:relative;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;
  border-bottom:1px solid rgba(124,58,237,0.15);
  background:rgba(3,5,8,0.9);
  flex-shrink:0;
}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:5px;background:linear-gradient(90deg,var(--accent2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:8px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;}
.hdate{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite;display:inline-block;margin-left:8px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* CANVAS AREA */
#cosmos{position:relative;flex:1;z-index:1;overflow:hidden;}

/* ORBIT RINGS */
.orbit-ring{
  position:absolute;border-radius:50%;border:1px solid rgba(124,58,237,0.1);
  pointer-events:none;transform:translate(-50%,-50%);
}

/* NUCLEUS */
#nucleus{
  position:absolute;transform:translate(-50%,-50%);
  cursor:pointer;z-index:10;
}
.nucleus-glow{
  position:absolute;inset:-30px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,0.25) 0%,transparent 70%);
  animation:nucleusPulse 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes nucleusPulse{0%,100%{transform:scale(1);opacity:0.7;}50%{transform:scale(1.15);opacity:1;}}
.nucleus-body{
  width:110px;height:110px;border-radius:50%;
  background:linear-gradient(135deg,#1a0a3e,#0c1a3a);
  border:2px solid rgba(168,85,247,0.5);
  box-shadow:0 0 30px rgba(124,58,237,0.4),0 0 60px rgba(124,58,237,0.15),inset 0 0 20px rgba(124,58,237,0.1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  transition:all 0.3s;position:relative;z-index:1;
}
.nucleus-body:hover{
  box-shadow:0 0 40px rgba(124,58,237,0.6),0 0 80px rgba(124,58,237,0.2),inset 0 0 30px rgba(124,58,237,0.15);
  border-color:rgba(168,85,247,0.8);
}
.nucleus-icon{font-size:28px;line-height:1;}
.nucleus-label{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;background:linear-gradient(90deg,var(--accent2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nucleus-sub{font-size:8px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}

/* ORBIT PARTICLES */
.orbit-particle{
  position:absolute;border-radius:50%;pointer-events:none;
  background:var(--accent2);opacity:0.6;
}

/* STAR NODES */
.star-node{
  position:absolute;transform:translate(-50%,-50%);
  cursor:pointer;z-index:10;
  transition:filter 0.3s;
}
.star-node:hover .star-body{transform:scale(1.12);}
.star-body{
  width:80px;height:80px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  transition:all 0.3s;position:relative;
  border:1.5px solid transparent;
}
.star-body::before{
  content:'';position:absolute;inset:-1px;border-radius:50%;
  background:inherit;filter:blur(8px);opacity:0.4;z-index:-1;
}
.sn-map .star-body{
  background:linear-gradient(135deg,#0a2040,#0c3060);
  border-color:rgba(6,182,212,0.5);
  box-shadow:0 0 20px rgba(6,182,212,0.25);
}
.sn-billing .star-body{
  background:linear-gradient(135deg,#1a0a00,#2a1500);
  border-color:rgba(245,158,11,0.5);
  box-shadow:0 0 20px rgba(245,158,11,0.25);
}
.sn-team .star-body{
  background:linear-gradient(135deg,#001a1a,#002a2a);
  border-color:rgba(34,197,94,0.5);
  box-shadow:0 0 20px rgba(34,197,94,0.25);
}
.sn-prod .star-body{
  background:linear-gradient(135deg,#1a1000,#2a2000);
  border-color:rgba(249,115,22,0.5);
  box-shadow:0 0 20px rgba(249,115,22,0.2);
}
.sn-content .star-body{
  background:linear-gradient(135deg,#1a0020,#2a0035);
  border-color:rgba(236,72,153,0.5);
  box-shadow:0 0 20px rgba(236,72,153,0.2);
}
.sn-goals .star-body{
  background:linear-gradient(135deg,#001520,#002030);
  border-color:rgba(56,189,248,0.5);
  box-shadow:0 0 20px rgba(56,189,248,0.2);
}
.sn-prod .star-label{color:#fb923c;}
.sn-content .star-label{color:#f472b6;}
.sn-goals .star-label{color:#38bdf8;}

/* Orbit 2 stars slightly smaller */
.orbit2-star .star-body{width:72px;height:72px;}
.orbit2-star .star-icon{font-size:19px;}
.orbit2-star .star-label{font-size:9px;}
.star-icon{font-size:22px;line-height:1;}
.star-label{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;text-align:center;line-height:1.2;}
.sn-map .star-label{color:var(--teal2);}
.sn-billing .star-label{color:var(--gold);}
.sn-team .star-label{color:var(--green);}
.sn-prod .star-body{background:linear-gradient(135deg,#1a0a1a,#2a1030);border-color:rgba(249,115,22,0.5);box-shadow:0 0 20px rgba(249,115,22,0.25);}
.sn-prod .star-label{color:var(--orange);}
.sn-content .star-body{background:linear-gradient(135deg,#0a1a2a,#0a2035);border-color:rgba(236,72,153,0.5);box-shadow:0 0 20px rgba(236,72,153,0.25);}
.sn-content .star-label{color:#f472b6;}
.sn-goals .star-body{background:linear-gradient(135deg,#1a1a00,#2a2a00);border-color:rgba(234,179,8,0.5);box-shadow:0 0 20px rgba(234,179,8,0.25);}
.sn-goals .star-label{color:#fde047;}
.orbit2-star .star-body{width:70px;height:70px;}
.orbit2-star .star-icon{font-size:18px;}
.orbit2-star .star-label{font-size:9px;}

/* SHIP NODES — Órbita 3 */
.ship-node{
  position:absolute;transform:translate(-50%,-50%);
  cursor:pointer;z-index:10;transition:filter 0.3s;
}
.ship-node:hover .ship-body{transform:scale(1.1);}
.ship-body{
  width:76px;height:76px;
  clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  transition:all 0.35s;position:relative;
}
.ship-body::after{
  content:'';position:absolute;inset:0;
  clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
  filter:blur(10px);opacity:0.5;z-index:-1;
  background:inherit;
}
/* Thruster glow animation */
.ship-body::before{
  content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  width:12px;height:14px;border-radius:0 0 50% 50%;
  animation:thruster 1.2s ease-in-out infinite alternate;
  z-index:-1;
}
@keyframes thruster{
  0%{opacity:0.4;transform:translateX(-50%) scaleY(0.6);}
  100%{opacity:0.9;transform:translateX(-50%) scaleY(1.3);}
}
.sn-ruta .ship-body{
  background:linear-gradient(160deg,#001535,#002560,#0040a0);
  border:1.5px solid rgba(56,189,248,0.6);
  box-shadow:0 0 24px rgba(56,189,248,0.3),inset 0 1px 0 rgba(56,189,248,0.2);
}
.sn-ruta .ship-body::before{background:rgba(56,189,248,0.6);}
.sn-ruta .ship-label{color:#38bdf8;}
.sn-inversiones .ship-body{
  background:linear-gradient(160deg,#1a1000,#2a1a00,#3a2500);
  border:1.5px solid rgba(251,191,36,0.7);
  box-shadow:0 0 24px rgba(251,191,36,0.35),inset 0 1px 0 rgba(251,191,36,0.2);
}
.sn-inversiones .ship-body::before{background:rgba(251,191,36,0.7);}
.sn-inversiones .ship-label{color:#fbbf24;}
.sn-verificacion .ship-body{
  background:linear-gradient(160deg,#001a10,#002a18,#003a22);
  border:1.5px solid rgba(52,211,153,0.7);
  box-shadow:0 0 24px rgba(52,211,153,0.35),inset 0 1px 0 rgba(52,211,153,0.2);
}
.sn-verificacion .ship-body::before{background:rgba(52,211,153,0.7);}
.sn-verificacion .ship-label{color:#34d399;}
.ship-icon{font-size:20px;line-height:1;}
.ship-label{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:2px;text-align:center;line-height:1.2;}

/* CONNECTION LINES */
#connections{position:absolute;inset:0;pointer-events:none;z-index:2;}

/* PANEL */
#panel-overlay{
  position:fixed;inset:0;z-index:50;
  display:none;align-items:center;justify-content:center;
  background:rgba(3,5,8,0.75);backdrop-filter:blur(12px);
}
#panel-overlay.show{display:flex;}
.panel-box{
  background:rgba(10,14,26,0.98);
  border:1px solid var(--border);
  border-radius:18px;
  width:min(680px,92vw);max-height:85vh;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 0 60px rgba(124,58,237,0.2);
  animation:panelIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes panelIn{from{opacity:0;transform:scale(0.88) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;
}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;}
.panel-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px;transition:color 0.2s;line-height:1;}
.panel-close:hover{color:var(--text);}
.panel-body{padding:18px 20px;overflow-y:auto;flex:1;}
.panel-body::-webkit-scrollbar{width:3px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ===== NUCLEUS PANEL ===== */
.north-star-panel{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;background:rgba(124,58,237,0.06);border:1px solid rgba(124,58,237,0.2);border-radius:12px;padding:18px 20px;margin-bottom:14px;position:relative;overflow:hidden;}
.north-star-panel::before{content:'★';position:absolute;right:120px;top:-15px;font-size:130px;opacity:0.03;color:var(--gold);pointer-events:none;}
.nsp-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:4px;}
.nsp-title{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1.1;margin-bottom:6px;}
.nsp-title span{color:var(--gold);}
.nsp-desc{font-size:11px;color:var(--muted);line-height:1.6;}
.nsp-metrics{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.nsp-m{text-align:right;}
.nsp-val{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;}
.nsp-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.status-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;text-align:center;}
.sc-val{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;}
.sc-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}

.prog-row{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;}
.prog-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:6px;}
.prog-track{height:7px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--teal));position:relative;}
.prog-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;background:#fff;border-radius:2px;box-shadow:0 0 8px var(--teal);}

/* ===== BILLING PANEL ===== */
.bill-top{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.bill-card-p{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.bill-card-p::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.bcp-current::before{background:linear-gradient(90deg,var(--accent),var(--teal));}
.bcp-target::before{background:linear-gradient(90deg,var(--gold),var(--orange));}
.bc-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:5px;}
.bc-val{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;}
.bc-sub{font-size:10px;color:var(--muted);margin-top:3px;}
.bc-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:600;margin-top:5px;}
.bcb-ok{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.bcb-warn{background:rgba(245,158,11,0.15);color:var(--gold);border:1px solid rgba(245,158,11,0.3);}

.channels-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.ch-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:9px;padding:9px 12px;}
.ch-icon-s{font-size:16px;width:24px;text-align:center;}
.ch-info{flex:1;}
.ch-name-s{font-size:11px;font-weight:500;}
.ch-amt{font-size:10px;color:var(--muted);}
.ch-pct-s{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;}
.ch-bar-wrap{width:80px;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;}
.ch-bar-fill{height:100%;border-radius:2px;}

.monthly-hist{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:12px 14px;}
.mh-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
.mh-bars{display:flex;align-items:flex-end;gap:6px;height:56px;}
.mhb-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.mhb{width:100%;border-radius:3px 3px 0 0;min-height:2px;cursor:pointer;position:relative;}
.mhb:hover::after{content:attr(data-v);position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);background:rgba(12,18,32,0.97);border:1px solid var(--border);border-radius:4px;padding:2px 5px;font-size:9px;white-space:nowrap;z-index:5;}
.mhb-lbl{font-size:8px;color:var(--muted);}

/* ===== TEAM PANEL ===== */
.team-cards-p{display:flex;flex-direction:column;gap:10px;}
.tc{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;}
.tc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.tc-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;flex-shrink:0;}
.av-d2{background:linear-gradient(135deg,var(--accent),var(--accent2));}
.av-k2{background:linear-gradient(135deg,var(--teal),#0891b2);}
.av-h2{background:linear-gradient(135deg,#374151,#6b7280);}
.tc-name{font-weight:600;font-size:13px;}
.tc-role{font-size:10px;color:var(--muted);}
.tc-badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:9px;margin-bottom:8px;}
.tb-ceo2{background:rgba(124,58,237,0.18);color:var(--accent2);border:1px solid rgba(124,58,237,0.3);}
.tb-ops2{background:rgba(6,182,212,0.15);color:var(--teal);border:1px solid rgba(6,182,212,0.3);}
.tb-prod2{background:rgba(100,116,139,0.2);color:#94a3b8;border:1px solid rgba(100,116,139,0.3);}
.tc-funcs{display:flex;flex-wrap:wrap;gap:4px;}
.tfunc-tag{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:2px 7px;font-size:10px;color:var(--muted);}
.tc-focus{margin-top:9px;padding:7px 9px;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.15);border-radius:7px;font-size:10px;}
.tc-focus-lbl{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:2px;}
.tc-focus-val{color:var(--gold);font-style:italic;}
.tc-next-hire{margin-top:9px;padding:8px 10px;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.2);border-radius:8px;font-size:10px;color:var(--muted);}
.tc-next-hire strong{color:var(--green);}

/* SHARED */
.sec-lbl{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:9px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.05);}

#notif{position:fixed;bottom:18px;right:18px;background:rgba(12,18,32,0.97);border:1px solid var(--border);border-radius:9px;padding:8px 14px;font-size:11px;z-index:200;opacity:0;transform:translateY(8px);transition:all 0.3s;pointer-events:none;}
#notif.show{opacity:1;transform:translateY(0);}

/* ─── MISSION SIDEBAR ─── */
/* ─── SIDEBAR ─── */
#mission-sidebar{
  position:fixed;
  left:0;top:0;bottom:0;
  width:260px;
  background:rgba(7,10,24,0.97);
  border-right:1px solid rgba(124,58,237,0.18);
  backdrop-filter:blur(20px);
  z-index:50;
  display:flex;
  flex-direction:column;
  height:100vh;
  transform:translateX(-260px);
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
  overflow:visible;
}
#mission-sidebar.pinned{
  transform:translateX(0);
  box-shadow:4px 0 30px rgba(124,58,237,0.15);
}
#sidebar-tab{
  position:fixed;
  left:0;
  top:50%;
  transform:translateY(-50%);
  width:36px;
  background:rgba(124,58,237,0.35);
  border:1px solid rgba(124,58,237,0.5);
  border-left:none;
  border-radius:0 12px 12px 0;
  padding:24px 8px;
  cursor:pointer;
  writing-mode:vertical-rl;
  font-size:9px;
  letter-spacing:2px;
  color:#c084fc;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  z-index:200;
  box-shadow:4px 0 16px rgba(124,58,237,0.25);
  transition:left 0.3s cubic-bezier(0.4,0,0.2,1), background 0.2s;
}
#sidebar-tab:hover{
  background:rgba(124,58,237,0.55);
}
#mission-sidebar.pinned ~ #sidebar-tab,
body.sb-open #sidebar-tab{
  left:260px;
}
#sidebar-header{
  padding:16px 14px 10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  flex-shrink:0;
}
#sidebar-missions{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:10px;
  scrollbar-width:thin;
  scrollbar-color:rgba(124,58,237,0.3) transparent;
  min-height:0;
}
.smission{
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;
  padding:9px 10px;

// ─── FIREBASE SYNC LAYER ──────────────────────────────────────────────────────
const HUB_FB_CONFIG = {
  apiKey: "AIzaSyDnOYVdYsve9H7jj8hxmaB1blyilc4RaIU",
  authDomain: "cosmo-98107.firebaseapp.com",
  projectId: "cosmo-98107",
  storageBucket: "cosmo-98107.firebasestorage.app",
  messagingSenderId: "748680846493",
  appId: "1:748680846493:web:1d6f8b2a3bc494c555c874"
};

// Keys to sync with Firebase (skip UI state keys)
const HUB_SYNC_KEYS = ['cosmo_metas2026', 'cosmo_missions', 'cosmo_inversiones', 'cosmo_team', 'cosmo_prod_meta', 'cosmo_embajadores', 'cosmo_ideas', 'cosmo_canales', 'cg_gastos', 'cg_ingresos', 'cg_tags', 'cg_itags'];

let _hubDb = null, _hubDoc, _hubGetDoc, _hubSetDoc;
let _hubSaveTimers = {};

async function hubInitFirebase(){
  try{
    const {initializeApp, getApps, getApp} = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const {getFirestore, doc, getDoc, setDoc} = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
    const existing = getApps().find(a => a.name === 'cosmo-hub-app');
    const app = existing ? getApp('cosmo-hub-app') : initializeApp(HUB_FB_CONFIG, 'cosmo-hub-app');
    _hubDb = getFirestore(app);
    _hubDoc = doc; _hubGetDoc = getDoc; _hubSetDoc = setDoc;
  } catch(e){ console.warn('Hub Firebase init error:', e); }
}

function hubFbSave(key, value){
  if(!_hubDb) return;
  clearTimeout(_hubSaveTimers[key]);
  _hubSaveTimers[key] = setTimeout(async () => {
    try{
      await _hubSetDoc(_hubDoc(_hubDb, 'cosmo-hub', key), { data: value });
    } catch(e){ console.warn('Hub fbSave error:', e); }
  }, 1000);
}

async function hubFbLoad(key){
  if(!_hubDb) return null;
  try{
    const snap = await _hubGetDoc(_hubDoc(_hubDb, 'cosmo-hub', key));
    if(snap.exists()) return snap.data().data;
  } catch(e){ console.warn('Hub fbLoad error:', e); }
  return null;
}

// Override localStorage to intercept writes and sync to Firebase
const _origSetItem = localStorage.setItem.bind(localStorage);
const _origGetItem = localStorage.getItem.bind(localStorage);

localStorage.setItem = function(key, value){
  _origSetItem(key, value);
  // Only sync data keys, not UI state
  if(HUB_SYNC_KEYS.some(k => key === k || key.startsWith(k))){
    hubFbSave(key, value);
  }
};

// Boot: load Firebase data into localStorage before modules init
async function hubBoot(){
  const bar = document.getElementById('hub-boot-bar');
  const msg = document.getElementById('hub-boot-msg');

  if(bar) bar.style.width = '20%';
  await hubInitFirebase();
  if(bar) bar.style.width = '50%';
  if(msg) msg.textContent = 'Cargando datos...';

  if(_hubDb){
    // Load all sync keys from Firebase in parallel
    const entries = await Promise.all(
      HUB_SYNC_KEYS.map(async key => {
        const val = await hubFbLoad(key);
        return [key, val];
      })
    );
    // Populate localStorage with Firebase data (overrides local)
    entries.forEach(([key, val]) => {
      if(val !== null && val !== undefined){
        _origSetItem(key, val); // use original to avoid re-triggering save
      }
    });
    if(msg) msg.textContent = '✅ Sincronizado';
  } else {
    if(msg) msg.textContent = '⚠️ Sin conexión — usando datos locales';
  }

  if(bar) bar.style.width = '100%';
  // Fade out overlay
  setTimeout(() => {
    const overlay = document.getElementById('hub-boot-overlay');
    if(overlay){
      overlay.style.transition = 'opacity 0.4s';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 400);
    }
  }, 400);
}

// Run boot — store promise so main script can await it
window._hubBootPromise = hubBoot();

// ─── PANEL FUNCTIONS (available immediately) ───

function openPanel(id){
  const p = PANELS[id]; if(!p) return;

  document.getElementById('panel-overlay').classList.add('show');
  // Init dynamic panels
  if(id==='prod') initProd();
  if(id==='content') initContent();
  if(id==='goals') initGoals();
  if(id==='team') initTeam();
  if(id==='billing') initGastos();
  if(id==='ruta') setTimeout(initRuta, 50);
  if(id==='inversiones') setTimeout(initInversiones, 50);
  if(id==='verificacion') setTimeout(initVerificacion, 50);
}
function closePanel(){ document.getElementById('panel-overlay').classList.remove('show'); }
function handleOverlayClick(e){ if(e.target===document.getElementById('panel-overlay')) closePanel(); }

// ─── KEYBOARD ───
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePanel(); });

// Init alert badge on load
setTimeout(function(){ if(typeof updateProdBadge!=="undefined") updateProdBadge(); }, 1500);

</script>

const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];
function initStars(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({length:180},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    r:Math.random()*1.2+0.2, o:Math.random()*0.6+0.1,
    s:Math.random()*0.003+0.001
  }));
}
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    s.o += s.s; if(s.o>0.8||s.o<0.1) s.s*=-1;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,210,255,${s.o})`; ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
initStars(); drawStars();
window.addEventListener('resize',()=>{ initStars(); });

// ─── LAYOUT ───

function getCosmos(){ return document.getElementById('cosmos'); }
function center(){
  const el = getCosmos();
  return { x: el.offsetWidth/2, y: el.offsetHeight/2 };
}

function positionNodes(){
  const cosmos = getCosmos();
  const W = cosmos.offsetWidth, H = cosmos.offsetHeight;
  if(!W || !H) return; // not painted yet, skip
  const {x,y} = center();
  // Organic planetary layout — no perfect symmetry
  const S = Math.min(W, H);
  const R1 = Math.min(S * 0.22, 130);
  const R2 = Math.min(S * 0.40, 230);

  // Nucleus
  document.getElementById('nucleus').style.left = x+'px';
  document.getElementById('nucleus').style.top  = y+'px';

  // Rings — subtle guides
  ['orbit1','orbit2','orbit3'].forEach((id,i)=>{
    const R = [R1, R2, R2][i]*2;
    const el = document.getElementById(id);
    el.style.width  = R+'px'; el.style.height = R+'px';
    el.style.left   = x+'px'; el.style.top    = y+'px';
    if(id==='orbit3') el.style.opacity='0';
  });

  // Inner orbit — 3 nodes, irregular angles (not 120° apart)
  const orbit1Nodes = [
    {id:'sn-map',     angle: -78, r: R1 * 1.0},
    {id:'sn-billing', angle:  42, r: R1 * 0.95},
    {id:'sn-team',    angle: 162, r: R1 * 1.05},
  ];
  // Outer orbit — 4 nodes, spread unevenly like real planets
  const orbit2Nodes = [
    {id:'sn-prod',        angle: -15,  r: R2 * 1.0},
    {id:'sn-ruta',        angle: 105,  r: R2 * 0.92},
    {id:'sn-content',     angle: 195,  r: R2 * 1.05},
    {id:'sn-inversiones', angle:-110,  r: R2 * 0.97},
    {id:'sn-verificacion',angle:  60,  r: R2 * 1.02},
  ];
  const orbit3Ships = [];
  const allNodes = [...orbit1Nodes, ...orbit2Nodes];

  allNodes.forEach(({id,angle,r})=>{
    const rad = angle * Math.PI/180;
    const el = document.getElementById(id);
    el.style.left = (x + r*Math.cos(rad))+'px';
    el.style.top  = (y + r*Math.sin(rad))+'px';

  });

  // SVG connections
  const svg = document.getElementById('connections');
  svg.setAttribute('width', W); svg.setAttribute('height', H);
  svg.innerHTML = '';
  allNodes.forEach(({id,angle,r})=>{
    const rad = angle*Math.PI/180;
    const nx = x + r*Math.cos(rad), ny = y + r*Math.sin(rad);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x); line.setAttribute('y1',y);
    line.setAttribute('x2',nx); line.setAttribute('y2',ny);
    line.setAttribute('stroke', r===R1 ? 'rgba(124,58,237,0.18)' : 'rgba(100,100,180,0.1)');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('stroke-dasharray', r===R1 ? '4 6' : '3 7');
    svg.appendChild(line);
  });
}
// Defer until layout is fully painted
function safePositionNodes(){
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      positionNodes();
    }, 60);
  });
}
safePositionNodes();

      var pc=PRIORIDAD_COLOR[meta.prioridad]||'#94a3b8';
      var ec=ESTADO_COLOR[meta.estado];
      var eb=ESTADO_BG[meta.estado];
      var locked=!desbloqueada;
      var isEdit=editingIdx===idx;
      var isExpand=expandedIdx===idx;

      // Count etapas with missions
      var ms=getMissions();
      var etapasActivas=meta.etapas?meta.etapas.filter(function(e){
        return e.estado==='En progreso'||e.estado==='Completado';
      }).length:0;
      var totalEtapas=meta.etapas?meta.etapas.length:0;

      h+='<div draggable="'+(editingIdx===null&&expandedIdx===null?'true':'false')+'" data-idx="'+idx+'" ';
      h+='ondragstart="window._rutaDragStart(event,'+idx+')" ';
      h+='ondragover="window._rutaDragOver(event)" ';
      h+='ondrop="window._rutaDrop(event,'+idx+')" ';
      h+='ondragend="window._rutaDragEnd()" ';
      h+='style="background:'+(isEdit||isExpand?'rgba(255,255,255,0.04)':'rgba(255,255,255,0.02)')+';';
      h+='border:1px solid '+(isEdit?'rgba(168,85,247,0.35)':isExpand?pc+'33':(locked?'rgba(255,255,255,0.03)':'rgba(255,255,255,0.07)'))+';';
      h+='border-radius:12px;padding:11px;position:relative;overflow:hidden;';
      h+='opacity:'+(locked?'0.45':'1')+';transition:all 0.2s;cursor:'+(editingIdx===null&&expandedIdx===null?'grab':'default')+'">';

      // Top stripe
      h+='<div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,'+pc+',transparent);"></div>';

      // Action buttons top-right
      h+='<div style="position:absolute;top:7px;right:7px;display:flex;gap:4px;align-items:center;">';
      if(locked) h+='<span style="font-size:10px;">🔒</span>';
      // Etapas button
      h+='<button onclick="window._rutaToggleEtapas('+idx+')" title="Ver etapas" ';
      h+='style="background:'+(isExpand?pc+'22':'none')+';border:1px solid '+(isExpand?pc+'44':'transparent')+';border-radius:6px;color:'+(isExpand?pc:'#334155')+';cursor:pointer;font-size:10px;padding:1px 5px;line-height:1.6;transition:all 0.15s;" ';
      h+='onmouseover="this.style.color=\''+pc+'\'" onmouseout="this.style.color=\''+(isExpand?pc:'#334155')+'\'">📋'+(totalEtapas>0?' '+totalEtapas:'')+'</button>';
      // Edit button
      h+='<button onclick="window._rutaEditCard('+idx+')" title="Editar" ';
      h+='style="background:'+(isEdit?'rgba(168,85,247,0.2)':'none')+';border:1px solid '+(isEdit?'rgba(168,85,247,0.4)':'transparent')+';border-radius:6px;color:'+(isEdit?'#a855f7':'#334155')+';cursor:pointer;font-size:10px;padding:1px 5px;line-height:1.6;transition:all 0.15s;" ';
      h+='onmouseover="this.style.color=\'#a855f7\'" onmouseout="this.style.color=\''+(isEdit?'#a855f7':'#334155')+'\'">⚙️</button>';
      h+='</div>';

      // Content
      h+='<div style="display:flex;align-items:flex-start;gap:7px;margin-bottom:7px;padding-right:55px;">';
      h+='<span style="font-size:17px;flex-shrink:0;">'+meta.icon+'</span>';
      h+='<div>';
      h+='<div style="font-size:7px;text-transform:uppercase;letter-spacing:1.5px;color:'+pc+';margin-bottom:1px;">'+meta.prioridad+'</div>';
      h+='<div style="font-size:11px;font-weight:700;color:#e2e8f0;line-height:1.3;">'+meta.titulo+'</div>';
      h+='</div></div>';

      h+='<div style="font-size:9px;color:#475569;line-height:1.6;margin-bottom:9px;">'+meta.desc+'</div>';

      // Bottom row: estado + etapas mini progress
      h+='<div style="display:flex;align-items:center;justify-content:space-between;gap:6px;">';

      if(!locked){
        h+='<button onclick="window._rutaNextEstado('+idx+')" ';
        h+='style="background:'+eb+';border:1px solid '+ec+'44;border-radius:20px;color:'+ec+';';
        h+='font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;';
        h+='padding:3px 9px;cursor:pointer;transition:filter 0.15s;" ';
        h+='onmouseover="this.style.filter=\'brightness(1.3)\'" onmouseout="this.style.filter=\'none\'">'+meta.estado+' ›</button>';
      } else {
        var depNames=meta.requiere.map(function(rid){
          var d=metas.find(function(m){return m.id===rid;});
          return d?d.icon:'';
        }).filter(Boolean).join(' ');
        h+='<div style="font-size:8px;color:#334155;">🔒 Espera '+depNames+'</div>';
      }

      // Etapas mini bar
      if(totalEtapas>0){
        h+='<div style="display:flex;align-items:center;gap:4px;">';
        h+='<div style="font-size:8px;color:#334155;">'+etapasActivas+'/'+totalEtapas+'</div>';
        h+='<div style="width:32px;height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;">';
        h+='<div style="height:100%;width:'+(totalEtapas>0?Math.round(etapasActivas/totalEtapas*100):0)+'%;background:'+pc+';border-radius:2px;"></div>';
        h+='</div></div>';
      }

      h+='</div>';
      h+='</div>';
    });

    h+='</div>';

    // Leyenda
    h+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.04);align-items:center;">';
    ['Alta','Media','Estratégico'].forEach(function(p){
      var pc=PRIORIDAD_COLOR[p];
      h+='<div style="display:flex;align-items:center;gap:4px;">';
      h+='<div style="width:7px;height:7px;border-radius:50%;background:'+pc+'33;border:1px solid '+pc+'66;"></div>';
      h+='<span style="font-size:8px;color:#334155;">'+p+'</span></div>';
    });
    h+='<div style="margin-left:auto;font-size:8px;color:#1e293b;">↕ arrastra · 📋 etapas · ⚙️ edita</div>';
    h+='</div>';

    el.innerHTML=h;
  }

  // ── Etapas handlers ──
  window._rutaToggleEtapas=function(idx){
    if(expandedIdx===idx){ expandedIdx=null; }
    else { expandedIdx=idx; editingIdx=null; }
    render();
    if(expandedIdx!==null){
      var p=document.getElementById('ruta-etapas-panel');
      if(p) setTimeout(function(){ p.scrollIntoView({behavior:'smooth',block:'nearest'}); },50);
    }
  };

  window._etapaAdd=function(idx){
    var inp=document.getElementById('nueva-etapa-txt');
    if(!inp) return;
    var txt=inp.value.trim(); if(!txt) return;
    if(!metas[idx].etapas) metas[idx].etapas=[];
    metas[idx].etapas.push({
      eid:'eta_'+Date.now(),
      titulo:txt,
      estado:'Por iniciar'
    });
    save(); render();
    // Re-focus input
    setTimeout(function(){
      var ni=document.getElementById('nueva-etapa-txt');
      if(ni) ni.focus();
    },50);
  };

  window._etapaNextEstado=function(mi,ei){
    var eta=metas[mi].etapas[ei];
    var prev=eta.estado;
    var i=ESTADOS.indexOf(eta.estado);
    eta.estado=ESTADOS[(i+1)%ESTADOS.length];

    // If transitioning TO "En progreso" or "Completado" → push to missions
    if((eta.estado==='En progreso'||eta.estado==='Completado')&&
       (prev==='Por iniciar'||prev==='Pausado')){
      pushEtapaToMissions(metas[mi], eta);
    }
    // If going back to Por iniciar → remove empty mission
    if(eta.estado==='Por iniciar'){
      removeEtapaFromMissions(eta.eid);
    }

    save(); render();
  };

  window._etapaEditTitulo=function(mi,ei,val){
    val=val.trim();
    if(!val) return;
    metas[mi].etapas[ei].titulo=val;
    save();
    var ms=getMissions();
    var m=ms.find(function(mx){ return mx.fromEtapa===metas[mi].etapas[ei].eid; });
    if(m){ m.title=metas[mi].icon+' '+val; saveMissions(ms); }
  };

  window._etapaDel=function(mi,ei){
    var eta=metas[mi].etapas[ei];
    removeEtapaFromMissions(eta.eid);
    metas[mi].etapas.splice(ei,1);
    save(); render();
  };

  // ── Edit handlers ──
  window._rutaEditCard=function(idx){
    editingIdx=(editingIdx===idx)?null:idx;
    if(editingIdx!==null) expandedIdx=null;
    render();
    if(editingIdx!==null){
      var p=document.getElementById('ruta-edit-panel');
      if(p) setTimeout(function(){ p.scrollIntoView({behavior:'smooth',block:'nearest'}); },50);
    }
  };
  window._rutaCerrarEdit=function(){ editingIdx=null; render(); };
  window._rutaCerrarEtapas=function(){ expandedIdx=null; render(); };

  window._rutaSetPrio=function(p){
    if(editingIdx===null) return;
    metas[editingIdx].prioridad=p; render();
  };
  window._rutaSetEstadoEdit=function(e){
    if(editingIdx===null) return;
    metas[editingIdx].estado=e; render();
  };
  window._rutaToggleDep=function(oid){
    if(editingIdx===null) return;
    var req=metas[editingIdx].requiere||[];
    var i=req.indexOf(oid);
    if(i===-1) req.push(oid); else req.splice(i,1);
    metas[editingIdx].requiere=req; render();
  };
  window._rutaGuardarEdit=function(){
    if(editingIdx===null) return;
    var m=metas[editingIdx];
    var ti=document.getElementById('re-icon'); if(ti) m.icon=ti.value.trim()||m.icon;
    var tt=document.getElementById('re-titulo'); if(tt) m.titulo=tt.value.trim()||m.titulo;
    var td=document.getElementById('re-desc'); if(td) m.desc=td.value.trim()||m.desc;
    save(); editingIdx=null; render();
  };

  window._rutaNextEstado=function(idx){
    var m=metas[idx];
    var i=ESTADOS.indexOf(m.estado);
    m.estado=ESTADOS[(i+1)%ESTADOS.length];
    save(); render();
  };

  window._rutaDragStart=function(e,idx){
    if(editingIdx!==null||expandedIdx!==null) return;
    dragSrc=idx; e.dataTransfer.effectAllowed='move';
    e.currentTarget.style.opacity='0.3';
  };
  window._rutaDragOver=function(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; };
  window._rutaDrop=function(e,idx){
    e.preventDefault();
    if(dragSrc===null||dragSrc===idx) return;
    var tmp=metas[dragSrc]; metas.splice(dragSrc,1); metas.splice(idx,0,tmp);
    dragSrc=null; save(); render();
  };
  window._rutaDragEnd=function(){ dragSrc=null; render(); };
  window._rutaRender=render;

  render();
}

// ─── INVERSIONES ───
function initInversiones(){
  var el=document.getElementById('inversiones-root'); if(!el) return;
  var ESTADOS=['Planeada','En evaluación','Aprobada','Ejecutada','Pausada'];
  var COLORES={'Planeada':'#475569','En evaluación':'#f59e0b','Aprobada':'#38bdf8','Ejecutada':'#22c55e','Pausada':'#ef4444'};
  var data=JSON.parse(localStorage.getItem('cosmo_inversiones')||'[]');
  function save(){ localStorage.setItem('cosmo_inversiones',JSON.stringify(data)); }
  function fmtM(n){ if(!n) return '$0'; if(n>=1000000) return '$'+(n/1000000).toFixed(1)+'M'; if(n>=1000) return '$'+(n/1000).toFixed(0)+'k'; return '$'+n; }
  function render(){
    var h='';
    // Summary
    var total=data.reduce(function(s,i){return s+(parseFloat(i.monto)||0);},0);
    var ejecutadas=data.filter(function(i){return i.estado==='Ejecutada';}).reduce(function(s,i){return s+(parseFloat(i.monto)||0);},0);
    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">';
    h+='<div style="background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.15);border-radius:10px;padding:10px;text-align:center;">';
    h+='<div style="font-size:8px;color:#475569;margin-bottom:3px;">Total planeado</div>';
    h+='<div style="font-size:14px;font-weight:700;color:#fbbf24;font-family:Space Mono,monospace;">'+fmtM(total)+'</div></div>';
    h+='<div style="background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);border-radius:10px;padding:10px;text-align:center;">';
    h+='<div style="font-size:8px;color:#475569;margin-bottom:3px;">Ejecutado</div>';
    h+='<div style="font-size:14px;font-weight:700;color:#22c55e;font-family:Space Mono,monospace;">'+fmtM(ejecutadas)+'</div></div>';
    h+='<div style="background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.15);border-radius:10px;padding:10px;text-align:center;">';
    h+='<div style="font-size:8px;color:#475569;margin-bottom:3px;">Inversiones</div>';
    h+='<div style="font-size:14px;font-weight:700;color:#38bdf8;font-family:Space Mono,monospace;">'+data.length+'</div></div>';
    h+='</div>';
    // List
    if(data.length){
      data.forEach(function(inv,i){
        var col=COLORES[inv.estado]||'#475569';
        h+='<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px;margin-bottom:8px;">';
        h+='<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;">';
        h+='<div style="flex:1;">';
        h+='<div style="font-size:12px;font-weight:700;color:#e2e8f0;margin-bottom:3px;">'+inv.nombre+'</div>';
        h+='<div style="font-size:18px;font-weight:700;color:#fbbf24;font-family:Space Mono,monospace;">'+fmtM(inv.monto)+'</div>';
        h+='</div>';
        h+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">';
        h+='<span style="padding:3px 8px;border-radius:20px;font-size:8px;font-weight:700;background:'+col+'22;border:1px solid '+col+'44;color:'+col+';">'+inv.estado+'</span>';
        h+='<button data-ii="'+i+'" onclick="window._invDel(this.dataset.ii)" style="background:none;border:none;color:#334155;cursor:pointer;font-size:10px;">✕</button>';
        h+='</div></div>';
        if(inv.descripcion){
          h+='<div style="font-size:10px;color:#475569;margin-bottom:8px;">'+inv.descripcion+'</div>';
        }
        // Estado selector
        h+='<div style="display:flex;gap:4px;flex-wrap:wrap;">';
        ESTADOS.forEach(function(est){
          var act=inv.estado===est;
          h+='<button data-ii="'+i+'" data-est="'+est+'" onclick="window._invEstado(this.dataset.ii,this.dataset.est)" style="padding:2px 8px;border-radius:12px;font-size:8px;cursor:pointer;border:1px solid '+(act?COLORES[est]:'rgba(255,255,255,0.08)')+';background:'+(act?COLORES[est]+'22':'transparent')+';color:'+(act?COLORES[est]:'#334155')+';">'+est+'</button>';
        });
        h+='</div>';
        h+='</div>';
      });
    } else {
      h+='<div style="text-align:center;padding:24px 0;color:#334155;font-size:11px;">Sin inversiones registradas</div>';
    }
    // Form
    h+='<div style="background:rgba(251,191,36,0.04);border:1px solid rgba(251,191,36,0.15);border-radius:12px;padding:14px;margin-top:8px;">';
    h+='<div style="font-size:9px;font-weight:700;color:#fbbf24;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">+ Nueva inversión</div>';
    h+='<div style="display:grid;gap:8px;">';
    h+='<input id="inv-nombre" placeholder="Nombre (ej. Máquina UV, Local, Inventario)" style="width:100%;background:#0a0f1e;border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:7px 10px;color:#e2e8f0;font-size:11px;outline:none;box-sizing:border-box;">';
    h+='<input id="inv-monto" type="number" placeholder="Monto $" style="width:100%;background:#0a0f1e;border:1px solid rgba(251,191,36,0.25);border-radius:7px;padding:7px 10px;color:#fbbf24;font-size:11px;outline:none;box-sizing:border-box;">';
    h+='<textarea id="inv-desc" placeholder="Descripción o justificación (opcional)" style="width:100%;background:#0a0f1e;border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:7px 10px;color:#94a3b8;font-size:10px;outline:none;box-sizing:border-box;resize:none;height:52px;"></textarea>';
    h+='<button onclick="window._invAdd()" style="width:100%;padding:9px;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.35);border-radius:8px;color:#fbbf24;font-size:11px;font-weight:700;cursor:pointer;">💾 Registrar inversión</button>';
    h+='</div></div>';
    el.innerHTML=h;
  }
  window._invAdd=function(){
    var nombre=(document.getElementById('inv-nombre')||{}).value||'';
    var monto=parseFloat((document.getElementById('inv-monto')||{}).value)||0;
    var desc=(document.getElementById('inv-desc')||{}).value||'';
    if(!nombre||!monto) return;
    data.push({id:Date.now().toString(),nombre:nombre,monto:monto,descripcion:desc,estado:'Planeada'});
    save(); render();
  };
  window._invDel=function(i){ data.splice(i,1); save(); render(); };
  window._invEstado=function(i,est){ data[i].estado=est; save(); render(); };
  render();
}

  const AREAS_DEFAULT = { areas:['Ejecución','Creatividad','Comunicación','Técnica','Organización','Iniciativa'], icons:['⚡','🎨','💬','🔧','📋','🚀'], colors:['#06b6d4','#f472b6','#22c55e','#f97316','#a855f7','#f59e0b'] };

  // Mission affinity map — which radar axis matters most per mission type
  const MISSION_AFFINITY = {
    'Marca Aliada':   { role:'COO', axis:2, label:'Aliadas' },

  };

  function getAxes(m){
    const primaryRole = (m.roleTags||[])[0]||'';
    return AREAS_BY_ROLE[primaryRole] || AREAS_DEFAULT;
  }

  const AREAS = ['Ejecución','Inteligencia','Creatividad','Comunicación','Técnica','Liderazgo'];
  const AREA_ICONS = ['⚡','🧠','🎨','💬','🔧','🔥'];
  const AREA_COLORS = ['#06b6d4','#a855f7','#f472b6','#22c55e','#f97316','#f59e0b'];

  function buildRadar(stats, mi){
    const size = 140, cx = size/2, cy = size/2, r = 48;
    const axes = getAxes(members[mi]||{});
    const AICONS = axes.icons;
    const ACOLORS = axes.colors;
    const n = axes.areas.length;
    // Hexagon points at each angle
    function pt(i, val){
      const angle = (Math.PI*2/n)*i - Math.PI/2;
      const rv = r * (val/100);
      return [cx + rv*Math.cos(angle), cy + rv*Math.sin(angle)];
    }
    function ptOuter(i){
      const angle = (Math.PI*2/n)*i - Math.PI/2;
      return [cx + r*Math.cos(angle), cy + r*Math.sin(angle)];
    }
    // Background hex rings
    let bgHexes = '';
    [0.25,0.5,0.75,1].forEach(function(scale){
      const pts = AREAS.map(function(_,i){
        const angle = (Math.PI*2/n)*i - Math.PI/2;
        return (cx+r*scale*Math.cos(angle))+','+(cy+r*scale*Math.sin(angle));
      }).join(' ');
      bgHexes += '<polygon points="'+pts+'" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>';
    });
    // Axis lines
    let axisLines = '';
    axes.areas.forEach(function(_,i){
      const op = ptOuter(i);
      axisLines += '<line x1="'+cx+'" y1="'+cy+'" x2="'+op[0]+'" y2="'+op[1]+'" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>';
    });
    // Stat polygon
    const statPts = stats.map(function(v,i){ const p=pt(i,v); return p[0]+','+p[1]; }).join(' ');
    const avgStat = stats.reduce(function(a,b){return a+b;},0)/stats.length;
    const fillAlpha = 0.15 + (avgStat/100)*0.25;
    const statPoly = '<polygon points="'+statPts+'" fill="rgba(124,58,237,'+fillAlpha.toFixed(2)+')" stroke="'+ACOLORS[0]+'" stroke-width="1.5"/>';
    // Dots
    let dots = '';
    stats.forEach(function(v,i){
      const p = pt(i,v);
      dots += '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2.5" fill="'+ACOLORS[i]+'"/>';
    });
    // Labels
    let labels = '';
    axes.areas.forEach(function(name,i){
      const op = ptOuter(i);
      const angle = (Math.PI*2/n)*i - Math.PI/2;
      const lx = cx + (r+16)*Math.cos(angle);
      const ly = cy + (r+16)*Math.sin(angle);
      labels += '<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" fill="'+ACOLORS[i]+'" font-size="6" font-weight="600" font-family="DM Sans,sans-serif">'+AICONS[i]+'</text>';
    });
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+bgHexes+axisLines+statPoly+dots+labels+'</svg>';
  }

var _prodActiveTab='hoy';
var _alertRango={modo:'mes', mes:new Date().toISOString().slice(0,7)};
function initProd(){
  function todayStr(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
  var today=todayStr();
  function loadDay(ds){return JSON.parse(localStorage.getItem('cosmo_prod_'+ds)||'null');}
  function saveDay(ds,d){localStorage.setItem('cosmo_prod_'+ds,JSON.stringify(d));}
  function getAllDays(){
    var keys=[],days=[];
    for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf('cosmo_prod_')===0)keys.push(k);}
    keys.sort();
    keys.forEach(function(k){
      var d=JSON.parse(localStorage.getItem(k)||'null');
      if(d&&d._saved) days.push(d);
    });
    return days;
  }
  var data=loadDay(today)||{date:today,impresion:0,corte:0,resinado:0,empaque:0,despachos:[],_saved:false};

  var ETAPAS=[
    {key:'impresion',icon:'🖨️',label:'Impresión',color:'#06b6d4'},
    {key:'corte',    icon:'✂️', label:'Corte',    color:'#a855f7'},
    {key:'resinado', icon:'🧪', label:'Resinado', color:'#f472b6'},
    {key:'empaque',  icon:'📦', label:'Empaque',  color:'#f97316'}
  ];

  var _tab='hoy';

  function totalP(){return data.despachos.length;}
  function totalPl(){return data.despachos.reduce(function(s,d){return s+(parseInt(d.plantillas)||0);},0);}

  function updateNums(){
    ETAPAS.forEach(function(e){var el=document.getElementById('ps-'+e.key);if(el)el.textContent=data[e.key]||0;});
    ['pa','pb'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=totalP();});
    ['pla','plb'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=totalPl();});
    // Update meta bar in real time
    var META=100;
    var mejor=Math.max(data.impresion||0,data.corte||0,data.resinado||0,data.empaque||0);
    var pct=Math.min(100,Math.round((mejor/META)*100));
    var col=pct>=100?'#22c55e':pct>=70?'#f59e0b':'#ef4444';
    var bar=document.getElementById('meta-bar');
    var barFill=document.getElementById('meta-bar-fill');
    var barPct=document.getElementById('meta-pct');
    var barCount=document.getElementById('meta-count');
    var barStatus=document.getElementById('meta-status');
    if(bar) bar.style.borderColor=col+'44';
    if(barFill){barFill.style.width=pct+'%';barFill.style.background=col;}
    if(barPct){barPct.textContent=pct+'% de meta';barPct.style.color=col;}
    if(barCount) barCount.textContent=mejor+' / '+META+' plantillas';
    if(barStatus){barStatus.textContent=pct>=100?'🎯 Meta alcanzada':pct>=70?'📈 En camino':'⚡ Arrancar';barStatus.style.color=col;}
    // Update mini-bars per etapa
    ETAPAS.forEach(function(e){
      var mb=document.getElementById('mini-bar-'+e.key);

  // ── CHART (pure canvas, no libs) ──
  function drawChart(days){
    var canvas=document.getElementById('prod-chart');
    if(!canvas)return;
    var W=canvas.width=canvas.offsetWidth||560, H=canvas.height=180;
    var ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,W,H);
    if(!days.length){
      ctx.fillStyle='#334155';ctx.font='12px sans-serif';ctx.textAlign='center';
      ctx.fillText('Sin datos guardados aún',W/2,H/2);return;
    }
    // total plantillas per day = max of etapas (tendencia general)
    var vals=days.map(function(d){return Math.max(d.impresion||0,d.corte||0,d.resinado||0,d.empaque||0);});
    var maxV=Math.max.apply(null,vals)||1;
    var pad={l:36,r:16,t:16,b:36};
    var gW=W-pad.l-pad.r, gH=H-pad.t-pad.b;
    var step=gW/(days.length>1?days.length-1:1);

    // Grid lines
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
    for(var g=0;g<=4;g++){
      var gy=pad.t+gH*(1-g/4);
      ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();
      ctx.fillStyle='#334155';ctx.font='9px Space Mono,monospace';ctx.textAlign='right';
      ctx.fillText(Math.round(maxV*g/4),pad.l-4,gy+3);
    }

    // Area fill
    ctx.beginPath();
    ctx.moveTo(pad.l, pad.t+gH);
    days.forEach(function(d,i){
      var x=pad.l+i*step;
      var y=pad.t+gH*(1-vals[i]/maxV);
      if(i===0) ctx.lineTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.lineTo(pad.l+(days.length-1)*step, pad.t+gH);
    ctx.closePath();
    var grad=ctx.createLinearGradient(0,pad.t,0,pad.t+gH);
    grad.addColorStop(0,'rgba(124,58,237,0.25)');
    grad.addColorStop(1,'rgba(124,58,237,0.02)');
    ctx.fillStyle=grad;ctx.fill();

    // Line
    ctx.beginPath();ctx.strokeStyle='#a855f7';ctx.lineWidth=2;ctx.lineJoin='round';
    days.forEach(function(d,i){
      var x=pad.l+i*step, y=pad.t+gH*(1-vals[i]/maxV);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();

    // Dots + labels
    days.forEach(function(d,i){
      var x=pad.l+i*step, y=pad.t+gH*(1-vals[i]/maxV);
      ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fillStyle='#a855f7';ctx.fill();
      ctx.strokeStyle='#0c1220';ctx.lineWidth=2;ctx.stroke();
      // date label
      ctx.fillStyle='#475569';ctx.font='8px monospace';ctx.textAlign='center';
      var label=d.date.slice(5); // MM-DD
      ctx.fillText(label,x,H-pad.b+14);
      // value above dot
      ctx.fillStyle='#e2e8f0';ctx.font='9px Space Mono,monospace';
      ctx.fillText(vals[i],x,y-8);
    });
  }

  function _renderShopifyList(arr, query){
    if(!arr.length) return '<div style="font-size:10px;color:#334155;padding:8px 0;">Sin pedidos guardados aún.</div>';
    var filtered = query ? arr.filter(function(p){ return p.nombre.toLowerCase().includes(query.toLowerCase()); }) : arr;
    if(!filtered.length) return '<div style="font-size:10px;color:#334155;padding:8px 0;">Sin resultados para "'+query+'"</div>';
    return filtered.map(function(p){
      var realIdx = arr.indexOf(p);
      return '<div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(6,182,212,0.1);border-radius:8px;padding:8px 12px;">'
        +'<div style="flex:1;">'
        +'<div style="font-size:11px;font-weight:600;color:#e2e8f0;">'+p.nombre+'</div>'
        +'<div style="font-size:9px;color:#475569;margin-top:1px;">'+p.fecha+'</div>'
        +'</div>'
        +'<a href="'+p.link+'" target="_blank" style="padding:4px 12px;background:rgba(6,182,212,0.12);border:1px solid rgba(6,182,212,0.3);border-radius:6px;color:#06b6d4;font-size:10px;text-decoration:none;white-space:nowrap;font-weight:600;">🔗 Abrir</a>'
        +'<button onclick="window._shopifyDel('+realIdx+')" style="background:none;border:none;color:#334155;cursor:pointer;font-size:12px;padding:0 2px;" title="Eliminar">✕</button>'
        +'</div>';
    }).join('');
  }

// ─── ALERT ENGINE ───
function computeAlertas(rango){
  var alerts = [];
  var MN = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  function mesLabel(m){ if(!m) return m; var p=m.split('-'); return MN[parseInt(p[1])-1]+' '+p[0]; }
  function fmtCOP(n){ return '$'+Math.round(n).toLocaleString('es-CO'); }

  var r = rango || {modo:'mes', mes:new Date().toISOString().slice(0,7)};
  var mesCur = r.modo==='mes' ? (r.mes||new Date().toISOString().slice(0,7)) : new Date().toISOString().slice(0,7);
  var _gastos   = (window._cgGastos)  || JSON.parse(localStorage.getItem('cg_gastos')  ||'[]');
  var _ingresos = (window._cgIngresos)|| JSON.parse(localStorage.getItem('cg_ingresos')||'[]').filter(function(i){return !!i.mes;});

  // Filter by range
  if(r.modo==='rango' && r.desde && r.hasta){
    _ingresos = _ingresos.filter(function(i){ return i.mes>=r.desde && i.mes<=r.hasta; });
    _gastos   = _gastos.filter(function(g){ return g.fecha && g.fecha.slice(0,7)>=r.desde && g.fecha.slice(0,7)<=r.hasta; });
    mesCur = r.hasta; // use last month as reference for current month alerts
  } else if(r.modo==='mes' && r.mes){
    _ingresos = _ingresos.filter(function(i){ return i.mes===r.mes; });
    _gastos   = _gastos.filter(function(g){ return g.fecha && g.fecha.slice(0,7)===r.mes; });
  }

  var gastosByMes = {};
  _gastos.forEach(function(g){ if(!g.fecha) return; var m=g.fecha.slice(0,7); gastosByMes[m]=(gastosByMes[m]||0)+(parseFloat(g.monto)||0); });
  var sorted = _ingresos.slice().sort(function(a,b){ return a.mes>b.mes?1:-1; });

  var ingCur = _ingresos.filter(function(i){return i.mes===mesCur;}).reduce(function(s,i){return s+(parseFloat(i.monto)||0);},0);
  var gasCur = gastosByMes[mesCur]||0;
  var excCur = ingCur - gasCur;
  var pct = ingCur>0 ? (gasCur/ingCur*100) : 0;

  // ── ALERTAS NEGATIVAS ──

  // 1. Gastos vs ingresos este mes
  if(ingCur>0 && pct >= 70){
    alerts.push({nivel:'rojo', icon:'🔴',
      msg:'Gastos de '+mesLabel(mesCur)+' en '+pct.toFixed(0)+'% de ingresos ('+fmtCOP(gasCur)+' de '+fmtCOP(ingCur)+') — excedente crítico '+fmtCOP(excCur)});
  } else if(ingCur>0 && pct >= 50){
    alerts.push({nivel:'amarillo', icon:'🟡',
      msg:'Gastos de '+mesLabel(mesCur)+' en '+pct.toFixed(0)+'% de ingresos ('+fmtCOP(gasCur)+' de '+fmtCOP(ingCur)+') — excedente '+fmtCOP(excCur)});
  }

  // 2. Tendencia excedente con meses específicos
  if(sorted.length >= 2){
    var last2 = sorted.slice(-2);
    var exc0 = last2[0].monto - (gastosByMes[last2[0].mes]||0);
    var exc1 = last2[1].monto - (gastosByMes[last2[1].mes]||0);
    var diff = exc1 - exc0;
    if(sorted.length >= 3){
      var last3 = sorted.slice(-3);
      var excA = last3[0].monto-(gastosByMes[last3[0].mes]||0);
      var excB = last3[1].monto-(gastosByMes[last3[1].mes]||0);
      var excC = last3[2].monto-(gastosByMes[last3[2].mes]||0);
      if(excC < excB && excB < excA){
        alerts.push({nivel:'amarillo', icon:'📉',
          msg:'Excedente bajando 3 meses: '+mesLabel(last3[0].mes)+' '+fmtCOP(excA)+' → '+mesLabel(last3[1].mes)+' '+fmtCOP(excB)+' → '+mesLabel(last3[2].mes)+' '+fmtCOP(excC)});
      } else if(exc1 < exc0){
        alerts.push({nivel:'amarillo', icon:'📉',
          msg:'Excedente de '+mesLabel(last2[1].mes)+' ('+fmtCOP(exc1)+') bajó vs '+mesLabel(last2[0].mes)+' ('+fmtCOP(exc0)+') — diferencia '+fmtCOP(diff)});
      }
    } else if(exc1 < exc0){
      alerts.push({nivel:'amarillo', icon:'📉',
        msg:'Excedente de '+mesLabel(last2[1].mes)+' ('+fmtCOP(exc1)+') bajó vs '+mesLabel(last2[0].mes)+' ('+fmtCOP(exc0)+') — diferencia '+fmtCOP(diff)});
    }
  }

  // 3. Gasto individual > 20% del ingreso del mes
  if(ingCur>0){
    var umbral = ingCur*0.20;
    _gastos.filter(function(g){ return g.fecha&&g.fecha.slice(0,7)===mesCur; })
      .forEach(function(g){
        if((parseFloat(g.monto)||0) >= umbral){
          alerts.push({nivel:'amarillo', icon:'💸',
            msg:'Gasto alto en '+mesLabel(mesCur)+': "'+g.nombre+'" es '+((g.monto/ingCur)*100).toFixed(0)+'% del ingreso ('+fmtCOP(g.monto)+' de '+fmtCOP(ingCur)+')'});
        }
      });
  }

  // ── ALERTAS POSITIVAS ──

  // 4. Mejor excedente del historial
  if(sorted.length >= 2){
    var excedentes = sorted.map(function(i){ return {mes:i.mes, exc:i.monto-(gastosByMes[i.mes]||0)}; });
    var mejor = excedentes.slice().sort(function(a,b){return b.exc-a.exc;})[0];
    var penultimo = sorted[sorted.length-2];
    var excPen = penultimo.monto-(gastosByMes[penultimo.mes]||0);
    // Mejor mes del historial (excluyendo el actual si no tiene datos completos)
    if(mejor.mes !== mesCur && mejor.exc > 0){
      // Only show if current month just beat it or is close
      if(excCur > mejor.exc){
        alerts.push({nivel:'verde', icon:'🏆',
          msg:'¡Mejor excedente registrado! '+mesLabel(mesCur)+' con '+fmtCOP(excCur)+' supera el récord anterior de '+mesLabel(mejor.mes)+' ('+fmtCOP(mejor.exc)+')'});
      }
    }
    // 5. Excedente subió respecto al mes anterior
    var lastSorted = sorted.slice(-2);
    if(lastSorted.length===2){
      var eA = lastSorted[0].monto-(gastosByMes[lastSorted[0].mes]||0);
      var eB = lastSorted[1].monto-(gastosByMes[lastSorted[1].mes]||0);
      if(eB > eA && eB > 0){
        var mejora = eB - eA;
        alerts.push({nivel:'verde', icon:'📈',
          msg:'Excedente de '+mesLabel(lastSorted[1].mes)+' ('+fmtCOP(eB)+') subió '+fmtCOP(mejora)+' vs '+mesLabel(lastSorted[0].mes)+' ('+fmtCOP(eA)+')'});
      }
    }
  }

  // 6. Margen neto >= 40% este mes
  if(ingCur>0 && pct <= 60 && excCur > 0){
    var margen = 100 - pct;
    if(margen >= 40){
      alerts.push({nivel:'verde', icon:'💚',
        msg:'Margen neto de '+mesLabel(mesCur)+' en '+margen.toFixed(0)+'% — '+fmtCOP(excCur)+' excedente sobre '+fmtCOP(ingCur)+' ingresos'});
    }
  }

  return alerts;
}



function initGastos(){
  // ── Storage helpers ──
  function loadG(k,def){ return JSON.parse(localStorage.getItem('cg_'+k)||'null')||def; }
  function saveG(k,v){ localStorage.setItem('cg_'+k,JSON.stringify(v)); }

  // State
  window._cgGastos  = loadG('gastos',[]);
  window._cgIngresos = loadG('ingresos',[]).filter(function(i){ return !!i.mes; });
  window._cgProductos= loadG('productos',[]);
  var gastos    = window._cgGastos;
  var ingresos  = window._cgIngresos;
  var productos = window._cgProductos;
  var _tab = 'gastos';

  // ── Helpers ──
  function fmtM(n){ return '$'+Number(n||0).toLocaleString('es-CO'); }
  function nowDate(){ var d=new Date(); return d.toISOString().slice(0,10); }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

  function totalGastosMes(){
    var mes = new Date().toISOString().slice(0,7);
    return gastos.filter(function(g){return g.fecha&&g.fecha.slice(0,7)===mes;})
                 .reduce(function(s,g){return s+(parseFloat(g.monto)||0);},0);
  }
  function totalIngresosMes(mesStr){
    var mes=mesStr||new Date().toISOString().slice(0,7);
    return ingresos.filter(function(i){return i.mes===mes;})
                   .reduce(function(s,i){return s+(parseFloat(i.monto)||0);},0);
  }
  function totalIngresosTipo(tipo){
    return ingresos.filter(function(i){return i.tipo===tipo;})
                   .reduce(function(s,i){return s+(parseFloat(i.monto)||0);},0);
  }
  function totalGastosTipo(tipo){
    return gastos.filter(function(g){return g.tipo===tipo;})
                 .reduce(function(s,g){return s+(parseFloat(g.monto)||0);},0);
  }

  // ── Sync insumo status when a gasto with insumo link is saved ──
  function syncInsumo(insumoKey, etaKey, cantidad){
    if(!insumoKey||!etaKey) return;
    var meta = JSON.parse(localStorage.getItem('cosmo_prod_meta')||'{}');
    if(!meta[etaKey]||!meta[etaKey].insumos) return;
    meta[etaKey].insumos.forEach(function(ins){
      if(ins.name.toLowerCase()===insumoKey.toLowerCase()){
        if(cantidad>0) ins.stock=(ins.stock||0)+cantidad;
      }
    });
    localStorage.setItem('cosmo_prod_meta',JSON.stringify(meta));
    updateProdBadge();
  }

  // ── Tab switcher ──
  function switchTab(t){
    _tab=t;
    var tabs=['gastos','ingresos','costeo','rentabilidad','historial'];
    tabs.forEach(function(id){
      var btn=document.getElementById('gt-'+id);
      var pane=document.getElementById('gp-'+id);
      if(btn){
        var active=id===t;
        btn.style.background=active?'rgba(245,158,11,0.18)':'transparent';
        btn.style.borderColor=active?'rgba(245,158,11,0.45)':'rgba(255,255,255,0.08)';
        btn.style.color=active?'#f59e0b':'#475569';
        btn.style.fontWeight=active?'700':'400';
      }
      if(pane) pane.style.display=id===t?'block':'none';
    });
    if(t==='rentabilidad') setTimeout(drawRentChart,50);
    if(t==='historial') renderHistorial();
  }

  // ══ PANE: GASTOS ══
  function renderGastosPane(){
    var el=document.getElementById('gp-gastos'); if(!el) return;
    var html='';

    // Quick stats
    var mesCur=new Date().toISOString().slice(0,7);
    var mesTotal=totalGastosMes(mesCur);
    var varTotal=totalGastosTipo('variable');
    var fijTotal=totalGastosTipo('fijo');
    var insTotal=totalGastosTipo('insumo');
    html+='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:14px;">';
    [['💸 Este mes',mesTotal,'#f59e0b'],['📦 Insumos',insTotal,'#06b6d4'],['🔄 Variables',varTotal,'#a855f7'],['🏢 Fijos',fijTotal,'#f97316']].forEach(function(r){

  function drawRentChart(){
    var canvas=document.getElementById('rent-chart'); if(!canvas) return;
    var mes=_rentMes||new Date().toISOString().slice(0,7);
    var mesGastos=gastos.filter(function(g){return g.fecha&&g.fecha.slice(0,7)===mes;});
    var W=canvas.width=canvas.offsetWidth||300, H=canvas.height=140;
    var ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,W,H);
    if(!mesGastos.length){
      ctx.fillStyle='#334155'; ctx.font='10px sans-serif'; ctx.textAlign='center';
      ctx.fillText('Sin gastos registrados',W/2,H/2); return;
    }
    // Aggregate by tipo
    var byTipo={};
    mesGastos.forEach(function(g){
      var t=g.tipo||'otro';
      byTipo[t]=(byTipo[t]||0)+(parseFloat(g.monto)||0);
    });
    var entries=Object.entries(byTipo).sort(function(a,b){return b[1]-a[1];});
    var total=entries.reduce(function(s,e){return s+e[1];},0);
    var COLORS={'insumo':'#06b6d4','variable':'#a855f7','fijo':'#f59e0b','otro':'#64748b'};
    var LABELS={'insumo':'Insumo','variable':'Variable','fijo':'Fijo','otro':'Otro'};
    // Donut
    var cx=H/2+10, cy=H/2, r=H/2-10, ri=r*0.55;
    var startAngle=-Math.PI/2;
    entries.forEach(function(e){
      var sweep=(e[1]/total)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,startAngle,startAngle+sweep);
      ctx.closePath();
      ctx.fillStyle=COLORS[e[0]]||'#64748b';
      ctx.fill();
      startAngle+=sweep;
    });
    // Hole
    ctx.beginPath(); ctx.arc(cx,cy,ri,0,Math.PI*2);
    ctx.fillStyle='#0a0f1e'; ctx.fill();
    // Total label
    ctx.fillStyle='#e2e8f0'; ctx.font='bold 9px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('Total',cx,cy-4);
    ctx.fillStyle='#f59e0b'; ctx.font='bold 10px Space Mono,monospace';
    ctx.fillText('$'+Math.round(total/1000)+'k',cx,cy+8);
    // Legend
    var lx=H+20, ly=20;
    entries.forEach(function(e){
      ctx.fillStyle=COLORS[e[0]]||'#64748b';
      ctx.fillRect(lx,ly,8,8);
      ctx.fillStyle='#94a3b8'; ctx.font='8px sans-serif'; ctx.textAlign='left';
      ctx.fillText((LABELS[e[0]]||e[0])+' $'+Math.round(e[1]/1000)+'k',lx+12,ly+7);
      ly+=18;
    });
  }

  function drawRentBarChart(){
    var canvas=document.getElementById('rent-bar-chart'); if(!canvas) return;
    var W=canvas.width=canvas.offsetWidth||340, H=canvas.height=130;
    var ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,W,H);
    var gastosByMes={};
    gastos.forEach(function(g){ if(!g.fecha) return; var m=g.fecha.slice(0,7); gastosByMes[m]=(gastosByMes[m]||0)+(parseFloat(g.monto)||0); });
    var data=ingresos.slice().sort(function(a,b){return a.mes>b.mes?1:-1;});
    if(!data.length){
      ctx.fillStyle='#334155'; ctx.font='10px sans-serif'; ctx.textAlign='center';
      ctx.fillText('Sin datos',W/2,H/2); return;
    }
    var MN=['E','F','M','A','M','J','J','A','S','O','N','D'];
    var maxVal=Math.max.apply(null,data.map(function(d){return Math.max(d.monto,gastosByMes[d.mes]||0);}));
    if(!maxVal) return;
    var padL=6,padR=6,padT=10,padB=22;
    var chartW=W-padL-padR, chartH=H-padT-padB;
    var barGroup=chartW/data.length;
    var barW=Math.max(4,barGroup*0.28), gap=barW*0.3;
    // Highlight selected month
    var selMes=_rentMes||new Date().toISOString().slice(0,7);
    data.forEach(function(d,i){
      var ing=d.monto, gas=gastosByMes[d.mes]||0, exc=ing-gas;
      var x=padL+i*barGroup+barGroup/2;
      var ingH=Math.round((ing/maxVal)*chartH);
      var gasH=Math.round((gas/maxVal)*chartH);
      var excH=Math.max(0,Math.round((exc/maxVal)*chartH));
      var isSel=d.mes===selMes;
      // Highlight selected
      if(isSel){
        ctx.fillStyle='rgba(245,158,11,0.07)';
        ctx.fillRect(x-barGroup/2+2,padT,barGroup-4,chartH);
      }
      ctx.fillStyle=isSel?'#22c55e':'rgba(34,197,94,0.6)';
      ctx.fillRect(x-barW-gap/2,padT+chartH-ingH,barW,ingH);
      ctx.fillStyle=isSel?'rgba(239,68,68,1)':'rgba(239,68,68,0.5)';
      ctx.fillRect(x+gap/2,padT+chartH-gasH,barW,gasH);
      if(exc>0){
        ctx.fillStyle=isSel?'#06b6d4':'rgba(6,182,212,0.6)';
        ctx.beginPath(); ctx.arc(x,padT+chartH-excH-3,isSel?4:2.5,0,Math.PI*2); ctx.fill();
      }
      var mesIdx=parseInt(d.mes.slice(5,7))-1;
      ctx.fillStyle=isSel?'#f59e0b':'#475569';
      ctx.font=(isSel?'bold ':'')+'8px sans-serif'; ctx.textAlign='center';
      ctx.fillText(MN[mesIdx],x,H-6);
    });
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(padL,padT+chartH); ctx.lineTo(W-padR,padT+chartH); ctx.stroke();
  }

  window._gastosCalToggle=function(btn){
    var cal=document.getElementById('g-cal-float'); if(!cal) return;
    if(cal.style.display!=='none'&&_calAnchor===btn){ cal.style.display='none'; return; }
    _calAnchor=btn;
    var sel=document.getElementById('g-fecha');
    if(sel&&sel.value) try{ _calDate=new Date(sel.value+'T12:00:00'); }catch(e){ _calDate=new Date(); }
    else _calDate=new Date();
    // Render first (hidden) to measure height
    cal.style.visibility='hidden';
    cal.style.display='block';
    _calRender();
    var rect=btn.getBoundingClientRect();
    var calH=cal.offsetHeight||260;
    var calW=230;
    var spaceBelow=window.innerHeight-rect.bottom-8;
    var spaceAbove=rect.top-8;
    // Open upward if not enough space below and more space above
    if(spaceBelow<calH && spaceAbove>spaceBelow){
      cal.style.top=(rect.top-calH-6)+'px';
    } else {
      cal.style.top=(rect.bottom+6)+'px';
    }
    var left=rect.left;
    if(left+calW>window.innerWidth) left=window.innerWidth-calW-8;
    cal.style.left=Math.max(4,left)+'px';
    cal.style.visibility='visible';
  };
  window._calPrev=function(){_calDate=new Date(_calDate.getFullYear(),_calDate.getMonth()-1,1);_calRender();};

function initContent(){
  let embajadores = JSON.parse(localStorage.getItem('cosmo_embajadores')||'null') || [{name:'@marca1',niche:'Muñecas porcelana',status:'active'},{name:'@marca2',niche:'Fomy creativo',status:'active'}];
  let ideas = JSON.parse(localStorage.getItem('cosmo_ideas')||'null') || [{text:'Tutorial: cómo pegar ojos resinados',done:false},{text:'Comparativa: ojos COSMO vs pintados a mano',done:false},{text:'Behind the scenes: proceso de producción',done:false}];
  const saveE=()=>localStorage.setItem('cosmo_embajadores',JSON.stringify(embajadores));
  const saveId=()=>localStorage.setItem('cosmo_ideas',JSON.stringify(ideas));
  function renderE(){
    const el=document.getElementById('embajadores-list'); if(!el)return;
    el.innerHTML=embajadores.map((e,i)=>{
      const nv=e.nivel||1;
      const nvIcon=nv===3?'🥇':nv===2?'🥈':'🥉';
      const nvLabel=nv===3?'N3':nv===2?'N2':'N1';
      return `
      <div class="ch-row" style="border-color:rgba(124,58,237,0.2);">
        <div class="ch-icon-s">${nvIcon}</div>
        <div class="ch-info">
          <div class="ch-name-s" contenteditable="true" onblur="window._updE(${i},'name',this.textContent)">${e.name}</div>
          <div style="display:flex;gap:6px;align-items:center;">
            <div class="ch-amt" contenteditable="true" onblur="window._updE(${i},'niche',this.textContent)">${e.niche}</div>
            <span style="font-size:9px;background:rgba(124,58,237,0.15);color:#a78bfa;border-radius:3px;padding:1px 4px;">Marca ${nvLabel}</span>
          </div>
        </div>
        <select onchange="window._updE(${i},'nivel',parseInt(this.value))" style="background:#0c1220;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:3px 4px;color:#e2e8f0;font-size:9px;margin-right:2px;">
          <option value="1" ${nv===1?'selected':''}>🥉 N1</option>
          <option value="2" ${nv===2?'selected':''}>🥈 N2</option>
          <option value="3" ${nv===3?'selected':''}>🥇 N3</option>
        </select>
        <select onchange="window._updE(${i},'status',this.value)" style="background:#0c1220;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:3px 4px;color:#e2e8f0;font-size:9px;">
          <option value="active" ${e.status==='active'?'selected':''}>🟢</option>
          <option value="pause" ${e.status==='pause'?'selected':''}>⏸</option>
          <option value="end" ${e.status==='end'?'selected':''}>🔴</option>
        </select>
        <button onclick="window._delE(${i})" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:12px;padding:0 4px;">✕</button>
      </div>`;}).join('');
  }
  function renderId(){
    const el=document.getElementById('ideas-list'); if(!el)return;
    el.innerHTML=ideas.map((id,i)=>`
      <div class="ch-row" style="${id.done?'opacity:0.5':''}">
        <div onclick="window._togId(${i})" style="width:16px;height:16px;border-radius:4px;border:1.5px solid rgba(236,72,153,0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;${id.done?'background:#f472b6;':''}color:#f472b6;font-size:10px;">${id.done?'✓':''}</div>
        <div class="ch-info"><div class="ch-name-s" style="${id.done?'text-decoration:line-through;color:#64748b':''}">${id.text}</div></div>
        <button onclick="window._delId(${i})" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:12px;padding:0 4px;">✕</button>
      </div>`).join('');
  }
  window._updE=(i,k,v)=>{embajadores[i][k]=v;saveE();renderE();};
  window._delE=(i)=>{embajadores.splice(i,1);saveE();renderE();};
  window.addEmbajador=()=>{embajadores.push({name:'@nuevo',niche:'Nicho',status:'active',nivel:1});saveE();renderE();};
  window._updId=(i,k,v)=>{ideas[i][k]=v;saveId();renderId();};
  window._delId=(i)=>{ideas.splice(i,1);saveId();renderId();};
  window._togId=(i)=>{ideas[i].done=!ideas[i].done;saveId();renderId();};
  window.addIdea=()=>{ideas.push({text:'Nueva idea...',done:false});saveId();renderId();};
  renderE(); renderId();
}

    med:  {label:'⚡ Avanzar', color:'#f59e0b'},
    low:  {label:'💤 Esperar', color:'#475569'}
  };
  const CATEGORIES = [
    ...SB_CATS_DEF,
  ];
  // Read from cosmo_team - single source of truth
  const MEMBERS = (JSON.parse(localStorage.getItem('cosmo_team')||'[]')).map(function(m){return m.name;}).concat(['Equipo']);

  // Seed defaults only if localStorage is empty
  if(!localStorage.getItem('cosmo_missions')){
    localStorage.setItem('cosmo_missions', JSON.stringify([
      {id:'m1',title:'Validar Marcas Aliadas',status:'active',priority:'high',due:'2026-03-31',owner:'Diego',collapsed:false,
       categories:['billing','map'],reward:'Primer ingreso pasivo por fabricación externa',
       tasks:[
        {id:'t1',text:'Contactar 3 marcas nacionales',done:true,due:'2026-02-28'},
        {id:'t2',text:'Enviar muestras de producto',done:true,due:'2026-03-10'},
        {id:'t3',text:'Negociar primer pedido',done:false,due:'2026-03-20'},
        {id:'t4',text:'Cerrar contrato formal',done:false,due:'2026-03-31'}
      ]},
      {id:'m2',title:'Lanzar canal online',status:'pending',priority:'high',due:'2026-06-30',owner:'Diego',collapsed:false,
       categories:['billing','content'],reward:'Nuevo canal de ventas activo 24/7 sin intermediarios',
       tasks:[
        {id:'t5',text:'Investigar Etsy vs Amazon vs Mercado Libre',done:false,due:'2026-04-15'},
        {id:'t6',text:'Crear cuenta y configurar tienda',done:false,due:'2026-05-01'},

        {id:'t8',text:'Primera venta online',done:false,due:'2026-06-30'}
      ]},
      {id:'m3',title:'Contratar operario tiempo completo',status:'pending',priority:'med',due:'2026-09-30',owner:'Diego',collapsed:true,
       categories:['team','prod'],reward:'Diego sale de produccion - foco total en liderazgo y expansion',
       tasks:[
        {id:'t9',text:'Definir perfil del cargo',done:false,due:'2026-07-01'},
        {id:'t10',text:'Alcanzar $13M sostenidos 2 meses',done:false,due:'2026-08-31'},
        {id:'t11',text:'Proceso de seleccion',done:false,due:'2026-09-15'},
        {id:'t12',text:'Onboarding y entrenamiento',done:false,due:'2026-09-30'}
      ]}
    ]));
  }
  // Always read fresh from localStorage so sidebar and panel stay in sync
  var getMissions = function(){ return JSON.parse(localStorage.getItem('cosmo_missions')||'[]'); };
  var missions = getMissions();
  var saveM = function(){
    localStorage.setItem('cosmo_missions', JSON.stringify(missions));
