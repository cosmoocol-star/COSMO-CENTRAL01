  f.style.display = f.style.display==='none'?'block':'none';
  if(f.style.display==='block'){
    var inp = document.getElementById('bib-new-nombre');
    if(inp) inp.focus();
  }
};

window._bibSaveDoc = function(){
  var nombre = (document.getElementById('bib-new-nombre')||{}).value||'';
  var desc   = (document.getElementById('bib-new-desc')||{}).value||'';
  var url    = (document.getElementById('bib-new-url')||{}).value||'';
  var cat    = (document.getElementById('bib-new-cat')||{}).value||'';
  nombre = nombre.trim(); url = url.trim();
  if(!nombre){ alert('El nombre es obligatorio.'); return; }
  if(!url){ alert('El link de Google Drive es obligatorio.'); return; }
  var bib = loadBib();
  bib.docs.push({ id:genId(), nombre:nombre, descripcion:desc.trim(), url:url, categoria:cat, creado:Date.now() });
  saveBib(bib);
  render();
};

window._bibOpenAddCat = function(){
  var f = document.getElementById('bib-cat-form');
  if(!f) return;
  f.style.display = f.style.display==='none'?'block':'none';
  if(f.style.display==='block'){
    var inp = document.getElementById('bib-cat-input');
    if(inp){ inp.value=''; inp.focus(); }
  }
};

window._bibSaveCat = function(){
  var inp = document.getElementById('bib-cat-input');
  if(!inp) return;
  var nombre = inp.value.trim();
  if(!nombre){ alert('Escribe un nombre para la categoría.'); return; }
  var bib = loadBib();
  if(bib.categorias.indexOf(nombre)!==-1){ alert('Esa categoría ya existe.'); return; }
  bib.categorias.push(nombre);
  saveBib(bib);
  render();
};

window._bibRenameCat = function(i){
  var bib = loadBib();
  var actual = bib.categorias[i];
  var nuevo = prompt('Nuevo nombre para "'+actual+'":', actual);
  if(!nuevo || !nuevo.trim() || nuevo.trim()===actual) return;
  nuevo = nuevo.trim();
  // Update docs that had old category
  bib.docs.forEach(function(d){ if(d.categoria===actual) d.categoria=nuevo; });
  bib.categorias[i] = nuevo;
  saveBib(bib);
  render();
};

window._bibDeleteCat = function(i){
  var bib = loadBib();
  var cat = bib.categorias[i];
  var count = bib.docs.filter(function(d){ return d.categoria===cat; }).length;
  if(count>0){ alert('No puedes eliminar una categoría con documentos.'); return; }
  if(!confirm('¿Eliminar la categoría "'+cat+'"?')) return;
  bib.categorias.splice(i,1);
  saveBib(bib);
  render();
};

window._bibDeleteDoc = function(id){
  if(!confirm('¿Eliminar este documento?')) return;
  var bib = loadBib();
  bib.docs = bib.docs.filter(function(d){ return d.id!==id; });
  saveBib(bib);
  render();
};

function initBiblioteca(){
  render();
}
window.initBiblioteca = initBiblioteca;

})();

// ─── BITÁCORA DE AUDITORÍA ────────────────────────────────────────────────────
(function(){

var _auditFiltroModulo = 'todos';
var _auditFiltroAccion = 'todas';
var _auditFiltroDesde  = '';
var _auditFiltroHasta  = '';
var _auditPage = 0;
var PAGE_SIZE = 30;

async function _loadAuditEntries(){
  // 1) Intentar cargar desde Firestore (fuente de verdad)
  if(_hubDb){
    try{
      const {collection, getDocs, orderBy, query, limit} = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const q = query(collection(_hubDb,'cosmo-audit'), orderBy('ts','desc'), limit(500));
      const snap = await getDocs(q);
      var entries = [];
      snap.forEach(function(d){ entries.push(d.data()); });
      return entries;
    } catch(e){ console.warn('Observador: error cargando Firestore',e); }
  }
  // 2) Fallback: buffer local
  try{ return JSON.parse(_origGetItem(_AUDIT_LOCAL_KEY)||'[]').reverse(); } catch(e){ return []; }
}

function _renderBitacora(entries){
  var root = document.getElementById('bitacora-root'); if(!root) return;

  var MODULOS = ['todos'].concat([...new Set(entries.map(function(e){ return e.modulo; }))].sort());
  var ACCIONES = ['todas'].concat([...new Set(entries.map(function(e){ return e.accion; }))].sort());

  // Filtrar
  var filtered = entries.filter(function(e){
    if(_auditFiltroModulo!=='todos' && e.modulo!==_auditFiltroModulo) return false;
    if(_auditFiltroAccion!=='todas' && e.accion!==_auditFiltroAccion) return false;
    if(_auditFiltroDesde && e.ts && e.ts.slice(0,10) < _auditFiltroDesde) return false;
    if(_auditFiltroHasta && e.ts && e.ts.slice(0,10) > _auditFiltroHasta) return false;
    return true;
  });

  var totalPages = Math.max(1, Math.ceil(filtered.length/PAGE_SIZE));
  if(_auditPage >= totalPages) _auditPage = totalPages-1;
  var paginated = filtered.slice(_auditPage*PAGE_SIZE, (_auditPage+1)*PAGE_SIZE);

  var COLOR = {
    'eliminar':'#ef4444','borrar':'#ef4444','reset':'#ef4444',
    'crear':'#22c55e','guardar':'#22c55e','completar':'#22c55e','archivar':'#f59e0b',
    'editar':'#06b6d4','actualizar':'#06b6d4','cambiar':'#06b6d4',
    'cerrar día':'#a855f7',
  };
  function getColor(accion){
    var a = (accion||'').toLowerCase();
    for(var k in COLOR){ if(a.indexOf(k)!==-1) return COLOR[k]; }
    return '#475569';
  }

  var html = '';

  // Header
  html += '<div style="background:rgba(14,165,233,0.06);border:1px solid rgba(14,165,233,0.2);border-radius:12px;padding:14px;margin-bottom:14px;">';
  html += '<div style="display:flex;align-items:center;gap:10px;">';
  html += '<span style="font-size:22px;">👁</span>';
  html += '<div><div style="font-size:12px;font-weight:700;color:#38bdf8;">El Observador</div>';
  html += '<div style="font-size:9px;color:#475569;margin-top:1px;">Registro inmutable · solo lectura · '+entries.length+' eventos</div></div>';
  html += '</div></div>';

  // Filtros — fila 1: módulo + acción
  html += '<div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;">';
  html += '<select onchange="window._auditFiltroMod(this.value)" style="background:#0c1220;border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:4px 8px;color:#e2e8f0;font-size:9px;outline:none;cursor:pointer;">';
  MODULOS.forEach(function(m){ html += '<option value="'+m+'"'+(m===_auditFiltroModulo?' selected':'')+'>'+m+'</option>'; });
  html += '</select>';
  html += '<select onchange="window._auditFiltroAcc(this.value)" style="background:#0c1220;border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:4px 8px;color:#e2e8f0;font-size:9px;outline:none;cursor:pointer;">';
  ACCIONES.forEach(function(a){ html += '<option value="'+a+'"'+(a===_auditFiltroAccion?' selected':'')+'>'+a+'</option>'; });
  html += '</select>';
  html += '</div>';

  // Filtros — fila 2: rango fechas
  html += '<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap;">';
  html += '<span style="font-size:9px;color:#475569;">Desde</span>';
  html += '<input type="date" value="'+_auditFiltroDesde+'" onchange="window._auditFiltroFechas(this.value,null)" style="background:#0c1220;border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:3px 7px;color:#e2e8f0;font-size:9px;outline:none;cursor:pointer;">';
  html += '<span style="font-size:9px;color:#475569;">Hasta</span>';
  html += '<input type="date" value="'+_auditFiltroHasta+'" onchange="window._auditFiltroFechas(null,this.value)" style="background:#0c1220;border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:3px 7px;color:#e2e8f0;font-size:9px;outline:none;cursor:pointer;">';
  if(_auditFiltroDesde || _auditFiltroHasta){
    html += '<button onclick="window._auditFiltroFechas(\'\',\'\')" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:6px;color:#f87171;font-size:9px;padding:3px 8px;cursor:pointer;">✕ Limpiar</button>';
  }
  html += '<span style="font-size:9px;color:#334155;margin-left:auto;">'+filtered.length+' resultado'+(filtered.length!==1?'s':'')+'</span>';
  html += '</div>';

  if(!paginated.length){
    html += '<div style="text-align:center;padding:40px 0;color:#334155;font-size:11px;">Sin eventos registrados aún.<br><span style="font-size:9px;color:#1e293b;">Los cambios que hagas en el Hub aparecerán aquí.</span></div>';
    root.innerHTML = html; return;
  }

  // Lista de eventos
  html += '<div style="display:flex;flex-direction:column;gap:6px;">';
  paginated.forEach(function(e){
    var col = getColor(e.accion);
    var fecha = e.ts ? new Date(e.ts).toLocaleString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
    html += '<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-left:3px solid '+col+';border-radius:8px;padding:9px 12px;">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:'+(e.detalle||e.antes!==undefined?'5':'0')+'px;">';
    html += '<span style="font-size:9px;font-weight:700;color:'+col+';text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;">'+e.accion+'</span>';
    html += '<span style="font-size:8px;color:#475569;background:rgba(255,255,255,0.04);border-radius:4px;padding:1px 6px;flex-shrink:0;">'+e.modulo+'</span>';
    html += '<span style="font-size:8px;color:#334155;margin-left:auto;flex-shrink:0;">'+fecha+'</span>';
    html += '</div>';
    if(e.detalle) html += '<div style="font-size:9px;color:#94a3b8;line-height:1.4;">'+e.detalle+'</div>';
    if(e.antes!==undefined && e.despues!==undefined){
      html += '<div style="display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;">';
      html += '<span style="font-size:8px;color:#ef4444;background:rgba(239,68,68,0.07);border-radius:4px;padding:2px 7px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="Antes: '+e.antes+'">← '+e.antes+'</span>';
      html += '<span style="font-size:8px;color:#22c55e;background:rgba(34,197,94,0.07);border-radius:4px;padding:2px 7px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="Después: '+e.despues+'">→ '+e.despues+'</span>';
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div>';

  // Paginación
  if(totalPages > 1){
    html += '<div style="display:flex;justify-content:center;gap:8px;margin-top:14px;align-items:center;">';
    html += '<button onclick="window._auditPage('+(_auditPage-1)+')" '+(_auditPage===0?'disabled':'')+' style="background:none;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#475569;padding:4px 10px;font-size:10px;cursor:pointer;">←</button>';
    html += '<span style="font-size:9px;color:#475569;">'+(_auditPage+1)+' / '+totalPages+'</span>';
    html += '<button onclick="window._auditPage('+(_auditPage+1)+')" '+(_auditPage>=totalPages-1?'disabled':'')+' style="background:none;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#475569;padding:4px 10px;font-size:10px;cursor:pointer;">→</button>';
    html += '</div>';
  }

  root.innerHTML = html;
}

window._auditFiltroMod = function(v){ _auditFiltroModulo=v; _auditPage=0; initBitacora(); };
window._auditFiltroAcc = function(v){ _auditFiltroAccion=v; _auditPage=0; initBitacora(); };
window._auditFiltroFechas = function(desde, hasta){
  if(desde!==null) _auditFiltroDesde = desde||'';
  if(hasta!==null) _auditFiltroHasta = hasta||'';
  _auditPage=0;
  initBitacora();
};
window._auditPage = function(p){ _auditPage=p; initBitacora(); };

async function initBitacora(){
  var root = document.getElementById('bitacora-root'); if(!root) return;
  root.innerHTML = '<div style="text-align:center;padding:40px 0;color:#334155;font-size:11px;">Cargando bitácora...</div>';
  var entries = await _loadAuditEntries();
  _renderBitacora(entries);
}
window.initBitacora = initBitacora;

})();
</script>


<script>
// ── Posicionamiento de emergencia — ejecuta con window.innerWidth garantizado ──
(function(){
  function forcePosition(){
    var cosmos = document.getElementById('cosmos');
    if(!cosmos) return;
    var W = cosmos.offsetWidth || window.innerWidth;
    var H = cosmos.offsetHeight || (window.innerHeight - 64);
    // Forzar dimensiones si cosmos no las tiene
    if(cosmos.offsetWidth < 50){
      cosmos.style.width = W + 'px';
      cosmos.style.height = H + 'px';
    }
    if(typeof positionNodes === 'function') positionNodes();
  }
  // Ejecutar en múltiples momentos para garantizar que funcione
  if(document.readyState === 'complete'){
    forcePosition();
  } else {
    window.addEventListener('load', function(){
      forcePosition();
      setTimeout(forcePosition, 300);
      setTimeout(forcePosition, 800);
    });
  }
  document.addEventListener('DOMContentLoaded', function(){
    setTimeout(forcePosition, 50);
    setTimeout(forcePosition, 200);
    setTimeout(forcePosition, 600);
  });
})();
</script>
</script>

<script>
// ── FORCE LAYOUT FIX ── garantiza posicionamiento sin importar el timing
(function() {
  function forceLayout() {
    var header = document.querySelector('header');
    var headerH = header ? header.offsetHeight : 50;
    var cosmos = document.getElementById('cosmos');
    if (!cosmos) return;
    // Forzar altura solo si el cosmos no la tiene (sin romper flex)
    if (!cosmos.offsetHeight || cosmos.offsetHeight < 50) {
      cosmos.style.height = (window.innerHeight - headerH) + 'px';
    }
    // Posicionar nodos
    if (typeof positionNodes === 'function') {
      positionNodes();
    }
  }
  // Ejecutar en múltiples momentos para asegurar
  window.addEventListener('load', function() {
    forceLayout();
    setTimeout(forceLayout, 300);
    setTimeout(forceLayout, 800);
    setTimeout(forceLayout, 1500);
    setTimeout(forceLayout, 3000);
  });
  window.addEventListener('resize', forceLayout);
})();
</script>


<script>
// ── GESTIÓN DE PEDIDOS (global scope) ──
// ══════════════════════════════════════════════════════════════════
// GESTIÓN DE PEDIDOS — Sistema completo con Satisfacción al Cliente
// ══════════════════════════════════════════════════════════════════
var _pedKey = 'cosmo_pedidos_v2';
var _pedSatKey = 'cosmo_pedidos_sat';

function _pedLoad(){ try{ return JSON.parse(localStorage.getItem(_pedKey)||'[]'); }catch(e){ return []; } }
function _pedSave(d){ localStorage.setItem(_pedKey, JSON.stringify(d)); }
function _satLoad(){ try{ return JSON.parse(localStorage.getItem(_pedSatKey)||'{}'); }catch(e){ return {}; } }
function _satSave(d){ localStorage.setItem(_pedSatKey, JSON.stringify(d)); }

function _pedId(){ return 'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,6); }

// ── ESTADOS ─────────────────────────────────────────────────────
var PED_ESTADOS = {
  pendiente:  { label:'Pendiente',      color:'#f59e0b', bg:'rgba(245,158,11,0.12)',  icon:'⏳' },
  en_camino:  { label:'En camino',      color:'#06b6d4', bg:'rgba(6,182,212,0.12)',   icon:'🚚' },
  entregado:  { label:'Despachado',     color:'#22c55e', bg:'rgba(34,197,94,0.12)',   icon:'📦' },
  problema:   { label:'Con problema',   color:'#ef4444', bg:'rgba(239,68,68,0.12)',   icon:'⚠️' },
};
var ESTADO_FLUJO = { pendiente:'entregado', entregado:'entregado', problema:'entregado' };

// ── INIT PANEL ──────────────────────────────────────────────────
window.initPedidos = function(){
  var root = document.getElementById('ped-root');
  if(!root) return;
  _renderPedPanel(root);
};

function _renderPedPanel(root){
  var arr = _pedLoad();
  var pendCount = arr.filter(function(p){ return p.estado!=='entregado'; }).length;
  var sat = _satLoad();

  // Tabs
  var tabActivos = '<button onclick="window._pedTab(\'activos\')" id="pedtab-activos" style="padding:5px 12px;border-radius:6px;border:1px solid rgba(147,180,240,0.3);background:rgba(147,180,240,0.15);color:#93b4f0;font-size:10px;cursor:pointer;font-family:Space Mono,monospace;">📦 Activos'+(pendCount?' <span style=\'background:#ef4444;color:#fff;border-radius:8px;padding:0 5px;font-size:8px;\'>'+pendCount+'</span>':'')+'</button>';
  var tabSat = '<button onclick="window._pedTab(\'satisfaccion\')" id="pedtab-satisfaccion" style="padding:5px 12px;border-radius:6px;border:1px solid rgba(168,85,247,0.3);background:rgba(168,85,247,0.08);color:#c084fc;font-size:10px;cursor:pointer;font-family:Space Mono,monospace;">⭐ Satisfacción</button>';
  var tabMet = '<button onclick="window._pedTab(\'metricas\')" id="pedtab-metricas" style="padding:5px 12px;border-radius:6px;border:1px solid rgba(6,182,212,0.3);background:rgba(6,182,212,0.08);color:#06b6d4;font-size:10px;cursor:pointer;font-family:Space Mono,monospace;">📊 Métricas</button>';
  var tabPlan = '<button onclick="window._pedTab(\'plantillas\')" id="pedtab-plantillas" style="padding:5px 12px;border-radius:6px;border:1px solid rgba(245,158,11,0.3);background:rgba(245,158,11,0.08);color:#f59e0b;font-size:10px;cursor:pointer;font-family:Space Mono,monospace;">🗂 Plantillas</button>';
  var tabCal  = '<button onclick="window._pedTab(\'calendario\')" id="pedtab-calendario" style="padding:5px 12px;border-radius:6px;border:1px solid rgba(52,211,153,0.3);background:rgba(52,211,153,0.08);color:#34d399;font-size:10px;cursor:pointer;font-family:Space Mono,monospace;">📅 Calendario</button>';

  var html = '';
  html += '<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;">'+tabActivos+tabSat+tabMet+tabPlan+tabCal+'</div>';
  html += '<div id="ped-tab-activos">'+_renderPedActivos(arr)+'</div>';
  html += '<div id="ped-tab-satisfaccion" style="display:none;">'+_renderPedSat(arr, sat)+'</div>';
  html += '<div id="ped-tab-metricas" style="display:none;">'+_renderPedMetricas(arr, sat)+'</div>';
  html += '<div id="ped-tab-plantillas" style="display:none;">'+_renderPedPlantillas(arr)+'</div>';
  html += '<div id="ped-tab-calendario" style="display:none;"></div>';
  root.innerHTML = html;
}

window._pedTab = function(tab){
  ['activos','satisfaccion','metricas','plantillas','calendario'].forEach(function(t){
    var el = document.getElementById('ped-tab-'+t);
    if(el) el.style.display = t===tab ? '' : 'none';
  });
  if(tab==='metricas'){
    var el = document.getElementById('ped-tab-metricas');
    if(el) el.innerHTML = _renderPedMetricas(_pedLoad(), _satLoad());
  }
  if(tab==='plantillas'){
    var el = document.getElementById('ped-tab-plantillas');
    if(el) el.innerHTML = _renderPedPlantillas(_pedLoad());
  }
  if(tab==='calendario'){
    var el = document.getElementById('ped-tab-calendario');
    if(el) _renderPedCalendario(el);
  }
};

// ── TAB ACTIVOS ─────────────────────────────────────────────────
function _renderPedActivos(arr){
  var html = '';

  // Formulario nuevo pedido
  html += '<div style="background:rgba(147,180,240,0.05);border:1px solid rgba(147,180,240,0.15);border-radius:12px;padding:14px;margin-bottom:14px;">';
  html += '<div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#93b4f0;margin-bottom:10px;">➕ Nuevo Pedido</div>';

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">';
  html += '<div><div style="font-size:8px;color:#475569;margin-bottom:3px;">Nombre / # Pedido</div><input id="pnf-nombre" placeholder="Ej: #1042 · Juan García" style="width:100%;background:#080c18;border:1px solid rgba(147,180,240,0.2);border-radius:7px;padding:6px 9px;color:#e2e8f0;font-size:10px;outline:none;"></div>';
  html += '<div><div style="font-size:8px;color:#475569;margin-bottom:3px;">Fecha asignada de entrega</div><input id="pnf-fecha" type="date" style="width:100%;background:#080c18;border:1px solid rgba(147,180,240,0.2);border-radius:7px;padding:6px 9px;color:#e2e8f0;font-size:10px;outline:none;color-scheme:dark;"></div>';
  html += '</div>';

  html += '<div style="margin-bottom:8px;"><div style="font-size:8px;color:#475569;margin-bottom:3px;">Link Shopify</div><input id="pnf-link" placeholder="https://admin.shopify.com/orders/..." style="width:100%;background:#080c18;border:1px solid rgba(6,182,212,0.2);border-radius:7px;padding:6px 9px;color:#06b6d4;font-size:9px;outline:none;"></div>';

  html += '<div style="display:flex;justify-content:flex-end;"><button onclick="window._pedAdd()" style="padding:7px 18px;background:rgba(147,180,240,0.15);border:1px solid rgba(147,180,240,0.4);border-radius:8px;color:#93b4f0;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:0.5px;">+ Registrar pedido</button></div>';
  html += '</div>';

  // Conteo
  var activos = arr.filter(function(p){ return p.estado!=='entregado'; });
  var entregados = arr.filter(function(p){ return p.estado==='entregado'; });
  html += '<div style="display:flex;gap:12px;margin-bottom:12px;">';
  html += '<div style="font-size:9px;color:#475569;">'+arr.length+' total · <span style="color:#f59e0b;">'+activos.length+' activos</span> · <span style="color:#22c55e;">'+entregados.length+' despachados</span></div>';
  html += '</div>';

  // Búsqueda
  html += '<input id="ped-search" oninput="window._pedSearch()" placeholder="🔍 Buscar..." style="width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:6px 10px;color:#e2e8f0;font-size:10px;outline:none;margin-bottom:10px;">';

  // Lista
  html += '<div id="ped-list">'+_renderPedList(arr, '')+'</div>';
  return html;
}

function _renderPedList(arr, query){
  if(!arr.length) return '<div style="text-align:center;padding:30px 0;color:#334155;font-size:11px;">Sin pedidos registrados aún.</div>';
  var filtered = query ? arr.filter(function(p){ return p.nombre.toLowerCase().includes(query.toLowerCase()); }) : arr;
  if(!filtered.length) return '<div style="font-size:10px;color:#334155;padding:12px 0;">Sin resultados para "'+query+'"</div>';

  // Ordenar: activos primero, luego entregados
  filtered = filtered.slice().sort(function(a,b){
    if(a.estado==='entregado' && b.estado!=='entregado') return 1;
    if(a.estado!=='entregado' && b.estado==='entregado') return -1;
    return 0;
  });

  return filtered.map(function(p){
    var realIdx = arr.findIndex(function(x){ return x.id===p.id; });
    var est = PED_ESTADOS[p.estado] || PED_ESTADOS.pendiente;
    var nextEst = ESTADO_FLUJO[p.estado];
    var nextInfo = nextEst && nextEst!==p.estado ? PED_ESTADOS[nextEst] : null;

    // Cumplimiento automático: buscar si tiene producción registrada <= fechaEntrega
    var hoy = new Date(); hoy.setHours(0,0,0,0);
    var fechaVenc = p.fechaEntrega ? new Date(p.fechaEntrega+'T00:00:00') : null;

    // Revisar despachos de producción vinculados
    var tieneProduccionEnFecha = false;
    var tieneProduccionTotal   = false;
    try{
      for(var _ki=0; _ki<localStorage.length; _ki++){
        var _kk = localStorage.key(_ki);
        if(!_kk || !_kk.startsWith('cosmo_prod_')) continue;
        var _dd = JSON.parse(localStorage.getItem(_kk)||'null');
        if(_dd && _dd._saved && _dd.despachos){
          _dd.despachos.forEach(function(desp){
            if(desp.pedidoId === p.id){
              tieneProduccionTotal = true;
              var fechaProd = new Date(_kk.replace('cosmo_prod_','')+'T00:00:00');
              if(!fechaVenc || fechaProd <= fechaVenc) tieneProduccionEnFecha = true;
            }
          });
        }
      }
    }catch(e){}

    // Estado de cumplimiento
    var cumplLabel = '', cumplColor = '', cumplIcon = '';
    if(p.estado === 'entregado'){
      if(tieneProduccionEnFecha){
        cumplIcon='✅'; cumplColor='#22c55e'; cumplLabel='A tiempo';
      } else if(tieneProduccionTotal){
        cumplIcon='⚠️'; cumplColor='#f59e0b'; cumplLabel='Fuera de fecha';
      } else if(fechaVenc){
        cumplIcon='📦'; cumplColor='#475569'; cumplLabel='Sin prod. vinc.';
      }
    } else if(fechaVenc){
      if(fechaVenc < hoy && !tieneProduccionEnFecha){
        cumplIcon='🔴'; cumplColor='#ef4444'; cumplLabel='VENCIDA';
      } else if(fechaVenc >= hoy){
        var diasRest = Math.ceil((fechaVenc - hoy)/86400000);
        cumplIcon='⏳'; cumplColor= diasRest<=2 ? '#f59e0b' : '#475569'; cumplLabel= diasRest===0?'Hoy':diasRest+'d restantes';
      }
    }

    var vencido = fechaVenc && fechaVenc < hoy && p.estado!=='entregado' && !tieneProduccionEnFecha;

    var card = '<div id="ped-card-'+p.id+'" style="background:rgba(255,255,255,0.02);border:1px solid '+(vencido?'rgba(239,68,68,0.3)':'rgba(147,180,240,0.08)')+';border-left:3px solid '+est.color+';border-radius:10px;padding:11px 13px;margin-bottom:7px;">';

    // Fila 1: nombre + badge estado
    card += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">';
    card += '<span style="font-size:12px;font-weight:600;color:#e2e8f0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+p.nombre+'">'+p.nombre+'</span>';
    card += '<span style="padding:2px 8px;border-radius:20px;font-size:9px;font-weight:600;background:'+est.bg+';color:'+est.color+';border:1px solid '+est.color+'33;white-space:nowrap;">'+est.icon+' '+est.label+'</span>';
    card += '</div>';

    // Fila 2: fecha + cumplimiento automático + link + botón estado + eliminar
    card += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">';

    // Fecha asignada
    if(p.fechaEntrega){
      var fDisplay = new Date(p.fechaEntrega+'T00:00:00').toLocaleDateString('es-CO',{day:'numeric',month:'short',year:'numeric'});
      card += '<span style="font-size:9px;color:#475569;">📅 '+fDisplay+'</span>';
    } else {
      card += '<span style="font-size:9px;color:#334155;">📅 Sin fecha</span>';
    }

    // Indicador de cumplimiento automático
    if(cumplIcon){
      card += '<span style="font-size:9px;color:'+cumplColor+';background:'+cumplColor+'18;border-radius:4px;padding:1px 7px;border:1px solid '+cumplColor+'33;white-space:nowrap;">'+cumplIcon+' '+cumplLabel+'</span>';
    }

    card += '<div style="flex:1;"></div>';

    // Link Shopify
    if(p.link){
      card += '<a href="'+p.link+'" target="_blank" style="padding:3px 10px;background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.3);border-radius:6px;color:#06b6d4;font-size:9px;text-decoration:none;white-space:nowrap;">🔗 Shopify</a>';
    }

    // Botón cambiar estado
    if(p.estado !== 'entregado'){
      // Si el siguiente estado es 'entregado' (despachar), usar acción especial
      if(nextEst === 'entregado'){
        card += '<button onclick="window._pedDespachar(\''+p.id+'\')" style="padding:3px 12px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);border-radius:6px;color:#22c55e;font-size:9px;cursor:pointer;white-space:nowrap;font-weight:600;">📦 Despachar</button>';
      } else {
        card += '<button onclick="window._pedNextEstado(\''+p.id+'\')" style="padding:3px 10px;background:rgba(147,180,240,0.1);border:1px solid rgba(147,180,240,0.3);border-radius:6px;color:#93b4f0;font-size:9px;cursor:pointer;white-space:nowrap;">→ '+(nextInfo?nextInfo.label:'Siguiente')+'</button>';
      }
    } else {
      // Ya despachado — ir a satisfacción
      card += '<button onclick="window._pedTab(\'satisfaccion\')" style="padding:3px 10px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.3);border-radius:6px;color:#c084fc;font-size:9px;cursor:pointer;white-space:nowrap;">⭐ Satisfacción</button>';
    }

    // Eliminar
    card += '<button onclick="window._pedDel(\''+p.id+'\')" style="background:none;border:none;color:#334155;cursor:pointer;font-size:12px;padding:0 2px;" title="Eliminar">✕</button>';

    card += '</div>';

    // Nota si tiene problema
    if(p.estado==='problema'){
      card += '<div style="margin-top:6px;padding:5px 8px;background:rgba(239,68,68,0.06);border-radius:6px;font-size:9px;color:#f87171;">⚠️ Este pedido tiene un problema registrado. Revisa en Satisfacción al Cliente.</div>';
    }

    card += '</div>';
    return card;
  }).join('');
}

// ── TAB SATISFACCIÓN AL CLIENTE ─────────────────────────────────
function _renderPedSat(arr, sat){
  var entregados = arr.filter(function(p){ return p.estado==='entregado'; });
  var html = '';

  html += '<div style="background:rgba(168,85,247,0.05);border:1px solid rgba(168,85,247,0.15);border-radius:12px;padding:12px 14px;margin-bottom:14px;">';
  html += '<div style="font-size:9px;color:#c084fc;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">⭐ Satisfacción al Cliente</div>';
  html += '<div style="font-size:10px;color:#475569;line-height:1.6;">Después de 72 horas de despachado el pedido, evalúa la experiencia del cliente y registra su feedback. Esta información te ayuda a mejorar tu servicio.</div>';
  html += '</div>';

  if(!entregados.length){
    html += '<div style="text-align:center;padding:30px 0;color:#334155;font-size:11px;">Cuando marques pedidos como <strong style="color:#22c55e;">Despachados</strong>, aparecerán aquí para evaluarlos.</div>';
    return html;
  }

  html += entregados.map(function(p){
    var s = sat[p.id] || {};
    var tsEnt = p.tsEntregado ? new Date(p.tsEntregado) : null;
    var ahora = new Date();
    var horasTransc = tsEnt ? Math.floor((ahora - tsEnt) / 3600000) : 999;
    var listo = horasTransc >= 72;
    var horasRest = Math.max(0, 72 - horasTransc);

    var card = '<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(168,85,247,0.12);border-radius:12px;padding:14px;margin-bottom:10px;">';

    // Header pedido
    card += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">';
    card += '<div style="flex:1;">';
    card += '<div style="font-size:12px;font-weight:600;color:#e2e8f0;">'+p.nombre+'</div>';
    if(tsEnt) card += '<div style="font-size:9px;color:#475569;margin-top:1px;">Despachado: '+tsEnt.toLocaleDateString('es-CO',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})+'</div>';
    card += '</div>';

    if(!listo){
      card += '<div style="text-align:right;">';
      card += '<div style="font-size:9px;color:#475569;">Disponible en</div>';
      card += '<div style="font-family:Space Mono,monospace;font-size:16px;color:#f59e0b;">'+horasRest+'h</div>';
      card += '</div>';
    }
    card += '</div>';

    if(!listo){
      // Barra de progreso 72h
      var pct = Math.min(100, Math.floor(horasTransc/72*100));
      card += '<div style="margin-bottom:8px;">';
      card += '<div style="display:flex;justify-content:space-between;font-size:8px;color:#334155;margin-bottom:4px;"><span>Período de espera (72h)</span><span>'+horasTransc+'h / 72h</span></div>';
      card += '<div style="height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#c084fc,#7c3aed);border-radius:3px;"></div></div>';
      card += '</div>';
      card += '<div style="font-size:9px;color:#334155;text-align:center;">Podrás evaluar la satisfacción del cliente en '+horasRest+' horas.</div>';
      card += '</div>';
      return card;
    }

    // Ya pasaron 72h — mostrar formulario / resultado
    if(s.calificacion){
      // Ya evaluado — mostrar resultado
      var calColors = { satisfecho:'#22c55e', normal:'#f59e0b', insatisfecho:'#ef4444' };
      var calIcons  = { satisfecho:'😊', normal:'😐', insatisfecho:'😞' };
      var calLabels = { satisfecho:'Satisfecho', normal:'Normal', insatisfecho:'Insatisfecho' };
      var col = calColors[s.calificacion]||'#475569';

      card += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:8px;">';
      card += '<span style="font-size:24px;">'+(calIcons[s.calificacion]||'')+'</span>';
      card += '<div><div style="font-size:11px;font-weight:600;color:'+col+';">'+(calLabels[s.calificacion]||s.calificacion)+'</div>';
      card += '<div style="font-size:9px;color:#475569;margin-top:1px;">Evaluado el '+new Date(s.ts).toLocaleDateString('es-CO',{day:'numeric',month:'short',year:'numeric'})+'</div></div>';
      card += '<div style="flex:1;"></div>';
      card += '<button onclick="window._pedSatEdit(\''+p.id+'\')" style="padding:3px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#475569;font-size:9px;cursor:pointer;">Editar</button>';
      card += '</div>';

      if(s.comentario){
        card += '<div style="background:rgba(255,255,255,0.02);border-left:3px solid '+col+';border-radius:6px;padding:8px 12px;margin-bottom:8px;font-size:10px;color:#94a3b8;line-height:1.5;">💬 '+s.comentario+'</div>';
      }

      if(s.evidencias && s.evidencias.length){
        card += '<div style="font-size:8px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;">Evidencias</div>';
        card += '<div style="display:flex;flex-direction:column;gap:4px;">';
        s.evidencias.forEach(function(ev, ei){
          var evIcon = ev.tipo==='queja'?'😠': ev.tipo==='agradecimiento'?'🙏': ev.tipo==='recomendacion'?'💡': '📝';
          var evColor = ev.tipo==='queja'?'#ef4444': ev.tipo==='agradecimiento'?'#22c55e': ev.tipo==='recomendacion'?'#06b6d4': '#475569';
          card += '<div style="display:flex;align-items:flex-start;gap:6px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:6px;padding:6px 8px;">';
          card += '<span style="font-size:13px;">'+evIcon+'</span>';
          card += '<div style="flex:1;"><div style="font-size:9px;color:'+evColor+';text-transform:capitalize;margin-bottom:2px;">'+ev.tipo+'</div>';
          card += '<div style="font-size:10px;color:#94a3b8;line-height:1.4;">'+ev.texto+'</div></div>';
          card += '<button onclick="window._pedEvDel(\''+p.id+'\','+ei+')" style="background:none;border:none;color:#334155;cursor:pointer;font-size:11px;padding:0;flex-shrink:0;">✕</button>';
          card += '</div>';
        });
        card += '</div>';
      }

      // Agregar nueva evidencia
      card += _renderEvForm(p.id);

    } else {
      // Sin evaluar aún
      card += '<div style="font-size:10px;color:#c084fc;margin-bottom:10px;">Han pasado las 72 horas. ¿Cómo estuvo la experiencia del cliente?</div>';

      card += '<div style="display:flex;gap:8px;margin-bottom:12px;justify-content:center;">';
      ['satisfecho','normal','insatisfecho'].forEach(function(cal){
        var cc = {satisfecho:'#22c55e',normal:'#f59e0b',insatisfecho:'#ef4444'}[cal];
        var ci = {satisfecho:'😊',normal:'😐',insatisfecho:'😞'}[cal];
        var cl = {satisfecho:'Satisfecho',normal:'Normal',insatisfecho:'Insatisfecho'}[cal];
        card += '<button onclick="window._pedSatSelectCal(\''+p.id+'\',\''+cal+'\')" id="calBtn-'+p.id+'-'+cal+'" style="flex:1;padding:10px 6px;border-radius:10px;border:2px solid '+cc+'33;background:rgba(0,0,0,0);color:'+cc+';font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:background 0.2s;">';
        card += '<span style="font-size:24px;">'+ci+'</span><span style="font-size:9px;font-weight:600;">'+cl+'</span></button>';
      });
      card += '</div>';

      card += '<div style="margin-bottom:8px;"><div style="font-size:8px;color:#475569;margin-bottom:3px;">Comentario general (opcional)</div>';
      card += '<textarea id="sat-com-'+p.id+'" placeholder="Describe la experiencia del cliente..." style="width:100%;background:#080c18;border:1px solid rgba(168,85,247,0.2);border-radius:7px;padding:7px 9px;color:#e2e8f0;font-size:10px;outline:none;resize:vertical;min-height:56px;"></textarea></div>';

      card += '<div style="display:flex;justify-content:flex-end;">';
      card += '<button onclick="window._pedSatGuardar(\''+p.id+'\')" style="padding:7px 16px;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.4);border-radius:8px;color:#c084fc;font-size:10px;font-weight:600;cursor:pointer;">Guardar evaluación</button>';
      card += '</div>';

      // Agregar evidencia aunque no haya evaluado aún
      card += _renderEvForm(p.id);
    }

    card += '</div>';
    return card;
  }).join('');

  return html;
}

// ── ACCIONES ─────────────────────────────────────────────────────
window._pedAdd = function(){
  var nombre = (document.getElementById('pnf-nombre')||{}).value||'';
  var link   = (document.getElementById('pnf-link')||{}).value||'';
  var fecha  = (document.getElementById('pnf-fecha')||{}).value||'';
  if(!nombre.trim()){ alert('Escribe el nombre o número del pedido.'); return; }
  var arr = _pedLoad();
  arr.unshift({ id:_pedId(), nombre:nombre.trim(), link:link.trim(), fechaEntrega:fecha, estado:'pendiente', fechaCumplida:false, tsCreado:Date.now() });
  _pedSave(arr);
  var root = document.getElementById('ped-root');
  if(root) _renderPedPanel(root);
};

window._pedDel = function(id){
  if(!confirm('¿Eliminar este pedido?')) return;
  var arr = _pedLoad().filter(function(p){ return p.id!==id; });
  _pedSave(arr);
  var root = document.getElementById('ped-root');
  if(root) _renderPedPanel(root);
};

window._pedNextEstado = function(id){
  var arr = _pedLoad();
  var p = arr.find(function(x){ return x.id===id; });
  if(!p) return;
  var next = ESTADO_FLUJO[p.estado];
  if(!next || next===p.estado) return;
  p.estado = next;
  if(next==='entregado') p.tsEntregado = Date.now();
  _pedSave(arr);
  var root = document.getElementById('ped-root');
  if(root) _renderPedPanel(root);
};

window._pedDespachar = function(id){
  var arr = _pedLoad();
  var p = arr.find(function(x){ return x.id===id; });
  if(!p) return;
  p.estado = 'entregado';
  p.tsEntregado = Date.now();
  _pedSave(arr);
  var root = document.getElementById('ped-root');
  if(root){ _renderPedPanel(root); window._pedTab('satisfaccion'); }
};

window._pedSearch = function(){
  var q = (document.getElementById('ped-search')||{}).value||'';
  var list = document.getElementById('ped-list');
  if(list) list.innerHTML = _renderPedList(_pedLoad(), q);
};

// Satisfacción — selección de calificación (highlight botón)
window._pedSatSelectCal = function(pedId, cal){
  ['satisfecho','normal','insatisfecho'].forEach(function(c){
    var btn = document.getElementById('calBtn-'+pedId+'-'+c);
    if(!btn) return;
    var cc = {satisfecho:'#22c55e',normal:'#f59e0b',insatisfecho:'#ef4444'}[c];
    btn.style.background = c===cal ? 'rgba('+{satisfecho:'34,197,94',normal:'245,158,11',insatisfecho:'239,68,68'}[c]+',0.15)' : 'rgba(0,0,0,0)';
    btn.style.borderColor = c===cal ? cc : cc+'33';
  });
  document.getElementById('calBtn-'+pedId+'-'+cal)._selected = cal;
  // Store selection on element for save
  var saveBtn = document.querySelector('[onclick="window._pedSatGuardar(\''+pedId+'\')"]');
  if(saveBtn) saveBtn.dataset.cal = cal;
};

window._pedSatGuardar = function(pedId){
  var saveBtn = document.querySelector('[onclick="window._pedSatGuardar(\''+pedId+'\')"]');
  var cal = saveBtn ? saveBtn.dataset.cal : null;
  // Fallback: check which button is highlighted
  if(!cal){
    ['satisfecho','normal','insatisfecho'].forEach(function(c){
      var btn = document.getElementById('calBtn-'+pedId+'-'+c);
      if(btn && btn.style.background && btn.style.background !== 'rgba(0,0,0,0)' && btn.style.background !== '') cal = c;
    });
  }
  if(!cal){ alert('Selecciona una calificación antes de guardar.'); return; }
  var comentario = (document.getElementById('sat-com-'+pedId)||{}).value||'';
  var sat = _satLoad();
  sat[pedId] = sat[pedId] || {};
  sat[pedId].calificacion = cal;
  sat[pedId].comentario = comentario.trim();
  sat[pedId].ts = Date.now();
  if(!sat[pedId].evidencias) sat[pedId].evidencias = [];
  _satSave(sat);
  var arr = _pedLoad();
  var root = document.getElementById('ped-root');
  if(root){ _renderPedPanel(root); window._pedTab('satisfaccion'); }
};

window._pedSatEdit = function(pedId){
  var sat = _satLoad();
  if(sat[pedId]) delete sat[pedId].calificacion;
  _satSave(sat);
  var arr = _pedLoad();
  var root = document.getElementById('ped-root');
  if(root){ _renderPedPanel(root); window._pedTab('satisfaccion'); }
};

window._pedEvAdd = function(pedId){
  var tipo = (document.getElementById('ev-tipo-'+pedId)||{}).value||'otro';
  var txt  = (document.getElementById('ev-txt-'+pedId)||{}).value||'';
  if(!txt.trim()){ alert('Escribe el texto de la evidencia.'); return; }
  var sat = _satLoad();
  sat[pedId] = sat[pedId] || {};
  sat[pedId].evidencias = sat[pedId].evidencias || [];
  sat[pedId].evidencias.unshift({ tipo:tipo, texto:txt.trim(), ts:Date.now() });
  _satSave(sat);
  var arr = _pedLoad();
  var root = document.getElementById('ped-root');
  if(root){ _renderPedPanel(root); window._pedTab('satisfaccion'); }
};

window._pedEvDel = function(pedId, idx){
  var sat = _satLoad();
  if(sat[pedId] && sat[pedId].evidencias) sat[pedId].evidencias.splice(idx,1);
  _satSave(sat);
  var arr = _pedLoad();
  var root = document.getElementById('ped-root');
  if(root){ _renderPedPanel(root); window._pedTab('satisfaccion'); }
};

window._pedSatEdit = function(pedId){
  var sat = _satLoad();
  if(sat[pedId]){ sat[pedId].calificacion = null; }
  _satSave(sat);
  var arr = _pedLoad();
  var root = document.getElementById('ped-root');
  if(root){ _renderPedPanel(root); window._pedTab('satisfaccion'); }
};

// CALENDARIO DE PEDIDOS
// ══════════════════════════════════════════════════════════════════
var _pedCalSemOff = 0;

function _renderPedCalendario(root){
  _pedCalSemOff = parseInt(localStorage.getItem('cosmo_ped_semoff')||'0');
  _buildPedCal(root);
}

function _fmtDatePed(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function _getLunesPed(){
  var hoy = new Date(); var dw = hoy.getDay();
  var diff = (dw===0)?-6:1-dw;
  var lun = new Date(hoy); lun.setDate(hoy.getDate()+diff+(_pedCalSemOff*7)); lun.setHours(0,0,0,0);
  return lun;
}

function _buildPedCal(root){
  var arr = _pedLoad();
  var sat = _satLoad();
  var lunes = _getLunesPed();
  var dias  = [];
  for(var i=0;i<7;i++){ var d=new Date(lunes); d.setDate(lunes.getDate()+i); dias.push(d); }
  var hoyStr = _fmtDatePed(new Date());
  var DIAS_SHORT = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var DIAS_FULL  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

  // Alertas de esta semana
  var alertas = _getAlertasPedidos();
  var alertasVenc   = alertas.filter(function(a){ return a.tipo==='vencido'; });
  var alertasHoy    = alertas.filter(function(a){ return a.tipo==='hoy'; });
  var alertasProx   = alertas.filter(function(a){ return a.tipo==='proximo'; });
  var alertas72h    = alertas.filter(function(a){ return a.tipo==='72h'; });

  var h = '';

  // Panel de alertas activas
  if(alertas.length){
    if(alertasVenc.length || alertasHoy.length){
      h += '<div style="background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:10px 12px;margin-bottom:8px;">';
      h += '<div style="font-size:9px;color:#ef4444;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">🔴 Requieren atención inmediata</div>';
      alertasVenc.concat(alertasHoy).forEach(function(a){
        h += '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(239,68,68,0.08);">';
        h += '<div style="width:6px;height:6px;border-radius:50%;background:#ef4444;flex-shrink:0;"></div>';
        h += '<span style="flex:1;font-size:10px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+a.pedido.nombre+'</span>';
        h += '<span style="font-size:9px;color:#ef4444;white-space:nowrap;">'+a.label+'</span>';
        h += '</div>';
      });
      h += '</div>';
    }
    if(alertasProx.length){
      h += '<div style="background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.15);border-radius:10px;padding:10px 12px;margin-bottom:8px;">';
      h += '<div style="font-size:9px;color:#f59e0b;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">⚠️ Próximos a vencer</div>';
      alertasProx.forEach(function(a){
        h += '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(245,158,11,0.08);">';
        h += '<div style="width:6px;height:6px;border-radius:50%;background:#f59e0b;flex-shrink:0;"></div>';
        h += '<span style="flex:1;font-size:10px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+a.pedido.nombre+'</span>';
        h += '<span style="font-size:9px;color:#f59e0b;white-space:nowrap;">'+a.label+'</span>';
        h += '</div>';
      });
      h += '</div>';
    }

function _getAlertasPedidos(){
  var arr  = _pedLoad();
  var sat  = _satLoad();
  var hoy  = new Date(); hoy.setHours(0,0,0,0);
  var ahora= Date.now();
  var alertas = [];

  arr.forEach(function(p){
    // Pedidos con fecha de entrega
    if(p.fechaEntrega && p.estado!=='entregado'){
      var fv = new Date(p.fechaEntrega+'T00:00:00');
      var diff = Math.round((fv-hoy)/86400000);
      if(diff < 0){
        alertas.push({ pedido:p, tipo:'vencido', label:'Vencido hace '+Math.abs(diff)+'d', diff:diff });
      } else if(diff===0){
        alertas.push({ pedido:p, tipo:'hoy', label:'Vence hoy', diff:0 });
      } else if(diff<=3){
        alertas.push({ pedido:p, tipo:'proximo', label:'En '+diff+' día'+(diff>1?'s':''), diff:diff });
      }
    }
    // Despachados listos para evaluar (>72h, sin calificación)
    if(p.estado==='entregado' && p.tsEntregado){
      var horasTransc = Math.floor((ahora - p.tsEntregado)/3600000);
      var sData = sat[p.id]||{};
      if(horasTransc >= 72 && !sData.calificacion){
        alertas.push({ pedido:p, tipo:'72h', label:'Listo para evaluar', diff:0 });
      }
    }
  });

  return alertas.sort(function(a,b){ return a.diff-b.diff; });
}

function _renderPedMetricas(arr, sat){
  var ahora = Date.now();
  var MS_7D  = 7  * 86400000;
  var MS_30D = 30 * 86400000;

  // Filtros de rango
  function filtrarRango(rango){
    if(rango === '7d')  return arr.filter(function(p){ return p.tsCreado && (ahora - p.tsCreado) <= MS_7D; });
    if(rango === 'mes') return arr.filter(function(p){ return p.tsCreado && (ahora - p.tsCreado) <= MS_30D; });
    return arr; // total
  }

  var html = '';

  // Selector de rango
  html += '<div style="display:flex;gap:6px;margin-bottom:16px;" id="met-rango-btns">';
  ['7d','mes','total'].forEach(function(r){
    var label = r==='7d'?'7 días': r==='mes'?'Este mes':'Total';
    var active = r==='mes';
    html += '<button onclick="window._pedMetRango(\''+r+'\')" id="metbtn-'+r+'" style="padding:4px 12px;border-radius:6px;border:1px solid rgba(6,182,212,'+(active?'0.6':'0.2')+');background:rgba(6,182,212,'+(active?'0.18':'0.05')+');color:#06b6d4;font-size:9px;cursor:pointer;font-family:Space Mono,monospace;">'+label+'</button>';
  });
  html += '</div>';

  html += '<div id="met-body">'+_buildMetricas(arr, sat, 'mes')+'</div>';
  return html;
}

function _buildMetricas(arr, sat, rango){
  var ahora = Date.now();
  var MS_7D  = 7  * 86400000;
  var MS_30D = 30 * 86400000;
  var filtrados;
  if(rango==='7d')  filtrados = arr.filter(function(p){ return p.tsCreado && (ahora-p.tsCreado)<=MS_7D; });
  else if(rango==='mes') filtrados = arr.filter(function(p){ return p.tsCreado && (ahora-p.tsCreado)<=MS_30D; });
  else filtrados = arr;

  var total      = filtrados.length;
  var despachados = filtrados.filter(function(p){ return p.estado==='entregado'; });
  var activos    = filtrados.filter(function(p){ return p.estado!=='entregado'; }).length;
  var nDesp      = despachados.length;

  // Tiempo promedio despacho (ms → días)
  var tiempos = despachados.filter(function(p){ return p.tsCreado && p.tsEntregado; })
    .map(function(p){ return p.tsEntregado - p.tsCreado; });
  var promDias = tiempos.length
    ? (tiempos.reduce(function(a,b){ return a+b; },0) / tiempos.length / 86400000).toFixed(1)
    : '—';

  // Satisfacción
  var satData = _satLoad();
  var evaluados = despachados.filter(function(p){ return satData[p.id] && satData[p.id].calificacion; });
  var nSat  = evaluados.filter(function(p){ return satData[p.id].calificacion==='satisfecho'; }).length;
  var nNorm = evaluados.filter(function(p){ return satData[p.id].calificacion==='normal'; }).length;
  var nInsat= evaluados.filter(function(p){ return satData[p.id].calificacion==='insatisfecho'; }).length;
  var nEval = evaluados.length;
  var pctSat  = nEval ? Math.round(nSat/nEval*100)  : 0;
  var pctNorm = nEval ? Math.round(nNorm/nEval*100) : 0;
  var pctInsat= nEval ? Math.round(nInsat/nEval*100): 0;
  var tasaDesp = total ? Math.round(nDesp/total*100) : 0;

  // Cumplimiento de fechas (automático basado en producción)
  var conFecha = filtrados.filter(function(p){ return !!p.fechaEntrega; });
  var nATiempo=0, nFuera=0, nVencidos=0, nSinProd=0;
  conFecha.forEach(function(p){
    var fVenc = new Date(p.fechaEntrega+'T00:00:00');
    var hoyD  = new Date(); hoyD.setHours(0,0,0,0);
    var tieneEnFecha=false, tieneProd=false;
    try{
      for(var _ki=0; _ki<localStorage.length; _ki++){
        var _kk=localStorage.key(_ki);
        if(!_kk||!_kk.startsWith('cosmo_prod_')) continue;
        var _dd=JSON.parse(localStorage.getItem(_kk)||'null');
        if(_dd&&_dd._saved&&_dd.despachos){
          _dd.despachos.forEach(function(desp){
            if(desp.pedidoId===p.id){
              tieneProd=true;
              var fp=new Date(_kk.replace('cosmo_prod_','')+'T00:00:00');
              if(fp<=fVenc) tieneEnFecha=true;
            }
          });
        }
      }
    }catch(e){}
    if(p.estado==='entregado'){
      if(tieneEnFecha) nATiempo++;
      else if(tieneProd) nFuera++;
      else nSinProd++;
    } else if(fVenc < hoyD && !tieneEnFecha){
      nVencidos++;
    }
  });
  var nConFecha = conFecha.length;
  var pctATiempo = nConFecha ? Math.round(nATiempo/nConFecha*100) : 0;

  var html = '';

  // ── KPI Cards ──
  html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;">';

  function kpiCard(icon, val, label, color){
    return '<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px;text-align:center;">'
      +'<div style="font-size:20px;margin-bottom:4px;">'+icon+'</div>'
      +'<div style="font-family:Space Mono,monospace;font-size:22px;font-weight:700;color:'+color+';">'+val+'</div>'
      +'<div style="font-size:9px;color:#475569;margin-top:2px;letter-spacing:0.5px;">'+label+'</div>'
      +'</div>';
  }

  html += kpiCard('📦', nDesp, 'Despachados', '#22c55e');
  html += kpiCard('⏳', activos, 'En curso', '#f59e0b');
  html += kpiCard('⚡', promDias+'d', 'Tiempo prom. despacho', '#06b6d4');
  html += kpiCard('✅', pctATiempo+'%', 'Cumplimiento de fechas', pctATiempo>=80?'#22c55e':pctATiempo>=50?'#f59e0b':'#ef4444');
  html += '</div>';

  // ── Tasa de despacho ──
  html += '<div style="background:rgba(34,197,94,0.04);border:1px solid rgba(34,197,94,0.12);border-radius:10px;padding:12px;margin-bottom:12px;">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
  html += '<span style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#22c55e;">Tasa de despacho</span>';
  html += '<span style="font-family:Space Mono,monospace;font-size:14px;color:#22c55e;font-weight:700;">'+tasaDesp+'%</span>';
  html += '</div>';
  html += '<div style="height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;">';
  html += '<div style="height:100%;width:'+tasaDesp+'%;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:3px;transition:width 0.4s;"></div>';
  html += '</div></div>';

  // ── Cumplimiento de fechas ──
  if(nConFecha > 0){
    html += '<div style="background:rgba(6,182,212,0.04);border:1px solid rgba(6,182,212,0.12);border-radius:10px;padding:12px;margin-bottom:12px;">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">';
    html += '<span style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#06b6d4;">📅 Cumplimiento de fechas</span>';
    html += '<span style="font-family:Space Mono,monospace;font-size:14px;color:#06b6d4;font-weight:700;">'+nConFecha+' con fecha</span>';
    html += '</div>';
    [
      { label:'✅ A tiempo',       n:nATiempo,  color:'#22c55e' },
      { label:'⚠️ Fuera de fecha', n:nFuera,    color:'#f59e0b' },
      { label:'🔴 Vencidos activos',n:nVencidos, color:'#ef4444' },
      { label:'📦 Sin prod. vinc.', n:nSinProd,  color:'#334155' },
    ].forEach(function(row){
      if(row.n === 0) return;
      var pct = Math.round(row.n/nConFecha*100);
      html += '<div style="margin-bottom:7px;">';
      html += '<div style="display:flex;justify-content:space-between;font-size:9px;color:'+row.color+';margin-bottom:3px;">';
      html += '<span>'+row.label+'</span><span style="font-family:Space Mono,monospace;">'+row.n+' ('+pct+'%)</span></div>';
      html += '<div style="height:5px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;">';
      html += '<div style="height:100%;width:'+pct+'%;background:'+row.color+';border-radius:3px;"></div></div>';
      html += '</div>';
    });
    html += '</div>';
  }
  html += '<div style="background:rgba(168,85,247,0.04);border:1px solid rgba(168,85,247,0.12);border-radius:10px;padding:12px;margin-bottom:12px;">';
  html += '<div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#c084fc;margin-bottom:10px;">⭐ Satisfacción al cliente <span style="color:#334155;font-weight:normal;">('+nEval+' evaluados)</span></div>';

  if(!nEval){
    html += '<div style="font-size:10px;color:#334155;text-align:center;padding:10px 0;">Sin evaluaciones en este rango.</div>';
  } else {
    [
      { label:'😊 Satisfecho',    pct:pctSat,   color:'#22c55e', n:nSat  },
      { label:'😐 Normal',        pct:pctNorm,  color:'#f59e0b', n:nNorm },
      { label:'😞 Insatisfecho',  pct:pctInsat, color:'#ef4444', n:nInsat}
    ].forEach(function(row){
      html += '<div style="margin-bottom:8px;">';
      html += '<div style="display:flex;justify-content:space-between;font-size:9px;color:'+row.color+';margin-bottom:3px;">';
      html += '<span>'+row.label+'</span><span style="font-family:Space Mono,monospace;">'+row.n+' ('+row.pct+'%)</span></div>';
      html += '<div style="height:5px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;">';
      html += '<div style="height:100%;width:'+row.pct+'%;background:'+row.color+';border-radius:3px;"></div>';
      html += '</div></div>';
    });
  }
  html += '</div>';

  // ── Historial por mes (últimos 4 meses con pedidos) ──
  var byMes = {};
  arr.forEach(function(p){
    if(!p.tsCreado) return;
    var d = new Date(p.tsCreado);
    var key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    byMes[key] = byMes[key] || { total:0, desp:0 };
    byMes[key].total++;
    if(p.estado==='entregado') byMes[key].desp++;
  });
  var meses = Object.keys(byMes).sort().reverse().slice(0,4).reverse();
  if(meses.length > 1){
    html += '<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px;">';
    html += '<div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#475569;margin-bottom:10px;">📅 Historial mensual</div>';
    html += '<div style="display:flex;gap:6px;align-items:flex-end;height:60px;margin-bottom:6px;">';
    var maxVal = Math.max.apply(null, meses.map(function(m){ return byMes[m].total; }))||1;
    meses.forEach(function(m){
      var d = byMes[m];
      var h = Math.max(8, Math.round(d.total/maxVal*52));
      var hd = Math.max(0, Math.round(d.desp/maxVal*52));
      html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">';
      html += '<div style="font-size:8px;color:#93b4f0;font-family:Space Mono,monospace;">'+d.total+'</div>';
      html += '<div style="width:100%;position:relative;height:'+h+'px;background:rgba(147,180,240,0.1);border-radius:3px 3px 0 0;overflow:hidden;">';
      html += '<div style="position:absolute;bottom:0;width:100%;height:'+Math.round(hd/d.total*h)+'px;background:#22c55e;border-radius:3px 3px 0 0;"></div>';
      html += '</div></div>';
    });
    html += '</div>';
    html += '<div style="display:flex;gap:6px;">';
    meses.forEach(function(m){
      var parts = m.split('-');
      var MN=['En','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      html += '<div style="flex:1;text-align:center;font-size:8px;color:#334155;">'+MN[parseInt(parts[1])-1]+' '+parts[0].slice(2)+'</div>';
    });
    html += '</div>';
    html += '<div style="display:flex;gap:12px;margin-top:8px;">';
    html += '<div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;background:#22c55e;border-radius:2px;"></div><span style="font-size:8px;color:#475569;">Despachados</span></div>';
    html += '<div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;background:rgba(147,180,240,0.2);border-radius:2px;"></div><span style="font-size:8px;color:#475569;">Total</span></div>';
    html += '</div></div>';
  }

  return html;
}

window._pedMetRango = function(rango){
  ['7d','mes','total'].forEach(function(r){
    var btn = document.getElementById('metbtn-'+r);
    if(!btn) return;
    var active = r===rango;
    btn.style.borderColor = active ? 'rgba(6,182,212,0.6)' : 'rgba(6,182,212,0.2)';
    btn.style.background  = active ? 'rgba(6,182,212,0.18)': 'rgba(6,182,212,0.05)';
  });
  var body = document.getElementById('met-body');
  if(body) body.innerHTML = _buildMetricas(_pedLoad(), _satLoad(), rango);
};

// ══════════════════════════════════════════════════════════════════
// TAB PLANTILLAS
// ══════════════════════════════════════════════════════════════════
function _renderPedPlantillas(arr){
  var html = '';

  // Selector de rango (mismo estilo que Métricas)
  html += '<div style="display:flex;gap:6px;margin-bottom:16px;" id="plan-rango-btns">';
  ['7d','mes','total'].forEach(function(r){
    var label = r==='7d'?'7 días': r==='mes'?'Este mes':'Total';
    var active = r==='mes';
    html += '<button onclick="window._pedPlanRango(\''+r+'\')" id="planbtn-'+r+'" style="padding:4px 12px;border-radius:6px;border:1px solid rgba(245,158,11,'+(active?'0.6':'0.2')+');background:rgba(245,158,11,'+(active?'0.18':'0.05')+');color:#f59e0b;font-size:9px;cursor:pointer;font-family:Space Mono,monospace;">'+label+'</button>';
  });
  html += '</div>';

  html += '<div id="plan-body">'+_buildPlantillas(arr, 'mes')+'</div>';
  return html;
}

function _buildPlantillas(arr, rango){
  var ahora = Date.now();
  var MS_7D  = 7  * 86400000;
  var MS_30D = 30 * 86400000;

  // Calcular fecha límite para filtrar despachos de producción
  var fechaLimite = null;
  if(rango==='7d'){
    fechaLimite = new Date(ahora - MS_7D);
  } else if(rango==='mes'){
    fechaLimite = new Date(ahora - MS_30D);
  }

  // Cargar despachos de producción filtrados por rango
  var despProd = [];
  for(var i=0; i<localStorage.length; i++){
    var k = localStorage.key(i);
    if(!k || !k.startsWith('cosmo_prod_')) continue;
    try{
      var d = JSON.parse(localStorage.getItem(k));
      if(d && d.despachos && d._saved){
        var fecha = k.replace('cosmo_prod_','');
        // Filtrar por rango
        if(fechaLimite){
          var fechaProd = new Date(fecha+'T00:00:00');
          if(fechaProd < fechaLimite) continue;
        }
        d.despachos.forEach(function(desp){
          if(desp.pedidoId){
            despProd.push({ pedidoId:desp.pedidoId, plantillas:desp.plantillas||0, fecha:fecha, nombre:desp.nombre, link:desp.link });
          }
        });
      }
    }catch(e){}
  }

  // Agrupar plantillas por pedido
  var plantByPed = {};
  despProd.forEach(function(d){
    if(!plantByPed[d.pedidoId]) plantByPed[d.pedidoId] = { total:0, entradas:[] };
    plantByPed[d.pedidoId].total += d.plantillas;
    plantByPed[d.pedidoId].entradas.push({ fecha:d.fecha, plantillas:d.plantillas });
  });

  // Combinar con datos de pedidos
  var pedMap = {};
  arr.forEach(function(p){ pedMap[p.id] = p; });

  // Construir lista ordenada por plantillas
  var lista = Object.keys(plantByPed).map(function(pid){
    var ped = pedMap[pid];
    var pp  = plantByPed[pid];
    return {
      id: pid,
      nombre: ped ? ped.nombre : (pp.entradas[0]&&pp.entradas[0].nombre)||'Pedido desconocido',
      link:   ped ? (ped.link||'') : (pp.entradas[0]&&pp.entradas[0].link)||'',
      estado: ped ? ped.estado : 'entregado',
      totalPlant: pp.total,
      entradas: pp.entradas.sort(function(a,b){ return a.fecha>b.fecha?1:-1; })
    };
  }).sort(function(a,b){ return b.totalPlant - a.totalPlant; });

  // Pedidos activos sin plantillas en este rango
  var sinPlant = arr.filter(function(p){
    return p.estado!=='entregado' && !plantByPed[p.id];
  });

  var html = '';

  if(!lista.length && !sinPlant.length){
    html += '<div style="text-align:center;padding:40px 0;color:#334155;font-size:11px;">Sin despachos de producción en este período.<br><span style="font-size:9px;margin-top:4px;display:block;">Vincula pedidos desde Inventario & Producción → Despachos.</span></div>';
    return html;
  }

  // KPI resumen
  var totalPlant = lista.reduce(function(s,p){ return s+p.totalPlant; },0);
  html += '<div style="display:flex;gap:8px;margin-bottom:14px;">';
  html += '<div style="flex:1;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.15);border-radius:8px;padding:10px;text-align:center;">';
  html += '<div style="font-family:Space Mono,monospace;font-size:20px;color:#f59e0b;font-weight:700;">'+totalPlant+'</div>';
  html += '<div style="font-size:8px;color:#475569;margin-top:2px;">Plantillas totales</div></div>';
  html += '<div style="flex:1;background:rgba(147,180,240,0.06);border:1px solid rgba(147,180,240,0.12);border-radius:8px;padding:10px;text-align:center;">';
  html += '<div style="font-family:Space Mono,monospace;font-size:20px;color:#93b4f0;font-weight:700;">'+lista.length+'</div>';
  html += '<div style="font-size:8px;color:#475569;margin-top:2px;">Pedidos con producción</div></div>';
  if(lista.length){
    var promPlant = Math.round(totalPlant/lista.length);
    html += '<div style="flex:1;background:rgba(6,182,212,0.06);border:1px solid rgba(6,182,212,0.12);border-radius:8px;padding:10px;text-align:center;">';
    html += '<div style="font-family:Space Mono,monospace;font-size:20px;color:#06b6d4;font-weight:700;">'+promPlant+'</div>';
    html += '<div style="font-size:8px;color:#475569;margin-top:2px;">Promedio / pedido</div></div>';
  }
  html += '</div>';

  // Ranking
  if(lista.length){
    var maxPlant = lista[0].totalPlant || 1;
    html += '<div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#475569;margin-bottom:8px;">🏆 Ranking por volumen</div>';
    lista.forEach(function(p, idx){
      var est = PED_ESTADOS[p.estado] || PED_ESTADOS.pendiente;
      var pct = Math.round(p.totalPlant/maxPlant*100);
      html += '<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-left:3px solid '+est.color+';border-radius:9px;padding:10px 12px;margin-bottom:6px;">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">';
      html += '<span style="font-family:Space Mono,monospace;font-size:11px;color:#334155;">#'+(idx+1)+'</span>';
      html += '<span style="flex:1;font-size:11px;font-weight:600;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+p.nombre+'</span>';
      html += '<span style="padding:2px 7px;border-radius:10px;font-size:9px;background:'+est.bg+';color:'+est.color+';border:1px solid '+est.color+'33;white-space:nowrap;">'+est.icon+' '+est.label+'</span>';
      html += '<span style="font-family:Space Mono,monospace;font-size:14px;font-weight:700;color:#f59e0b;white-space:nowrap;">'+p.totalPlant+' <span style="font-size:8px;color:#475569;">plant.</span></span>';
      html += '</div>';
      html += '<div style="height:4px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;margin-bottom:6px;">';
      html += '<div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#f59e0b,#d97706);border-radius:2px;"></div>';
      html += '</div>';
      html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">';
      if(p.link){
        html += '<a href="'+p.link+'" target="_blank" style="padding:2px 9px;background:rgba(6,182,212,0.08);border:1px solid rgba(6,182,212,0.25);border-radius:5px;color:#06b6d4;font-size:9px;text-decoration:none;white-space:nowrap;">🔗 Shopify</a>';
      }
      p.entradas.forEach(function(e){
        html += '<span style="font-size:8px;color:#334155;background:rgba(255,255,255,0.03);border-radius:4px;padding:2px 6px;">'+e.fecha+' · '+e.plantillas+' p.</span>';
      });
      html += '</div></div>';
    });
  }

  // Activos sin plantillas
  if(sinPlant.length){
    html += '<div style="margin-top:14px;">';
    html += '<div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#334155;margin-bottom:8px;">⏳ Activos sin producción asignada</div>';
    sinPlant.forEach(function(p){
      html += '<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(255,255,255,0.01);border:1px solid rgba(255,255,255,0.04);border-radius:7px;margin-bottom:4px;">';
      html += '<span style="flex:1;font-size:10px;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+p.nombre+'</span>';
      html += '<span style="font-size:9px;color:#334155;">Sin plantillas</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  return html;
}

window._pedPlanRango = function(rango){
  ['7d','mes','total'].forEach(function(r){
    var btn = document.getElementById('planbtn-'+r);
    if(!btn) return;
    var active = r===rango;
    btn.style.borderColor = active ? 'rgba(245,158,11,0.6)' : 'rgba(245,158,11,0.2)';
    btn.style.background  = active ? 'rgba(245,158,11,0.18)': 'rgba(245,158,11,0.05)';
  });
  var body = document.getElementById('plan-body');
  if(body) body.innerHTML = _buildPlantillas(_pedLoad(), rango);
};
