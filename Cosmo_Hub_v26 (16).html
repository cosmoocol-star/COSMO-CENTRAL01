    // ── Barras históricas ──
    if(ingresos.length){
      html+='<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px;">';
      html+='<div style="font-size:8px;text-transform:uppercase;letter-spacing:1px;color:#475569;margin-bottom:10px;">📊 Ingresos vs Gastos — histórico</div>';
      html+='<canvas id="rent-bar-chart" style="width:100%;height:150px;display:block;"></canvas>';
      html+='<div style="display:flex;gap:12px;margin-top:8px;justify-content:center;">';
      html+='<div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;border-radius:2px;background:#22c55e;"></div><span style="font-size:8px;color:#475569;">Ingresos</span></div>';
      html+='<div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;border-radius:2px;background:rgba(239,68,68,0.8);"></div><span style="font-size:8px;color:#475569;">Gastos</span></div>';
      html+='<div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;border-radius:50%;background:#06b6d4;"></div><span style="font-size:8px;color:#475569;">Excedente</span></div>';
      html+='</div></div>';

    if(!ingresoEst&&!mesTotal){
      html+='<div style="margin-top:10px;font-size:9px;color:#334155;text-align:center;">Sin datos para '+ml(mesCur)+' — registra ingresos y gastos</div>';

  function drawRentChart(){
    var canvas=document.getElementById('rent-chart'); if(!canvas) return;
    var mes=_rentMes||new Date().toISOString().slice(0,7);
    // Filter by active tipo filter
    var mesGastosAll=gastos.filter(function(g){return g.fecha&&g.fecha.slice(0,7)===mes;});
    var mesGastos=_rentTipoFilter==='all'?mesGastosAll:mesGastosAll.filter(function(g){return (g.tipo||'otro')===_rentTipoFilter;});
    var dpr=window.devicePixelRatio||1;
    var cssW=canvas.offsetWidth||300, cssH=200;
    canvas.width=Math.round(cssW*dpr); canvas.height=Math.round(cssH*dpr);
    canvas.style.width=cssW+'px'; canvas.style.height=cssH+'px';
    var W=canvas.width, H=canvas.height;
    var ctx=canvas.getContext('2d');
    ctx.scale(dpr,dpr);
    var cW=cssW, cH=cssH;
    ctx.clearRect(0,0,cW,cH);
    if(!mesGastos.length){
      ctx.fillStyle='#475569'; ctx.font='11px DM Sans,sans-serif'; ctx.textAlign='center';
      ctx.fillText('Sin gastos'+(  _rentTipoFilter!=='all'?' de tipo '+_rentTipoFilter:'')+' en este mes',cW/2,cH/2); return;
    }
    // Aggregate by tipo
    var byTipo={};
    mesGastos.forEach(function(g){
      var t=g.tipo||'otro';
      byTipo[t]=(byTipo[t]||0)+(parseFloat(g.monto)||0);
    });
    var entries=Object.entries(byTipo).sort(function(a,b){return b[1]-a[1];});
    var total=entries.reduce(function(s,e){return s+e[1];},0);
    var COLORS={'insumo':'#06b6d4','variable':'#a855f7','fijo':'#f97316','otro':'#64748b','inversión':'#fbbf24'};
    var LABELS={'insumo':'Insumo','variable':'Variable','fijo':'Fijo','otro':'Otro','inversión':'Inversión'};
    // Donut — bigger, centered in left half
    var r=Math.min(cH/2-14, 72), cx=r+18, cy=cH/2, ri=r*0.52;
    var startAngle=-Math.PI/2;
    entries.forEach(function(e){
      var sweep=(e[1]/total)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,startAngle,startAngle+sweep);
      ctx.closePath();
      ctx.fillStyle=COLORS[e[0]]||'#64748b';
      ctx.fill();
      // Segment border
      ctx.strokeStyle='#0a0f1e'; ctx.lineWidth=1.5;
      ctx.stroke();
      startAngle+=sweep;
    });
    // Hole
    ctx.beginPath(); ctx.arc(cx,cy,ri,0,Math.PI*2);
    ctx.fillStyle='#0a0f1e'; ctx.fill();
    // Total label inside
    ctx.fillStyle='#94a3b8'; ctx.font='bold 10px DM Sans,sans-serif'; ctx.textAlign='center';
    ctx.fillText('Total',cx,cy-6);
    ctx.fillStyle='#f59e0b'; ctx.font='bold 13px Space Mono,monospace';
    ctx.fillText('$'+Math.round(total/1000)+'k',cx,cy+10);
    // Legend — right side, bigger text
    var lx=cx+r+18, ly=16, lineH=22;
    entries.forEach(function(e){
      var pct=Math.round(e[1]/total*100);
      // Color dot
      ctx.beginPath(); ctx.arc(lx+5,ly+4,5,0,Math.PI*2);
      ctx.fillStyle=COLORS[e[0]]||'#64748b'; ctx.fill();
      // Label
      ctx.fillStyle='#cbd5e1'; ctx.font='10px DM Sans,sans-serif'; ctx.textAlign='left';
      ctx.fillText(LABELS[e[0]]||e[0],lx+14,ly+8);
      // Amount + pct
      ctx.fillStyle=COLORS[e[0]]||'#94a3b8'; ctx.font='bold 10px Space Mono,monospace';
      ctx.fillText('$'+Math.round(e[1]/1000)+'k  '+pct+'%',lx+14,ly+20);
      ly+=lineH+4;
    });
  }

  function drawRentBarChart(){
    var canvas=document.getElementById('rent-bar-chart'); if(!canvas) return;
    var dpr=window.devicePixelRatio||1;
    var cssW=canvas.offsetWidth||340, cssH=150;
    canvas.width=Math.round(cssW*dpr); canvas.height=Math.round(cssH*dpr);
    canvas.style.width=cssW+'px'; canvas.style.height=cssH+'px';
    var ctx=canvas.getContext('2d');
    ctx.scale(dpr,dpr);
    var W=cssW, H=cssH;
    ctx.clearRect(0,0,W,H);
    var gastosByMes={};
    gastos.forEach(function(g){ if(!g.fecha) return; var m=g.fecha.slice(0,7); gastosByMes[m]=(gastosByMes[m]||0)+(parseFloat(g.monto)||0); });
    var data=ingresos.slice().sort(function(a,b){return a.mes>b.mes?1:-1;});
    if(!data.length){
      ctx.fillStyle='#334155'; ctx.font='10px sans-serif'; ctx.textAlign='center';
      ctx.fillText('Sin datos',W/2,H/2); return;
    }
    var MN=['E','F','M','A','M','J','J','A','S','O','N','D'];
    var maxVal=Math.max.apply(null,data.map(function(d){return Math.max(d.monto,gastosByMes[d.mes]||0);}));
    if(!maxVal) return;
    var padL=6,padR=6,padT=10,padB=22;
    var chartW=W-padL-padR, chartH=H-padT-padB;
    var barGroup=chartW/data.length;
    var barW=Math.max(4,barGroup*0.28), gap=barW*0.3;
    // Highlight selected month
    var selMes=_rentMes||new Date().toISOString().slice(0,7);
    data.forEach(function(d,i){
      var ing=d.monto, gas=gastosByMes[d.mes]||0, exc=ing-gas;
      var x=padL+i*barGroup+barGroup/2;
      var ingH=Math.round((ing/maxVal)*chartH);
      var gasH=Math.round((gas/maxVal)*chartH);
      var excH=Math.max(0,Math.round((exc/maxVal)*chartH));
      var isSel=d.mes===selMes;
      // Highlight selected
      if(isSel){
        ctx.fillStyle='rgba(245,158,11,0.07)';
        ctx.fillRect(x-barGroup/2+2,padT,barGroup-4,chartH);
      }
      ctx.fillStyle=isSel?'#22c55e':'rgba(34,197,94,0.6)';
      ctx.fillRect(x-barW-gap/2,padT+chartH-ingH,barW,ingH);
      ctx.fillStyle=isSel?'rgba(239,68,68,1)':'rgba(239,68,68,0.5)';
      ctx.fillRect(x+gap/2,padT+chartH-gasH,barW,gasH);
      if(exc>0){
        ctx.fillStyle=isSel?'#06b6d4':'rgba(6,182,212,0.6)';
        ctx.beginPath(); ctx.arc(x,padT+chartH-excH-3,isSel?4:2.5,0,Math.PI*2); ctx.fill();
      }
      var mesIdx=parseInt(d.mes.slice(5,7))-1;
      ctx.fillStyle=isSel?'#f59e0b':'#475569';
      ctx.font=(isSel?'bold ':'')+'8px sans-serif'; ctx.textAlign='center';
      ctx.fillText(MN[mesIdx],x,H-6);
    });
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(padL,padT+chartH); ctx.lineTo(W-padR,padT+chartH); ctx.stroke();
  }

    });
    html+='</div>';

    // ── Fila 3: tags + búsqueda ──
    html+='<div style="display:flex;gap:5px;align-items:center;margin-bottom:10px;flex-wrap:wrap;">';
    tagKeys2.forEach(function(tag){
      var isAt=_histTag===tag;
      var tC2=isAt?'#a855f7':'rgba(255,255,255,0.1)';

      var tCol2=isAt?'#a855f7':'#475569';

    html+='</tbody></table></div>';

  var _fidKey = 'cosmo_fidelizacion';
  function _fidLoad(){ try{ return JSON.parse(localStorage.getItem(_fidKey)||'{}'); }catch(e){ return {}; } }

  function _getTriKey(year, tri){ return year+'-T'+tri; }
  function _triActual(){
    var hoy = new Date();
    var mes = hoy.getMonth(); // 0-11
    var tri = mes < 3 ? 1 : mes < 6 ? 2 : mes < 9 ? 3 : 4;
    return { year: hoy.getFullYear(), tri: tri, key: _getTriKey(hoy.getFullYear(), tri) };
  }
  function _triLabel(year, tri){
    var meses = [['Ene','Feb','Mar'],['Abr','Jun','Jun'],['Jul','Ago','Sep'],['Oct','Nov','Dic']];
    return 'T'+tri+' '+year+' · '+meses[tri-1][0]+'-'+meses[tri-1][2];
  }
  function _triMeses(year, tri){
    var starts = [0,3,6,9]; // month index start
    var s = starts[tri-1];
    var result = [];
    for(var i=0;i<3;i++) result.push(year+'-'+String(s+i+1).padStart(2,'0'));
    return result;
  }

  // Normaliza un nombre para comparación: minúsculas, sin tildes, trim, colapsa espacios
  function _normNombre(n){
    return (n||'').toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')  // quitar tildes
      .replace(/[^a-z0-9\s]/g,' ')                       // solo alfanumérico
      .replace(/\s+/g,' ')                                // colapsar espacios
      .trim();
  }

  // Carga el mapa de aliases guardados: { normKey: canonicalName }
  function _loadAliases(){ try{ return JSON.parse(localStorage.getItem('cosmo_fid_aliases')||'{}'); }catch(e){ return {}; } }
  function _saveAliases(d){ localStorage.setItem('cosmo_fid_aliases', JSON.stringify(d)); }

  // Resuelve el nombre canónico: busca en aliases, si no está usa el nombre normalizado capitalizado
  function _resolveNombre(raw, aliases){
    var norm = _normNombre(raw);
    if(aliases[norm]) return aliases[norm];
    // Capitalizar cada palabra como nombre canónico por defecto
    return raw.trim().replace(/\w\S*/g, function(w){ return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase(); });
  }

  function _calcRanking(year, tri){
    var peds = [];
    try{ peds = JSON.parse(localStorage.getItem('cosmo_pedidos_v2')||'[]'); }catch(e){}
    var meses   = _triMeses(year, tri);
    var aliases = _loadAliases();

    // Pre-cargar todos los despachos de producción una sola vez
    var despPorPedido = {};
    try{
      for(var ki=0;ki<localStorage.length;ki++){
        var kk=localStorage.key(ki);
        if(!kk||!kk.startsWith('cosmo_prod_')) continue;
        var dd=JSON.parse(localStorage.getItem(kk)||'null');
        if(dd&&dd._saved&&dd.despachos){
          dd.despachos.forEach(function(desp){
            if(desp.pedidoId){
              despPorPedido[desp.pedidoId]=(despPorPedido[desp.pedidoId]||0)+(desp.plantillas||0);
            }
          });
        }
      }
    }catch(e){}

    // Agrupar por nombre canónico (normalizado + alias)
    var byCliente = {};
    peds.forEach(function(p){
      if(p.estado !== 'entregado') return;
      var ts = p.tsEntregado || p.tsCreado;
      if(!ts) return;
      var d  = new Date(ts);
      var pm = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      if(!meses.includes(pm)) return;

      var rawNombre  = (p.nombre||'Sin nombre').trim();
      var canonical  = _resolveNombre(rawNombre, aliases);
      var normKey    = _normNombre(canonical);

      if(!byCliente[normKey]){
        byCliente[normKey] = {
          nombre: canonical,
          normKey: normKey,
          pedidos: [],
          plantillas: 0,
          variantes: new Set()
        };
      }
      byCliente[normKey].pedidos.push(p);
      byCliente[normKey].variantes.add(rawNombre);
      byCliente[normKey].plantillas += (despPorPedido[p.id]||0);
    });

    // Ingresos manuales con cliente
    try{
      var ings = JSON.parse(localStorage.getItem('cg_ingresos')||'[]');
      ings.forEach(function(ing){
        if(!ing.cliente||!ing.mes) return;
        if(!meses.includes(ing.mes)) return;
        var canonical = _resolveNombre(ing.cliente, aliases);
        var normKey   = _normNombre(canonical);
        if(!byCliente[normKey]){
          byCliente[normKey] = { nombre:canonical, normKey:normKey, pedidos:[], plantillas:0, variantes:new Set(), ingresos:0 };
        }
        byCliente[normKey].ingresos = (byCliente[normKey].ingresos||0)+(parseFloat(ing.monto)||0);
        byCliente[normKey].variantes.add(ing.cliente.trim());
      });
    }catch(e){}

    // ── Auto-fusión por similitud ──────────────────────────────────────────
    // Agrupa automáticamente nombres que son la misma persona escrita diferente.
    // Usa dos criterios: (1) distancia de edición ≤ 2 chars, (2) mismas palabras clave.
    (function _autoFusion(){
      var keys = Object.keys(byCliente);
      if(keys.length < 2) return;

      // Levenshtein entre dos strings normalizados
      function lev(a, b){
        var m=a.length, n=b.length;
        var dp=[];
        for(var i=0;i<=m;i++){ dp[i]=[i]; }
        for(var j=0;j<=n;j++){ dp[0][j]=j; }
        for(var i=1;i<=m;i++){
          for(var j=1;j<=n;j++){
            dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] :
              1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
          }
        }
        return dp[m][n];
      }

      // Palabras significativas (>2 chars) de un nombre normalizado
      function palabras(norm){
        return norm.split(' ').filter(function(w){ return w.length > 2; });
      }

      // Decide si dos normKeys son la misma persona
      function mismaPersoa(ka, kb){
        if(ka===kb) return false;
        var la=ka.length, lb=kb.length;
        // Si la diferencia de longitud es muy grande no son el mismo
        if(Math.abs(la-lb) > 4) return false;
        // Criterio 1: distancia de edición ≤ 2
        if(lev(ka,kb) <= 2) return true;
        // Criterio 2: comparten todas las palabras significativas de la más corta
        var pa=palabras(ka), pb=palabras(kb);
        if(!pa.length || !pb.length) return false;
        var shorter = pa.length <= pb.length ? pa : pb;
        var longer  = pa.length <= pb.length ? pb : pa;
        // Todas las palabras del más corto aparecen en el más largo
        return shorter.every(function(w){
          return longer.some(function(lw){ return lev(w,lw) <= 1; });
        });
      }

      // Construir grupos de fusión (union-find simplificado)
      var merged = {}; // normKey → canonical normKey del grupo
      keys.forEach(function(k){ merged[k]=k; });

      function find(k){ return merged[k]===k ? k : (merged[k]=find(merged[k])); }
      function union(ka,kb){
        var ra=find(ka), rb=find(kb);
        if(ra===rb) return;
        // El canónico es el que tiene más pedidos
        var countA=(byCliente[ra]||{pedidos:[]}).pedidos.length;
        var countB=(byCliente[rb]||{pedidos:[]}).pedidos.length;
        merged[countA>=countB ? rb : ra] = countA>=countB ? ra : rb;
      }

      for(var i=0;i<keys.length;i++){
        for(var j=i+1;j<keys.length;j++){
          if(mismaPersoa(keys[i],keys[j])) union(keys[i],keys[j]);
        }
      }

      // Aplicar fusiones: fusionar los grupos en el canónico
      keys.forEach(function(k){
        var root = find(k);
        if(root===k) return; // ya es canónico
        var src = byCliente[k];
        var dst = byCliente[root];
        if(!src||!dst) return;
        // Fusionar pedidos, plantillas, variantes e ingresos
        dst.pedidos = dst.pedidos.concat(src.pedidos);
        dst.plantillas += src.plantillas;
        dst.ingresos = (dst.ingresos||0) + (src.ingresos||0);
        src.pedidos.forEach(function(p){ dst.variantes.add((p.nombre||'').trim()); });
        src.variantes.forEach(function(v){ dst.variantes.add(v); });
        // El nombre canónico es el del grupo con más pedidos (ya determinado en union)
        delete byCliente[k];
      });
    })();
    // ── Fin auto-fusión ─────────────────────────────────────────────────────

    // Convertir Sets a arrays para serialización
    var lista = Object.values(byCliente).map(function(c){
      c.variantes = Array.from(c.variantes).filter(function(v){ return _normNombre(v)!==_normNombre(c.nombre); });
      return c;
    });

    // Score: frecuencia 60% + plantillas 40%
    var maxPed  = Math.max.apply(null, lista.map(function(c){ return c.pedidos.length; }))||1;
    var maxPlan = Math.max.apply(null, lista.map(function(c){ return c.plantillas; }))||1;
    lista.forEach(function(c){
      c.score = (c.pedidos.length/maxPed)*60 + (c.plantillas/maxPlan)*40;
    });

    return lista.sort(function(a,b){ return b.score - a.score; });
  }

  function renderFidelizacion(){
    var el = document.getElementById('gp-fidelizacion'); if(!el) return;
    var cur    = _triActual();
    var fidData= _fidLoad();

    // Selector de trimestre
    var triOpts = '';
    var hoy = new Date();
    for(var y = hoy.getFullYear(); y >= hoy.getFullYear()-1; y--){

        if(y === hoy.getFullYear() && t > cur.tri) continue;
        var k = _getTriKey(y,t);
        var lbl = _triLabel(y,t);
        triOpts += '<option value="'+k+'" '+(k===cur.key?'selected':'')+'>'+lbl+'</option>';
      }

    h += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;">';

    h += '</div>';

      // Variantes detectadas
      if(c.variantes && c.variantes.length){
        h += '<div style="margin-bottom:6px;">';
        c.variantes.forEach(function(v){
          h += '<span style="display:inline-block;font-size:8px;color:#475569;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:4px;padding:1px 5px;margin:1px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="Variante detectada: \''+v+'\'">≈ '+v+'</span>';

      h += '<div><div style="font-family:Space Mono,monospace;font-size:14px;color:'+col+';font-weight:700;">'+c.pedidos.length+'</div><div style="font-size:8px;color:#475569;">pedidos</div></div>';
      if(c.plantillas) h += '<div><div style="font-family:Space Mono,monospace;font-size:14px;color:'+col+';font-weight:700;">'+c.plantillas+'</div><div style="font-size:8px;color:#475569;">plant.</div></div>';
      h += '</div>';

        if(c.ingresos) h += '<span style="font-size:9px;color:#22c55e;white-space:nowrap;">'+fmtM(c.ingresos)+'</span>';
        if(premio.tipo) h += '<span style="font-size:8px;color:#22c55e;">🎁</span>';
        h += '</div>';
      });
      h += '</div>';
    }

    // Modal de premio (si está abierto)
    h += '<div id="fid-premio-modal"></div>';

    // Notas del trimestre
    var nota = fid.nota||'';
    h += '<div style="margin-top:8px;">';
    h += '<div style="font-size:8px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;">📝 Notas del trimestre</div>';
    h += '<textarea id="fid-nota" onchange="window._fidSaveNota(\''+triKey+'\')" placeholder="Observaciones, estrategias de retención, etc..." style="width:100%;background:#080c18;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 10px;color:#e2e8f0;font-size:10px;outline:none;resize:vertical;min-height:64px;box-sizing:border-box;">'+nota+'</textarea>';
    h += '</div>';

    // Gestión de aliases (fusionar variantes de nombres)
    var aliases = _loadAliases();

    h += '<div style="margin-top:12px;">';
    h += '<button onclick="window._fidToggleAliases()" style="width:100%;padding:6px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:8px;color:#334155;font-size:9px;cursor:pointer;text-align:left;">🔀 Gestionar fusiones de nombres '+(aliasEntries.length?'('+aliasEntries.length+' configuradas)':'')+'</button>';
    h += '<div id="fid-aliases-panel" style="display:none;margin-top:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px;">';
    h += '<div style="font-size:9px;color:#475569;line-height:1.6;margin-bottom:10px;">Si un mismo cliente aparece con nombres ligeramente diferentes (ej: "diego bonnet" y "Diego Bonnet"), puedes indicar que son la misma persona. El sistema los agrupará automáticamente.</div>';

    // Form para nueva fusión
    h += '<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;">';
    h += '<input id="fid-alias-variante" placeholder="Nombre variante (ej: diego bonnet)" style="flex:1;min-width:120px;background:#080c18;border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:6px 8px;color:#e2e8f0;font-size:9px;outline:none;">';
    h += '<span style="display:flex;align-items:center;color:#475569;font-size:10px;">→</span>';

    h += '<button onclick="window._fidAddAlias(\''+triKey+'\','+tri+','+year+')" style="padding:6px 12px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);border-radius:7px;color:#34d399;font-size:9px;cursor:pointer;white-space:nowrap;">+ Fusionar</button>';
    h += '</div>';

    // Lista de aliases configurados
    if(aliasEntries.length){
      h += '<div style="font-size:8px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Fusiones activas</div>';

      });

      h += '<div style="font-size:9px;color:#334155;text-align:center;padding:8px 0;">Sin fusiones configuradas aún.</div>';
    }
    h += '</div></div>';

    return h;
  }

  // -- Calendar (floating, shared across all wraps) --
  var _calDate = new Date();
  var _calAnchor = null;

  (function(){
    var el=document.createElement('div');
    el.id='g-cal-float';
    el.style.cssText='display:none;position:fixed;z-index:99999;width:230px;';
    document.body.appendChild(el);
    document.addEventListener('click',function(e){
      var cal=document.getElementById('g-cal-float'); if(!cal) return;
      if(cal.style.display==='none') return;
      if(!cal.contains(e.target)&&e.target!==_calAnchor&&(!_calAnchor||!_calAnchor.contains(e.target))){
        cal.style.display='none';

  function _calRender(){
    var el=document.getElementById('g-cal-float'); if(!el) return;
    var y=_calDate.getFullYear(), m=_calDate.getMonth();
    var today=new Date(), sel=document.getElementById('g-fecha'), selStr=sel?sel.value:'';
    var MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    var first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
    var h='<div style="background:#0c1220;border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:12px;box-shadow:0 12px 40px rgba(0,0,0,0.8);">';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">';
    h+='<button onclick="window._calPrev()" style="background:none;border:none;color:#475569;cursor:pointer;font-size:18px;padding:0 6px;">&lsaquo;</button>';
    h+='<span style="font-size:10px;font-weight:700;color:#e2e8f0;">'+MN[m]+' '+y+'</span>';
    h+='<button onclick="window._calNext()" style="background:none;border:none;color:#475569;cursor:pointer;font-size:18px;padding:0 6px;">&rsaquo;</button>';
    h+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;">';
    ['Do','Lu','Ma','Mi','Ju','Vi','Sa'].forEach(function(d){h+='<div style="text-align:center;font-size:8px;color:#334155;">'+d+'</div>';});
    h+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">';
    for(var i=0;i<first;i++) h+='<div></div>';
    for(var d=1;d<=days;d++){
      var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
      var isS=ds===selStr;
      h+='<div data-ds="'+ds+'" onclick="window._calPick(this.dataset.ds)" style="text-align:center;padding:5px 2px;border-radius:5px;cursor:pointer;font-size:9px;'
        +(isS?'background:#a855f7;color:#fff;':isT?'background:rgba(168,85,247,0.15);color:#a855f7;border:1px solid rgba(168,85,247,0.35);':'color:#94a3b8;')+'">'+d+'</div>';
    }
    h+='</div></div>';
    el.innerHTML=h;
  }
  window._gastosCalToggle=function(btn){
    var cal=document.getElementById('g-cal-float'); if(!cal) return;
    if(cal.style.display!=='none'&&_calAnchor===btn){ cal.style.display='none'; return; }
    _calAnchor=btn;
    var sel=document.getElementById('g-fecha');
    if(sel&&sel.value) try{ _calDate=new Date(sel.value+'T12:00:00'); }catch(e){ _calDate=new Date(); }
    else _calDate=new Date();
    // Render first (hidden) to measure height
    cal.style.visibility='hidden';
    cal.style.display='block';
    _calRender();
    var rect=btn.getBoundingClientRect();
    var calH=cal.offsetHeight||260;
    var calW=230;
    var spaceBelow=window.innerHeight-rect.bottom-8;
    var spaceAbove=rect.top-8;
    // Open upward if not enough space below and more space above
    if(spaceBelow<calH && spaceAbove>spaceBelow){
      cal.style.top=(rect.top-calH-6)+'px';
    } else {
      cal.style.top=(rect.bottom+6)+'px';
    }
    var left=rect.left;
    if(left+calW>window.innerWidth) left=window.innerWidth-calW-8;
    cal.style.left=Math.max(4,left)+'px';
    cal.style.visibility='visible';
  };
  window._calPrev=function(){_calDate=new Date(_calDate.getFullYear(),_calDate.getMonth()-1,1);_calRender();};
  window._calNext=function(){_calDate=new Date(_calDate.getFullYear(),_calDate.getMonth()+1,1);_calRender();};

  window._reloadClienteSel = function(){

    var mesEl = document.getElementById('i-mes');
    var mesVal = mesEl ? mesEl.value : nowDate().slice(0,7);

    try{
      var peds = JSON.parse(localStorage.getItem('cosmo_pedidos_v2')||'[]');
      var despMes = peds.filter(function(p){
        if(p.estado!=='entregado') return false;
        var ts = p.tsEntregado || p.tsCreado;
        if(!ts) return false;
        var d = new Date(ts);
        var pm = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
        return pm === mesVal;
      });

      var hist = JSON.parse(localStorage.getItem('cg_ingresos')||'[]');
      var clientesHist = [];
      hist.forEach(function(i){ if(i.cliente && !clientesHist.includes(i.cliente)) clientesHist.push(i.cliente); });

      var opts = '<option value="">— Seleccionar del mes —</option>';
      if(despMes.length){
        opts += '<optgroup label="Despachados en '+mesVal+'">';

    // ── Navegación semana ────────────────────────────────

    h+=`<div style="margin-bottom:14px;">`;
    DIAS.forEach((dia,di)=>{
      const diaFecha=fechas[di];
      const dPosts=posts.filter(p=>p.dia===dia);
      h+=`<div style="margin-bottom:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px;overflow:hidden;">`;

      dPosts.forEach(p=>{

    const prompt=`Eres el estratega de contenido de COSMO, empresa colombiana pionera en fabricación automatizada de ojitos 3D (ojos de resina) para el mercado artesanal. Llevan 6+ años en el mercado, garantía anti-amarillamiento, producción automatizada, volumen calibrado.

Genera UN brief de contenido para Instagram con esta estructura exacta:

PILAR: ${pilar.label} — ${pilar.desc}
FORMATO: ${fmt.label} (${fmt.dur})
${contexto?`CONTEXTO ADICIONAL: ${contexto}`:''}

{
  "titulo": "título corto del post",
  "hook": "texto exacto del hook (0-3 seg, máx 12 palabras, genera tensión o contradicción)",
  "tension": "descripción de qué pasa entre el hook y el cierre (2-3 oraciones, qué se muestra/dice, cómo se mantiene la atención)",
  "payoff": "cierre exacto (texto en pantalla o voz en off, debe generar guardado o DM share)",
  "caption": "caption del post, primera línea = hook, resto desarrolla, CTA al final",
  "tip": "un tip de producción específico para este formato"
}`;

    try{

        headers:_apiHeaders(),

              <div style="font-size:11px;color:#94a3b8;line-height:1.6;background:rgba(6,182,212,0.04);border-left:2px solid #06b6d4;padding:6px 10px;border-radius:0 6px 6px 0;">${idea.tension||'—'}</div>

              <div style="font-size:10px;color:#94a3b8;line-height:1.6;background:rgba(245,158,11,0.04);border-left:2px solid #f59e0b;padding:6px 10px;border-radius:0 6px 6px 0;white-space:pre-wrap;">${idea.caption}</div>
            </div>`:''}
            ${idea.tip?`<div style="font-size:9px;color:#334155;background:rgba(255,255,255,0.02);border-radius:6px;padding:7px 10px;margin-bottom:10px;">💡 ${idea.tip}</div>`:''}

              <button onclick="window._cntUsarIdea(${JSON.stringify(JSON.stringify(idea))})" style="flex:1;padding:7px;background:rgba(244,114,182,0.1);border:1px solid ${PINK_BORDER};border-radius:7px;color:${PINK};font-size:10px;cursor:pointer;">Usar en post</button>
              <button onclick="window._cntRunIA()" style="padding:7px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:7px;color:#475569;font-size:10px;cursor:pointer;">Regenerar</button>

  window._cntUsarIdea=(jsonStr)=>{
    let idea; try{idea=JSON.parse(jsonStr);}catch(e){return;}
    const targetId=window._genTargetId;
    if(targetId){
      const p=posts.find(x=>x.id===targetId);
      if(p){
        p.titulo=idea.titulo||p.titulo;
        p.hook=idea.hook||'';
        p.tension=idea.tension||'';
        p.payoff=idea.payoff||'';
        savePosts();
      }
    }else{
      // Crear nuevo post con la idea
      const nuevo={id:uid(),dia:'Lun',pilar:document.getElementById('gen-pilar').value,formato:document.getElementById('gen-formato').value,ejecutor:'Kehyly',estado:'idea',titulo:idea.titulo||'',hook:idea.hook||'',tension:idea.tension||'',payoff:idea.payoff||''};
      posts.push(nuevo);
      savePosts();
    }
    window._genTargetId=null;
    document.getElementById('cnt-gen-panel').style.display='none';
    render();
  };

  // ── Render Analíticas ────────────────────────────────────────────────
  function renderAnaliticas() {
    const root = document.getElementById('content-analiticas'); if(!root) return;
    let platFilter = 'all';  // 'all' | 'ig' | 'tt' | 'both'

    const PILARES = {resultado:{color:'#a855f7',label:'Resultado'},proceso:{color:'#06b6d4',label:'Proceso'},comunidad:{color:'#f59e0b',label:'Comunidad'},educacion:{color:'#22c55e',label:'Educación'}};
    const REND_CFG = {bajo:{color:'#ef4444',bg:'rgba(239,68,68,0.1)',label:'Bajo'},medio:{color:'#f59e0b',bg:'rgba(245,158,11,0.1)',label:'Medio'},alto:{color:'#22c55e',bg:'rgba(34,197,94,0.1)',label:'Alto'}};

    function getIdeasConMetricas(){
      const pool = JSON.parse(localStorage.getItem('cosmo_ideas_pool')||'[]');
      let ideas = pool.filter(i=>i.metricas && (i.metricas.views||i.metricas.sends||i.metricas.saves||i.metricas.rendimiento));
      if(platFilter==='ig')   ideas=ideas.filter(i=>!i.plataforma||i.plataforma==='ig');
      if(platFilter==='tt')   ideas=ideas.filter(i=>i.plataforma==='tt');
      if(platFilter==='both') ideas=ideas.filter(i=>i.plataforma==='both');
      return ideas;
    }

    function renderView(){
      const ideas = getIdeasConMetricas();
      let h = '';

      // Filtros de plataforma
      // Botones filtro plataforma
      const filtBtns=[['all','Todas','#475569'],['ig','📸 Instagram','#f472b6'],['tt','🎵 TikTok','#06b6d4'],['both','✦ Ambas','#a855f7']];
      let filtHtml='<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">';
      filtBtns.forEach(function(fb){
        const val=fb[0],lbl=fb[1],col=fb[2];
        const active=val===platFilter;
        filtHtml+='<button onclick="window._aFiltPlat(\''+val+'\')" id="afp-'+val+'" style="padding:4px 12px;border-radius:20px;border:1px solid '+(active?col+'80':'rgba(255,255,255,0.08)')+';background:'+(active?'rgba(100,100,100,0.15)':'transparent')+';color:'+(active?col:'#475569')+';font-size:10px;cursor:pointer;font-family:\'DM Sans\',sans-serif;">'+lbl+'</button>';
      });
      filtHtml+='</div>';
      h+=filtHtml;

      if(!ideas.length){
        root.innerHTML=`<div style="text-align:center;padding:48px 20px;">
          <div style="font-size:32px;margin-bottom:12px;">📊</div>
          <div style="font-size:12px;color:#475569;line-height:1.7;">Sin métricas registradas todavía.<br>Después de publicar un post, ábrelo en IDEAS y registra las métricas de las primeras 48h.</div>
        </div>`;
        return;
      }

      // ── Resumen general ───────────────────────────────────────────
      const totalPosts = ideas.length;
      const altos  = ideas.filter(i=>i.metricas.rendimiento==='alto').length;
      const medios = ideas.filter(i=>i.metricas.rendimiento==='medio').length;
      const bajos  = ideas.filter(i=>i.metricas.rendimiento==='bajo').length;
      const avgViews = ideas.filter(i=>i.metricas.views).reduce((s,i)=>s+i.metricas.views,0) / (ideas.filter(i=>i.metricas.views).length||1);
      const avgSends = ideas.filter(i=>i.metricas.sends).reduce((s,i)=>s+i.metricas.sends,0) / (ideas.filter(i=>i.metricas.sends).length||1);
      const avgSaves = ideas.filter(i=>i.metricas.saves).reduce((s,i)=>s+i.metricas.saves,0) / (ideas.filter(i=>i.metricas.saves).length||1);

      h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">
        <div style="background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);border-radius:10px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:700;color:#22c55e;">${altos}</div>
          <div style="font-size:9px;color:#475569;margin-top:2px;">Alto rendimiento</div>
        </div>
        <div style="background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.12);border-radius:10px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:700;color:#f59e0b;">${medios}</div>
          <div style="font-size:9px;color:#475569;margin-top:2px;">Medio rendimiento</div>
        </div>
        <div style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.12);border-radius:10px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:700;color:#ef4444;">${bajos}</div>
          <div style="font-size:9px;color:#475569;margin-top:2px;">Bajo rendimiento</div>
        </div>
      </div>`;

      // ── Promedios ─────────────────────────────────────────────────
      h+=`<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;margin-bottom:14px;">
        <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Promedios generales · ${totalPosts} post${totalPosts>1?'s':''} con métricas</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
          ${[['👁 Views',Math.round(avgViews),'#e2e8f0'],['📤 DM Shares',Math.round(avgSends),'#f472b6'],['🔖 Guardados',Math.round(avgSaves),'#a855f7']].map(([lbl,val,col])=>`
          <div style="text-align:center;">
            <div style="font-size:18px;font-weight:600;color:${col};">${val}</div>
            <div style="font-size:9px;color:#475569;margin-top:2px;">${lbl}</div>
          </div>`).join('')}
        </div>
      </div>`;

      // ── Gráfica de barras: rendimiento por pilar ──────────────────
      h+=`<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;margin-bottom:14px;">
        <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;">Rendimiento por pilar</div>`;
      Object.entries(PILARES).forEach(([pid,pcfg])=>{
        const pIdeas = ideas.filter(i=>i.pilar===pid);
        if(!pIdeas.length) return;
        const pAlto  = pIdeas.filter(i=>i.metricas.rendimiento==='alto').length;
        const pMedio = pIdeas.filter(i=>i.metricas.rendimiento==='medio').length;
        const pBajo  = pIdeas.filter(i=>i.metricas.rendimiento==='bajo').length;
        const total  = pIdeas.length;
        h+=`<div style="margin-bottom:10px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <span style="font-size:10px;font-weight:500;color:${pcfg.color};">${pcfg.label}</span>
            <span style="font-size:9px;color:#475569;">${total} post${total>1?'s':''}</span>
          </div>
          <div style="display:flex;height:10px;border-radius:5px;overflow:hidden;background:rgba(255,255,255,0.04);">
            ${pAlto?`<div style="width:${Math.round(pAlto/total*100)}%;background:#22c55e;" title="${pAlto} alto"></div>`:''}
            ${pMedio?`<div style="width:${Math.round(pMedio/total*100)}%;background:#f59e0b;" title="${pMedio} medio"></div>`:''}
            ${pBajo?`<div style="width:${Math.round(pBajo/total*100)}%;background:#ef4444;" title="${pBajo} bajo"></div>`:''}
          </div>
          <div style="display:flex;gap:8px;margin-top:3px;">
            ${pAlto?`<span style="font-size:8px;color:#22c55e;">${pAlto} alto</span>`:''}
            ${pMedio?`<span style="font-size:8px;color:#f59e0b;">${pMedio} medio</span>`:''}
            ${pBajo?`<span style="font-size:8px;color:#ef4444;">${pBajo} bajo</span>`:''}
          </div>
        </div>`;
      });
      h+=`</div>`;

      // ── Gráfica señales: sends vs saves por post ──────────────────
      const ideasConSenales = ideas.filter(i=>i.metricas.sends||i.metricas.saves);
      if(ideasConSenales.length){
        const maxVal = Math.max(...ideasConSenales.map(i=>Math.max(i.metricas.sends||0,i.metricas.saves||0)),1);
        h+=`<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;margin-bottom:14px;">
          <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;">Señales por post — Sends vs Guardados</div>
          <div style="display:flex;gap:10px;margin-bottom:8px;">
            <div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;border-radius:2px;background:#f472b6;"></div><span style="font-size:9px;color:#475569;">Sends (DM)</span></div>
            <div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;border-radius:2px;background:#a855f7;"></div><span style="font-size:9px;color:#475569;">Guardados</span></div>
          </div>`;
        ideasConSenales.forEach(idea=>{
          const p=PILARES[idea.pilar]||{color:'#475569'};
          const sends=idea.metricas.sends||0;
          const saves=idea.metricas.saves||0;
          const rend=REND_CFG[idea.metricas.rendimiento]||{};
          h+=`<div style="margin-bottom:8px;">

            </div>
            <div style="display:flex;flex-direction:column;gap:2px;">
              <div style="display:flex;align-items:center;gap:4px;">
                <span style="font-size:8px;color:#475569;width:32px;text-align:right;">${sends}</span>
                <div style="flex:1;height:6px;background:rgba(255,255,255,0.04);border-radius:3px;">
                  <div style="width:${Math.round(sends/maxVal*100)}%;height:100%;background:#f472b6;border-radius:3px;"></div>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:4px;">
                <span style="font-size:8px;color:#475569;width:32px;text-align:right;">${saves}</span>
                <div style="flex:1;height:6px;background:rgba(255,255,255,0.04);border-radius:3px;">
                  <div style="width:${Math.round(saves/maxVal*100)}%;height:100%;background:#a855f7;border-radius:3px;"></div>
                </div>
              </div>
            </div>
          </div>`;
        });
        h+=`</div>`;
      }

      // ── Lista detallada de posts con métricas ─────────────────────
      h+=`<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;">
        <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Detalle por post</div>`;
      [...ideas].reverse().forEach(idea=>{
        const p=PILARES[idea.pilar]||{color:'#475569',label:idea.pilar};
        const m=idea.metricas||{};
        const rend=REND_CFG[m.rendimiento]||{};
        h+=`<div style="padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;flex-wrap:wrap;gap:4px;">
            <span style="font-size:10px;font-weight:500;color:${p.color};">${idea.titulo||'Sin título'}</span>
            ${rend.label?`<span style="font-size:9px;padding:2px 8px;border-radius:10px;background:${rend.bg||'transparent'};color:${rend.color||'#475569'};">${rend.label}</span>`:'<span style="font-size:9px;color:#334155;">Sin evaluar</span>'}
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            ${m.views?`<span style="font-size:9px;color:#475569;">👁 ${m.views}</span>`:''}
            ${m.sends?`<span style="font-size:9px;color:${(idea.plataforma==='tt')?'#06b6d4':'#f472b6'};">${(idea.plataforma==='tt')?'🔄':'📤'} ${m.sends}</span>`:''}
            ${m.saves?`<span style="font-size:9px;color:${(idea.plataforma==='tt')?'#ef4444':'#a855f7'};">${(idea.plataforma==='tt')?'❤️':'🔖'} ${m.saves}</span>`:''}
            ${m.completion?`<span style="font-size:9px;color:#06b6d4;">📊 ${m.completion}%</span>`:''}
            ${m.watchtime?`<span style="font-size:9px;color:#f59e0b;">⏱ ${m.watchtime}s</span>`:''}
            ${m.fyp?`<span style="font-size:9px;color:#22c55e;">🔥 FYP ${m.fyp}%</span>`:''}
          </div>
          ${idea.notas?`<div style="font-size:9px;color:#334155;margin-top:4px;font-style:italic;">"${idea.notas.substring(0,80)}${idea.notas.length>80?'...':''}"</div>`:''}
        </div>`;
      });
      h+=`</div>`;

      // ── Insights para la IA ───────────────────────────────────────────
      const ideasAll = getIdeasConMetricas();
      if(ideasAll.length >= 3){
        const mejorPilar = Object.entries(
          ideasAll.reduce((acc,i)=>{
            if(i.metricas.rendimiento==='alto') acc[i.pilar]=(acc[i.pilar]||0)+1;
            return acc;
          },{})).sort((a,b)=>b[1]-a[1])[0];

        const mejorFormato = Object.entries(
          ideasAll.reduce((acc,i)=>{
            if(i.metricas.rendimiento==='alto') acc[i.formato]=(acc[i.formato]||0)+1;
            return acc;
          },{})).sort((a,b)=>b[1]-a[1])[0];

        const avgSendsAlto = ideasAll.filter(i=>i.metricas.rendimiento==='alto').reduce((s,i)=>s+(i.metricas.sends||0),0) / (ideasAll.filter(i=>i.metricas.rendimiento==='alto').length||1);
        const avgSendsBajo = ideasAll.filter(i=>i.metricas.rendimiento==='bajo').reduce((s,i)=>s+(i.metricas.sends||0),0) / (ideasAll.filter(i=>i.metricas.rendimiento==='bajo').length||1);

        h+=`<div style="background:rgba(168,85,247,0.05);border:1px solid rgba(168,85,247,0.15);border-radius:10px;padding:12px 14px;margin-top:14px;">
          <div style="font-size:9px;color:#a855f7;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">✦ Insights — lo que la IA aprende de tus datos</div>
          <div style="font-size:10px;color:#94a3b8;line-height:1.7;">
            ${mejorPilar?`<div style="margin-bottom:4px;">📌 El pilar con más alto rendimiento es <span style="color:#e2e8f0;font-weight:500;">${mejorPilar[0]}</span> (${mejorPilar[1]} post${mejorPilar[1]>1?'s':''} en alto).</div>`:''}
            ${mejorFormato?`<div style="margin-bottom:4px;">📌 El formato con más alto rendimiento es <span style="color:#e2e8f0;font-weight:500;">${mejorFormato[0]}</span>.</div>`:''}
            ${avgSendsAlto>avgSendsBajo?`<div style="margin-bottom:4px;">📌 Los posts de alto rendimiento generan <span style="color:#f472b6;font-weight:500;">${Math.round(avgSendsAlto)}x</span> más DM shares que los de bajo rendimiento.</div>`:''}
            <div style="margin-top:8px;font-size:9px;color:#475569;">Estos patrones se incluyen automáticamente en el generador de IA cuando creas nueva contenido.</div>
          </div>
        </div>`;
      }

      root.innerHTML = h;
    }

    renderView();

    window._aFiltPlat = function(val){
      platFilter = val;
      renderView();
    };
  }

  // ── Sistema de tabs ───────────────────────────────────────────────────  // ── Sistema de tabs ───────────────────────────────────────────────────

  function renderAnaliticas() {
    const root = document.getElementById('content-analiticas'); if(!root) return;
    let platFilter = 'all';  // 'all' | 'ig' | 'tt' | 'both'

    const PILARES = {resultado:{color:'#a855f7',label:'Resultado'},proceso:{color:'#06b6d4',label:'Proceso'},comunidad:{color:'#f59e0b',label:'Comunidad'},educacion:{color:'#22c55e',label:'Educación'}};
    const REND_CFG = {bajo:{color:'#ef4444',bg:'rgba(239,68,68,0.1)',label:'Bajo'},medio:{color:'#f59e0b',bg:'rgba(245,158,11,0.1)',label:'Medio'},alto:{color:'#22c55e',bg:'rgba(34,197,94,0.1)',label:'Alto'}};

    function getIdeasConMetricas(){
      const pool = JSON.parse(localStorage.getItem('cosmo_ideas_pool')||'[]');
      let ideas = pool.filter(i=>i.metricas && (i.metricas.views||i.metricas.sends||i.metricas.saves||i.metricas.rendimiento));
      if(platFilter==='ig')   ideas=ideas.filter(i=>!i.plataforma||i.plataforma==='ig');
      if(platFilter==='tt')   ideas=ideas.filter(i=>i.plataforma==='tt');
      if(platFilter==='both') ideas=ideas.filter(i=>i.plataforma==='both');
      return ideas;
    }

    function renderView(){
      const ideas = getIdeasConMetricas();
      let h = '';

      // Filtros de plataforma
      // Botones filtro plataforma
      const filtBtns=[['all','Todas','#475569'],['ig','📸 Instagram','#f472b6'],['tt','🎵 TikTok','#06b6d4'],['both','✦ Ambas','#a855f7']];
      let filtHtml='<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">';
      filtBtns.forEach(function(fb){
        const val=fb[0],lbl=fb[1],col=fb[2];
        const active=val===platFilter;
        filtHtml+='<button onclick="window._aFiltPlat(\''+val+'\')" id="afp-'+val+'" style="padding:4px 12px;border-radius:20px;border:1px solid '+(active?col+'80':'rgba(255,255,255,0.08)')+';background:'+(active?'rgba(100,100,100,0.15)':'transparent')+';color:'+(active?col:'#475569')+';font-size:10px;cursor:pointer;font-family:\'DM Sans\',sans-serif;">'+lbl+'</button>';
      });
      filtHtml+='</div>';
      h+=filtHtml;

      if(!ideas.length){
        root.innerHTML=`<div style="text-align:center;padding:48px 20px;">
          <div style="font-size:32px;margin-bottom:12px;">📊</div>
          <div style="font-size:12px;color:#475569;line-height:1.7;">Sin métricas registradas todavía.<br>Después de publicar un post, ábrelo en IDEAS y registra las métricas de las primeras 48h.</div>
        </div>`;
        return;
      }

      // ── Resumen general ───────────────────────────────────────────
      const totalPosts = ideas.length;
      const altos  = ideas.filter(i=>i.metricas.rendimiento==='alto').length;
      const medios = ideas.filter(i=>i.metricas.rendimiento==='medio').length;
      const bajos  = ideas.filter(i=>i.metricas.rendimiento==='bajo').length;
      const avgViews = ideas.filter(i=>i.metricas.views).reduce((s,i)=>s+i.metricas.views,0) / (ideas.filter(i=>i.metricas.views).length||1);
      const avgSends = ideas.filter(i=>i.metricas.sends).reduce((s,i)=>s+i.metricas.sends,0) / (ideas.filter(i=>i.metricas.sends).length||1);
      const avgSaves = ideas.filter(i=>i.metricas.saves).reduce((s,i)=>s+i.metricas.saves,0) / (ideas.filter(i=>i.metricas.saves).length||1);

      h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">
        <div style="background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);border-radius:10px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:700;color:#22c55e;">${altos}</div>
          <div style="font-size:9px;color:#475569;margin-top:2px;">Alto rendimiento</div>

          <div style="font-size:9px;color:#475569;margin-top:2px;">Medio rendimiento</div>
        </div>
        <div style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.12);border-radius:10px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:700;color:#ef4444;">${bajos}</div>
          <div style="font-size:9px;color:#475569;margin-top:2px;">Bajo rendimiento</div>
        </div>
      </div>`;

      // ── Promedios ─────────────────────────────────────────────────
      h+=`<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;margin-bottom:14px;">
        <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Promedios generales · ${totalPosts} post${totalPosts>1?'s':''} con métricas</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
          ${[['👁 Views',Math.round(avgViews),'#e2e8f0'],['📤 DM Shares',Math.round(avgSends),'#f472b6'],['🔖 Guardados',Math.round(avgSaves),'#a855f7']].map(([lbl,val,col])=>`
          <div style="text-align:center;">
            <div style="font-size:18px;font-weight:600;color:${col};">${val}</div>
            <div style="font-size:9px;color:#475569;margin-top:2px;">${lbl}</div>
          </div>`).join('')}
        </div>
      </div>`;

      // ── Gráfica de barras: rendimiento por pilar ──────────────────
      h+=`<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;margin-bottom:14px;">
        <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;">Rendimiento por pilar</div>`;
      Object.entries(PILARES).forEach(([pid,pcfg])=>{
        const pIdeas = ideas.filter(i=>i.pilar===pid);
        if(!pIdeas.length) return;
        const pAlto  = pIdeas.filter(i=>i.metricas.rendimiento==='alto').length;
        const pMedio = pIdeas.filter(i=>i.metricas.rendimiento==='medio').length;
        const pBajo  = pIdeas.filter(i=>i.metricas.rendimiento==='bajo').length;
        const total  = pIdeas.length;
        h+=`<div style="margin-bottom:10px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <span style="font-size:10px;font-weight:500;color:${pcfg.color};">${pcfg.label}</span>
            <span style="font-size:9px;color:#475569;">${total} post${total>1?'s':''}</span>
          </div>
          <div style="display:flex;height:10px;border-radius:5px;overflow:hidden;background:rgba(255,255,255,0.04);">
            ${pAlto?`<div style="width:${Math.round(pAlto/total*100)}%;background:#22c55e;" title="${pAlto} alto"></div>`:''}
            ${pMedio?`<div style="width:${Math.round(pMedio/total*100)}%;background:#f59e0b;" title="${pMedio} medio"></div>`:''}
            ${pBajo?`<div style="width:${Math.round(pBajo/total*100)}%;background:#ef4444;" title="${pBajo} bajo"></div>`:''}
          </div>
          <div style="display:flex;gap:8px;margin-top:3px;">
            ${pAlto?`<span style="font-size:8px;color:#22c55e;">${pAlto} alto</span>`:''}
            ${pMedio?`<span style="font-size:8px;color:#f59e0b;">${pMedio} medio</span>`:''}
            ${pBajo?`<span style="font-size:8px;color:#ef4444;">${pBajo} bajo</span>`:''}
          </div>
        </div>`;
      });
      h+=`</div>`;

      // ── Gráfica señales: sends vs saves por post ──────────────────
      const ideasConSenales = ideas.filter(i=>i.metricas.sends||i.metricas.saves);
      if(ideasConSenales.length){
        const maxVal = Math.max(...ideasConSenales.map(i=>Math.max(i.metricas.sends||0,i.metricas.saves||0)),1);
        h+=`<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;margin-bottom:14px;">

          <div style="display:flex;gap:10px;margin-bottom:8px;">
            <div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;border-radius:2px;background:#f472b6;"></div><span style="font-size:9px;color:#475569;">Sends (DM)</span></div>
            <div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;border-radius:2px;background:#a855f7;"></div><span style="font-size:9px;color:#475569;">Guardados</span></div>
          </div>`;
        ideasConSenales.forEach(idea=>{
          const p=PILARES[idea.pilar]||{color:'#475569'};

              <div style="display:flex;align-items:center;gap:4px;">
                <span style="font-size:8px;color:#475569;width:32px;text-align:right;">${saves}</span>
                <div style="flex:1;height:6px;background:rgba(255,255,255,0.04);border-radius:3px;">
                  <div style="width:${Math.round(saves/maxVal*100)}%;height:100%;background:#a855f7;border-radius:3px;"></div>
                </div>
              </div>
            </div>
          </div>`;
        });
        h+=`</div>`;
      }

      // ── Lista detallada de posts con métricas ─────────────────────
      h+=`<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;">
        <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Detalle por post</div>`;
      [...ideas].reverse().forEach(idea=>{
        const p=PILARES[idea.pilar]||{color:'#475569',label:idea.pilar};

        const rend=REND_CFG[m.rendimiento]||{};
        h+=`<div style="padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04);">

          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            ${m.views?`<span style="font-size:9px;color:#475569;">👁 ${m.views}</span>`:''}
            ${m.sends?`<span style="font-size:9px;color:${(idea.plataforma==='tt')?'#06b6d4':'#f472b6'};">${(idea.plataforma==='tt')?'🔄':'📤'} ${m.sends}</span>`:''}
            ${m.saves?`<span style="font-size:9px;color:${(idea.plataforma==='tt')?'#ef4444':'#a855f7'};">${(idea.plataforma==='tt')?'❤️':'🔖'} ${m.saves}</span>`:''}
            ${m.completion?`<span style="font-size:9px;color:#06b6d4;">📊 ${m.completion}%</span>`:''}
            ${m.watchtime?`<span style="font-size:9px;color:#f59e0b;">⏱ ${m.watchtime}s</span>`:''}
            ${m.fyp?`<span style="font-size:9px;color:#22c55e;">🔥 FYP ${m.fyp}%</span>`:''}
          </div>
          ${idea.notas?`<div style="font-size:9px;color:#334155;margin-top:4px;font-style:italic;">"${idea.notas.substring(0,80)}${idea.notas.length>80?'...':''}"</div>`:''}
        </div>`;
      });
      h+=`</div>`;

      // ── Insights para la IA ───────────────────────────────────────────
      const ideasAll = getIdeasConMetricas();
      if(ideasAll.length >= 3){
        const mejorPilar = Object.entries(

          },{})).sort((a,b)=>b[1]-a[1])[0];

        const mejorFormato = Object.entries(
          ideasAll.reduce((acc,i)=>{
            if(i.metricas.rendimiento==='alto') acc[i.formato]=(acc[i.formato]||0)+1;
            return acc;
          },{})).sort((a,b)=>b[1]-a[1])[0];

        const avgSendsAlto = ideasAll.filter(i=>i.metricas.rendimiento==='alto').reduce((s,i)=>s+(i.metricas.sends||0),0) / (ideasAll.filter(i=>i.metricas.rendimiento==='alto').length||1);

        h+=`<div style="background:rgba(168,85,247,0.05);border:1px solid rgba(168,85,247,0.15);border-radius:10px;padding:12px 14px;margin-top:14px;">
          <div style="font-size:9px;color:#a855f7;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">✦ Insights — lo que la IA aprende de tus datos</div>

            ${mejorFormato?`<div style="margin-bottom:4px;">📌 El formato con más alto rendimiento es <span style="color:#e2e8f0;font-weight:500;">${mejorFormato[0]}</span>.</div>`:''}
            ${avgSendsAlto>avgSendsBajo?`<div style="margin-bottom:4px;">📌 Los posts de alto rendimiento generan <span style="color:#f472b6;font-weight:500;">${Math.round(avgSendsAlto)}x</span> más DM shares que los de bajo rendimiento.</div>`:''}
            <div style="margin-top:8px;font-size:9px;color:#475569;">Estos patrones se incluyen automáticamente en el generador de IA cuando creas nueva contenido.</div>
          </div>
        </div>`;
      }

      root.innerHTML = h;
    }

    renderView();

    window._aFiltPlat = function(val){
      platFilter = val;
      renderView();
    };
  }

  function renderProd() {
    const root = document.getElementById('content-prod'); if(!root) return;

  // ── Render Recetas ───────────────────────────────────────────────────
  function renderRecetas() {
    const root = document.getElementById('content-recetas'); if(!root) return;
    const PILARES = [
      {id:'resultado', label:'Resultado', icon:'✨', color:'#a855f7', bg:'rgba(168,85,247,0.12)'},
      {id:'proceso',   label:'Proceso',   icon:'⚙️', color:'#06b6d4', bg:'rgba(6,182,212,0.1)'},
      {id:'comunidad', label:'Comunidad', icon:'🤝', color:'#f59e0b', bg:'rgba(245,158,11,0.1)'},
      {id:'educacion', label:'Educación', icon:'💡', color:'#22c55e', bg:'rgba(34,197,94,0.1)'},
    ];
    const FORMATOS = [
      {id:'reel',     label:'Reel',     icon:'🎬', color:'#a855f7'},
      {id:'carrusel', label:'Carrusel', icon:'🖼',  color:'#06b6d4'},
      {id:'story',    label:'Story',    icon:'⭕', color:'#f59e0b'},
    ];
    let selPilar = 'resultado';
    let selFormato = 'reel';

    function getReceta(p, f){ return (window.COSMO_RECETAS[p]||{})[f]||null; }
    function getPilar(id){ return PILARES.find(x=>x.id===id)||PILARES[0]; }

    const DIFICULTAD_CFG = {
      'Básico':   {color:'#22c55e', bg:'rgba(34,197,94,0.1)'},
      'Medio':    {color:'#f59e0b', bg:'rgba(245,158,11,0.1)'},
      'Avanzado': {color:'#ef4444', bg:'rgba(239,68,68,0.1)'},
    };

    function renderView(){
      const panelEl = document.getElementById('receta-panel'); if(!panelEl) return;
      const r = getReceta(selPilar, selFormato);
      const p = getPilar(selPilar);
      const fmt = FORMATOS.find(x=>x.id===selFormato)||FORMATOS[0];
      if(!r){ panelEl.innerHTML='<div style="font-size:10px;color:#334155;padding:20px 0;text-align:center;">Receta no disponible.</div>'; return; }
      const dif = DIFICULTAD_CFG[r.dificultad]||DIFICULTAD_CFG['Básico'];

      let h='';

      // Cabecera
      h+=`<div style="background:${p.bg};border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;margin-bottom:10px;border-left:3px solid ${p.color};">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;">
          <div style="font-size:12px;font-weight:600;color:${p.color};">${p.icon} ${p.label} · ${fmt.icon} ${fmt.label}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;">
            <span style="font-size:9px;padding:2px 8px;border-radius:10px;background:${dif.bg};color:${dif.color};font-weight:500;">${r.dificultad}</span>
            <span style="font-size:9px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,0.05);color:#94a3b8;">${r.duracion}</span>
          </div>
        </div>
        <div style="font-size:11px;color:#e2e8f0;margin-bottom:6px;">${r.objetivo}</div>
        <div style="font-size:10px;color:#94a3b8;line-height:1.6;">${r.por_que}</div>
      </div>`;

      // Advertencia (si existe)
      if(r.advertencia){
        h+=`<div style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);border-radius:8px;padding:9px 12px;margin-bottom:10px;font-size:10px;color:#f87171;line-height:1.6;">
          ⚠️ ${r.advertencia}
        </div>`;
      }

      // Orden de publicación

    window._calGenHookRapido = async function(id){
      const pool = JSON.parse(localStorage.getItem('cosmo_ideas_pool')||'[]');
      const idea = pool.find(x=>x.id===id); if(!idea) return;
      const btn = event.target;
      btn.textContent='...'; btn.disabled=true;
      const recetaData = (window.COSMO_RECETAS||{})[idea.pilar]?.[idea.formato];
      const recetaDesc = recetaData ? recetaData.objetivo+' — '+recetaData.por_que : 'Contenido de COSMO sobre ojitos 3D para creadoras artesanales.';
      try{
        const res = await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST', headers:_apiHeaders(),
          body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:300,
            messages:[{role:'user',content:`Genera UN hook para Instagram para COSMO (fabricante de ojitos 3D resinados para creadoras artesanales colombianas).
Pilar: ${idea.pilar} | Formato: ${idea.formato} | Idea: "${idea.titulo}" ${idea.desc?'| Descripción: "'+idea.desc+'"':''}
Receta: ${recetaDesc}
Hook: máx 10 palabras, contradicción o curiosity gap. Responde SOLO el texto del hook, sin comillas ni explicación.`}]})
        });
        const data = await res.json();
        const hook = (data.content||[]).map(b=>b.text||'').join('').trim().replace(/^["']|["']$/g,'');

        localStorage.setItem('cosmo_ideas_pool', JSON.stringify(pool));

    // Acciones
    // ── Checklist dinámico — lee de COSMO_RECETAS por pilar + formato ──────
    // ── 4 ETAPAS DE PRODUCCIÓN ───────────────────────────────────────────
    const ETAPAS_PROD = [
      { k:'tangibles',    i:'📦', l:'Recursos Tangibles',      desc:'Productos, props y materiales físicos listos' },
      { k:'audiovisual',  i:'🎬', l:'Recursos Audiovisuales',  desc:'Cámara, luz, audio y escenario preparados' },
      { k:'textuales',    i:'✍️', l:'Recursos Textuales',      desc:'Hook, guión, caption y CTA definidos' },
      { k:'afinados',     i:'✂️', l:'Detalles Afinados',       desc:'Edición, subtítulos, música y transiciones' },
      { k:'previsualizacion', i:'📱', l:'Previsualización',   desc:'Revisado en celular — se ve y se entiende bien' },
    ];

    window._getChkItems = function(pilarId, formatoId){
      // Mantenemos compatibilidad — retornamos las etapas como items
      return ETAPAS_PROD.map(function(e){ return { k:e.k, l:e.l }; });
    };

    window._ieUpdateChk = function(){
      const listEl = document.getElementById('ie-chk-items'); if(!listEl) return;
      const editId = window._editIdeaId;
      const idea   = editId ? ideas.find(x=>x.id===editId) : null;
      const chks   = idea?.checklist || {};
      const yaPublicado = idea?.estado === 'publicado';

      // Barra de progreso
      const done = ETAPAS_PROD.filter(e => chks[e.k]).length;
      const pct  = Math.round(done / ETAPAS_PROD.length * 100);

      let h = '';
      // Barra visual
      h += `<div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;font-size:8px;color:#475569;margin-bottom:4px;">
          <span>${done} de ${ETAPAS_PROD.length} etapas completadas</span>
          <span style="color:${pct===100?'#22c55e':'#475569'};">${pct}%</span>
        </div>
        <div style="height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#f472b6,#a855f7);border-radius:3px;transition:width 0.3s;"></div>
        </div>
      </div>`;

      // Etapas como pills
      h += `<div style="display:flex;flex-direction:column;gap:5px;">`;
      ETAPAS_PROD.forEach((e, idx) => {
        const checked = !!chks[e.k];
        const prevDone = idx === 0 || !!chks[ETAPAS_PROD[idx-1].k];
        const disabled = yaPublicado || !prevDone;
        h += `<div onclick="${disabled ? '' : `window._ieChkToggle('${e.k}')`}"
          id="iechk-${e.k}"
          style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;
          border:1px solid ${checked ? 'rgba(244,114,182,0.3)' : 'rgba(255,255,255,0.06)'};
          background:${checked ? 'rgba(244,114,182,0.06)' : 'rgba(255,255,255,0.01)'};
          cursor:${disabled ? 'default' : 'pointer'};
          opacity:${!prevDone && !checked ? '0.4' : '1'};
          transition:all 0.15s;">
          <div style="width:20px;height:20px;border-radius:50%;border:1.5px solid ${checked ? '#f472b6' : 'rgba(255,255,255,0.12)'};
            background:${checked ? 'rgba(244,114,182,0.2)' : 'transparent'};
            display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;">
            ${checked ? '✓' : (idx+1)}
          </div>
          <div style="flex:1;">
            <div style="font-size:10px;color:${checked ? '#f472b6' : '#94a3b8'};font-weight:${checked ? '600' : '400'};">
              ${e.i} ${e.l}
            </div>
            <div style="font-size:8px;color:#334155;margin-top:1px;">${e.desc}</div>
          </div>
          ${checked ? '<span style="font-size:10px;color:#f472b6;">✓</span>' : ''}
        </div>`;
      });
      h += `</div>`;

      listEl.innerHTML = h;

      // Actualizar botón publicar
      _updatePublicarBtn(idea);
    };

    function _updatePublicarBtn(idea){
      const btn    = document.getElementById('ie-btn-publicar');
      const status = document.getElementById('ie-publicar-status');
      if(!btn) return;
      if(idea?.estado === 'publicado'){
        btn.style.display = 'none';
        if(status){
          status.style.display = 'block';
          const ts = idea.tsPublicado ? new Date(idea.tsPublicado) : null;
          const horas = ts ? Math.floor((Date.now()-ts.getTime())/3600000) : 0;
          status.innerHTML = `✅ Publicado${ts ? ' · ' + ts.toLocaleDateString('es-CO',{day:'numeric',month:'short'}) : ''} · ${horas < 48 ? '⏳ '+( 48-horas)+'h para análisis' : '📊 Listo para analizar'}`;
        }
      } else {
        btn.style.display = 'block';
        if(status) status.style.display = 'none';

    // ── Calendario tipo Notion ──────────────────────────────────────────
    window._notionCalState = {};  // { ideaId: { year, month } }

    function _notionRender(ideaId, containerId) {
      const container = document.getElementById(containerId); if(!container) return;
      const ideas = JSON.parse(localStorage.getItem('cosmo_ideas_pool')||'[]');
      const idea = ideas.find(x=>x.id===ideaId);
      const today = new Date();
      if(!window._notionCalState[ideaId]){
        window._notionCalState[ideaId] = { year: today.getFullYear(), month: today.getMonth() };
      }
      const { year, month } = window._notionCalState[ideaId];
      const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      const DIAS_H = ['L','M','X','J','V','S','D'];
      const firstDay = new Date(year, month, 1);
      const lastDay  = new Date(year, month+1, 0);
      const startDow = (firstDay.getDay()+6)%7; // 0=Lun
      const totalDays = lastDay.getDate();
      const selectedDate = idea?.fecha || '';
      const todayStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

      let h = `<div style="background:rgba(12,18,32,0.98);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px;user-select:none;">`;
      // Header mes
      h += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <button onclick="window._notionNav('${ideaId}','${containerId}',-1)" style="background:none;border:none;color:#475569;cursor:pointer;font-size:14px;padding:0 4px;">‹</button>
        <span style="font-size:10px;font-weight:500;color:#e2e8f0;">${MESES[month]} ${year}</span>
        <button onclick="window._notionNav('${ideaId}','${containerId}',1)" style="background:none;border:none;color:#475569;cursor:pointer;font-size:14px;padding:0 4px;">›</button>
      </div>`;
      // Días de semana
      h += `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;">`;
      DIAS_H.forEach(d => {
        h += `<div style="font-size:8px;color:#334155;text-align:center;padding:2px 0;">${d}</div>`;
      });
      h += `</div>`;
      // Días del mes
      h += `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">`;
      // Espacios vacíos antes del primer día
      for(let i=0;i<startDow;i++){
        h += `<div></div>`;
      }
      for(let d=1;d<=totalDays;d++){
        const dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        const isSelected = dateStr===selectedDate;
        const isToday = dateStr===todayStr;
        h += `<div onclick="window._notionPickDate('${ideaId}','${containerId}','${dateStr}')"
          style="font-size:10px;text-align:center;padding:4px 2px;border-radius:6px;cursor:pointer;
          background:${isSelected?'#f472b6':isToday?'rgba(244,114,182,0.12)':'transparent'};
          color:${isSelected?'#fff':isToday?'#f472b6':'#94a3b8'};
          font-weight:${isSelected||isToday?'600':'400'};
          transition:background 0.1s;"
          onmouseover="if(!${isSelected}){this.style.background='rgba(255,255,255,0.06)'}"
          onmouseout="if(!${isSelected}){this.style.background='${isSelected?'#f472b6':isToday?'rgba(244,114,182,0.12)':'transparent'}'}">
          ${d}
        </div>`;
      }
      h += `</div>`;
      // Mostrar fecha seleccionada
      if(selectedDate){
        const [sy,sm,sd] = selectedDate.split('-');
        h += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:9px;color:#22c55e;">✓ ${sd}/${sm}/${sy}</span>
          <button onclick="window._notionClearDate('${ideaId}','${containerId}')" style="background:none;border:none;color:#475569;font-size:9px;cursor:pointer;">Quitar</button>
        </div>`;
      }
      h += `</div>`;
      container.innerHTML = h;
    }

    window._notionNav = function(ideaId, containerId, dir){
      if(!window._notionCalState[ideaId]) window._notionCalState[ideaId]={year:new Date().getFullYear(),month:new Date().getMonth()};
      let {year,month} = window._notionCalState[ideaId];
      month += dir;
      if(month > 11){ month=0; year++; }
      if(month < 0){ month=11; year--; }
      window._notionCalState[ideaId] = {year,month};
      _notionRender(ideaId, containerId);
    };

    window._notionPickDate = function(ideaId, containerId, dateStr){
      const pool = JSON.parse(localStorage.getItem('cosmo_ideas_pool')||'[]');
      const idea = pool.find(x=>x.id===ideaId); if(!idea) return;
      idea.fecha = dateStr;
      localStorage.setItem('cosmo_ideas_pool', JSON.stringify(pool));
      _notionRender(ideaId, containerId);
      // Actualizar calendario si está cargado
      const calEl = document.getElementById('content-cal');
      if(calEl && calEl.style.display!=='none') renderCalView();
      renderList();
    };

    window._notionClearDate = function(ideaId, containerId){
      const pool = JSON.parse(localStorage.getItem('cosmo_ideas_pool')||'[]');
      const idea = pool.find(x=>x.id===ideaId); if(!idea) return;
      idea.fecha = '';
      localStorage.setItem('cosmo_ideas_pool', JSON.stringify(pool));
      _notionRender(ideaId, containerId);
      const calEl = document.getElementById('content-cal');
      if(calEl && calEl.style.display!=='none') renderCalView();
      renderList();
    };

    window._calNotionToggle = function(ideaId, btn){
      // Para ideas sin fecha en el calendario — abre un popover
      const containerId = 'notion-cal-inline-'+ideaId;
      let existing = document.getElementById(containerId);
      if(existing){ existing.remove(); return; }
      const wrapper = document.createElement('div');
      wrapper.id = containerId;
      wrapper.style.cssText = 'margin-top:6px;';
      btn.parentElement.insertAdjacentElement('afterend', wrapper);
      _notionRender(ideaId, containerId);
    };

        window._ideaChecklist=(id)=>{

      const el=document.getElementById('panel-ag-'+id);

      if(chk) chk.style.display='none';

      const wasHidden = el.style.display==='none';

        _notionRender(id, containerId);

    window._ideaChkToggle=(id,key)=>{
      const idea=ideas.find(x=>x.id===id); if(!idea) return;

    window._ideaSetFecha=(id)=>{

  function renderMissions(){

    if(activeFilter==='all'){
      filtered = missions;
    } else if(activeFilter.indexOf('priority:')=== 0){
      var pKey = activeFilter.replace('priority:','');
      if(pKey==='all') filtered = missions;
      else filtered = missions.filter(function(m){ return m.priority===pKey; });
    } else if(activeFilter.indexOf('status:')=== 0){
      var sKey = activeFilter.replace('status:','');
      filtered = missions.filter(function(m){ return m.status===sKey; });
    } else {
      filtered = missions.filter(function(m){ return (m.categories||[]).indexOf(activeFilter)!==-1; });
    }
    var active = filtered.filter(function(m){return m.status!=='done';}).sort(function(a,b){return (pOrder[a.priority]||1)-(pOrder[b.priority]||1);});
    var done   = filtered.filter(function(m){return m.status==='done';});

    active.forEach(function(m){ html += buildCard(m, missions.indexOf(m), false); });

  window._archivarMisiones = function(){
    var ahora = new Date();
    var antiguas = missions.filter(function(m){
      if(m.status!=='done') return false;
      if(!m.completedAt) return false;
      return Math.floor((ahora - new Date(m.completedAt))/86400000) >= 30;
    });
    if(!antiguas.length){ alert('No hay misiones con más de 30 días completadas.'); return; }
    if(!window.confirm('Se archivarán '+antiguas.length+' misión'+(antiguas.length>1?'es':'')+' completada'+(antiguas.length>1?'s':'')+' (más de 30 días).\n\nSe guardarán en un archivo JSON antes de eliminarlas.\n\n¿Continuar?')) return;
    // Descargar archivo
    var blob = new Blob([JSON.stringify(antiguas, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'cosmo_misiones_archivadas_'+ahora.toISOString().slice(0,10)+'.json';
    a.click(); URL.revokeObjectURL(url);
    // Eliminar del array
    var ids = antiguas.map(function(m){ return m.id; });
    missions = missions.filter(function(m){ return ids.indexOf(m.id)===-1; });
    saveM(); renderMissions();
  };
  window._togMission = function(mi){ missions[mi].collapsed=!missions[mi].collapsed; saveM(); renderMissions(); };
  window._undoneMission = function(mi){
    if(!window.confirm('¿Devolver esta misión a "En curso"?')) return;
    var mId = missions[mi].id;
    missions[mi].status = 'active';
    missions[mi].tasks.forEach(function(t){ t.done = false; });
    missions[mi].collapsed = false;
    // Re-bloquear misiones que dependían de esta
    missions.forEach(function(m){
      if(m.unlockedBy === mId && m.status !== 'done'){
        m.status = 'blocked';
      }
    });
    saveM(); renderMissions();
  };
  window._updM = function(mi,k,v){
    var prev = missions[mi][k];
    missions[mi][k]=(typeof v==='string'?v.trim():v);
    // Estampar fecha de completado si el status cambia a done
    if(k==='status'){
      if(v==='done' && prev!=='done') missions[mi].completedAt = new Date().toISOString();
      if(v!=='done' && prev==='done') delete missions[mi].completedAt;
    }
    saveM(); renderMissions();
  };
  window._delM = function(mi){ if(window.confirm('Eliminar mision?')){ missions.splice(mi,1); saveM(); renderMissions(); } };
  window._togTask = function(mi,ti){
    missions[mi].tasks[ti].done=!missions[mi].tasks[ti].done;
    var allDone=missions[mi].tasks.length&&missions[mi].tasks.every(function(t){return t.done;});
    if(allDone && missions[mi].status!=='done'){
      missions[mi].status='done';
      missions[mi].completedAt = new Date().toISOString();
    }
    if(!allDone && missions[mi].status==='done'){
      missions[mi].status='active';
      delete missions[mi].completedAt;
    }
    saveM(); renderMissions();
  };
  window._updTask = function(mi,ti,v){ missions[mi].tasks[ti].text=v.trim(); saveM(); };
  window._delTask = function(mi,ti){ missions[mi].tasks.splice(ti,1); saveM(); renderMissions(); };
  window._addTask = function(mi){ missions[mi].tasks.push({id:'t'+Date.now(),text:'Nueva tarea...',done:false,due:''}); saveM(); renderMissions(); };

  // Close calendars on outside click
  document.addEventListener('click', function(){ document.querySelectorAll('[id^="calwrap-"]').forEach(function(el){ el.style.display='none'; }); document.querySelectorAll('[id^="det-tcal-"]').forEach(function(el){ el.style.display='none'; }); });

  renderMissions();
  renderSidebar();
}

// ── Bidirectional sync: mission status/delete → etapa ──
window.syncMissionToEtapa = function(fromEtapaId, newStatus){
  var rutaRaw = localStorage.getItem('cosmo_metas2026');
  if(!rutaRaw) return;
  var metas = JSON.parse(rutaRaw);
  var changed = false;
  for(var mi=0;mi<metas.length;mi++){
    var etapas=metas[mi].etapas||[];
    for(var ei=0;ei<etapas.length;ei++){
      if(etapas[ei].eid===fromEtapaId){
        if(newStatus==='deleted'){
          metas[mi].etapas.splice(ei,1);
        } else {
          var map={'done':'Completado','active':'En progreso','pending':'Por iniciar','blocked':'Pausado'};
          if(map[newStatus]) metas[mi].etapas[ei].estado=map[newStatus];
        }
        changed=true;
        break;
      }
    }
    if(changed) break;
  }
  if(changed){
    localStorage.setItem('cosmo_metas2026', JSON.stringify(metas));
    // Re-render ruta panel if open
    var rutaPanel = document.getElementById('ruta-etapas-panel');
    if(rutaPanel || document.getElementById('ruta-anual-root')){
      if(typeof window._rutaRender==='function') window._rutaRender();
      else if(typeof render==='function') render();
    }
  }
};

  var nA=missions.filter(function(m){return m.status==='active';}).length;
  var nD=missions.filter(function(m){return m.status==='done';}).length;
  var avg=missions.length?Math.round(missions.reduce(function(s,m){return s+calcProg(m);},0)/missions.length):0;
  statsEl.innerHTML=
    '<div style="flex:1;text-align:center;background:rgba(6,182,212,0.08);border-radius:6px;padding:4px;">'

    +'<div style="font-size:7px;color:#475569;">activas</div></div>'

    +'<div style="flex:1;text-align:center;background:rgba(124,58,237,0.08);border-radius:6px;padding:4px;">'
