<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="COSMO Hub">
  <meta name="theme-color" content="#0a0f1a">
  <meta name="mobile-web-app-capable" content="yes">
<title>COSMO — Hub Cósmico</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

:root{
  --bg:#030508;
  --accent:#7c3aed;--accent2:#a855f7;
  --teal:#06b6d4;--teal2:#22d3ee;
  --gold:#f59e0b;--green:#22c55e;
  --red:#ef4444;--orange:#f97316;
  --text:#e2e8f0;--muted:#475569;
  --surface:rgba(12,18,32,0.95);
  --border:rgba(124,58,237,0.25);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  width:100vw;height:100vh;overflow:hidden;
  display:flex;flex-direction:column;
}

/* STARS BG */
#starfield{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* HEADER */
header{
  position:relative;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;
  border-bottom:1px solid rgba(124,58,237,0.15);
  background:rgba(3,5,8,0.9);
  flex-shrink:0;
}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:5px;background:linear-gradient(90deg,var(--accent2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:8px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;}
.hdate{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite;display:inline-block;margin-left:8px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* CANVAS AREA */
#cosmos{position:relative;flex:1;z-index:1;overflow:hidden;}

/* ORBIT RINGS */
.orbit-ring{
  position:absolute;border-radius:50%;border:1px solid rgba(124,58,237,0.1);
  pointer-events:none;transform:translate(-50%,-50%);
}

/* NUCLEUS */
#nucleus{
  position:absolute;transform:translate(-50%,-50%);
  cursor:pointer;z-index:10;
}
.nucleus-glow{
  position:absolute;inset:-30px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,0.25) 0%,transparent 70%);
  animation:nucleusPulse 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes nucleusPulse{0%,100%{transform:scale(1);opacity:0.7;}50%{transform:scale(1.15);opacity:1;}}
.nucleus-body{
  width:110px;height:110px;border-radius:50%;
  background:linear-gradient(135deg,#1a0a3e,#0c1a3a);
  border:2px solid rgba(168,85,247,0.5);
  box-shadow:0 0 30px rgba(124,58,237,0.4),0 0 60px rgba(124,58,237,0.15),inset 0 0 20px rgba(124,58,237,0.1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  transition:all 0.3s;position:relative;z-index:1;
}
.nucleus-body:hover{
  box-shadow:0 0 40px rgba(124,58,237,0.6),0 0 80px rgba(124,58,237,0.2),inset 0 0 30px rgba(124,58,237,0.15);
  border-color:rgba(168,85,247,0.8);
}
.nucleus-icon{font-size:28px;line-height:1;}
.nucleus-label{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;background:linear-gradient(90deg,var(--accent2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nucleus-sub{font-size:8px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}

/* ORBIT PARTICLES */
.orbit-particle{
  position:absolute;border-radius:50%;pointer-events:none;
  background:var(--accent2);opacity:0.6;
}

/* STAR NODES */
.star-node{
  position:absolute;transform:translate(-50%,-50%);
  cursor:pointer;z-index:10;
  transition:filter 0.3s;
}
.star-node:hover .star-body{transform:scale(1.12);}
.star-body{
  width:80px;height:80px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  transition:all 0.3s;position:relative;
  border:1.5px solid transparent;
}
.star-body::before{
  content:'';position:absolute;inset:-1px;border-radius:50%;
  background:inherit;filter:blur(8px);opacity:0.4;z-index:-1;
}
.sn-map .star-body{
  background:linear-gradient(135deg,#0a2040,#0c3060);
  border-color:rgba(6,182,212,0.5);
  box-shadow:0 0 20px rgba(6,182,212,0.25);
}
.sn-billing .star-body{
  background:linear-gradient(135deg,#1a0a00,#2a1500);
  border-color:rgba(245,158,11,0.5);
  box-shadow:0 0 20px rgba(245,158,11,0.25);
}
.sn-team .star-body{
  background:linear-gradient(135deg,#001a1a,#002a2a);
  border-color:rgba(34,197,94,0.5);
  box-shadow:0 0 20px rgba(34,197,94,0.25);
}
.sn-prod .star-body{
  background:linear-gradient(135deg,#1a1000,#2a2000);
  border-color:rgba(249,115,22,0.5);
  box-shadow:0 0 20px rgba(249,115,22,0.2);
}
.sn-content .star-body{
  background:linear-gradient(135deg,#1a0020,#2a0035);
  border-color:rgba(236,72,153,0.5);
  box-shadow:0 0 20px rgba(236,72,153,0.2);
}
.sn-prod .star-label{color:#fb923c;}
.sn-content .star-label{color:#f472b6;}

/* Orbit 2 stars slightly smaller */
.orbit2-star .star-body{width:72px;height:72px;}
.orbit2-star .star-icon{font-size:19px;}
.orbit2-star .star-label{font-size:9px;}
.star-icon{font-size:22px;line-height:1;}
.star-label{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;text-align:center;line-height:1.2;}
.sn-map .star-label{color:var(--teal2);}
.sn-billing .star-label{color:var(--gold);}
.sn-team .star-label{color:var(--green);}
.sn-prod .star-body{background:linear-gradient(135deg,#1a0a1a,#2a1030);border-color:rgba(249,115,22,0.5);box-shadow:0 0 20px rgba(249,115,22,0.25);}
.sn-prod .star-label{color:var(--orange);}
.sn-content .star-body{background:linear-gradient(135deg,#0a1a2a,#0a2035);border-color:rgba(236,72,153,0.5);box-shadow:0 0 20px rgba(236,72,153,0.25);}
.sn-content .star-label{color:#f472b6;}
.orbit2-star .star-body{width:70px;height:70px;}
.orbit2-star .star-icon{font-size:18px;}
.orbit2-star .star-label{font-size:9px;}

/* SHIP NODES — Órbita 3 */
.ship-node{
  position:absolute;transform:translate(-50%,-50%);
  cursor:pointer;z-index:10;transition:filter 0.3s;
}
.ship-node:hover .ship-body{transform:scale(1.1);}
.ship-body{
  width:76px;height:76px;
  clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  transition:all 0.35s;position:relative;
}
.ship-body::after{
  content:'';position:absolute;inset:0;
  clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
  filter:blur(10px);opacity:0.5;z-index:-1;
  background:inherit;
}
/* Thruster glow animation */
.ship-body::before{
  content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  width:12px;height:14px;border-radius:0 0 50% 50%;
  animation:thruster 1.2s ease-in-out infinite alternate;
  z-index:-1;
}
@keyframes thruster{
  0%{opacity:0.4;transform:translateX(-50%) scaleY(0.6);}
  100%{opacity:0.9;transform:translateX(-50%) scaleY(1.3);}
}
.sn-ruta .ship-body{
  background:linear-gradient(160deg,#001535,#002560,#0040a0);
  border:1.5px solid rgba(56,189,248,0.6);
  box-shadow:0 0 24px rgba(56,189,248,0.3),inset 0 1px 0 rgba(56,189,248,0.2);
}
.sn-ruta .ship-body::before{background:rgba(56,189,248,0.6);}
.sn-ruta .ship-label{color:#38bdf8;}
.sn-inversiones .ship-body{
  background:linear-gradient(160deg,#1a1000,#2a1a00,#3a2500);
  border:1.5px solid rgba(251,191,36,0.7);
  box-shadow:0 0 24px rgba(251,191,36,0.35),inset 0 1px 0 rgba(251,191,36,0.2);
}
.sn-inversiones .ship-body::before{background:rgba(251,191,36,0.7);}
.sn-inversiones .ship-label{color:#fbbf24;}
.sn-verificacion .ship-body{
  background:linear-gradient(160deg,#001a10,#002a18,#003a22);
  border:1.5px solid rgba(52,211,153,0.7);
  box-shadow:0 0 24px rgba(52,211,153,0.35),inset 0 1px 0 rgba(52,211,153,0.2);
}
.sn-verificacion .ship-body::before{background:rgba(52,211,153,0.7);}
.sn-verificacion .ship-label{color:#34d399;}
.sn-biblioteca .ship-body{
  background:linear-gradient(160deg,#1a0030,#2a0050,#3a0070);
  border:1.5px solid rgba(192,132,252,0.7);
  box-shadow:0 0 24px rgba(192,132,252,0.35),inset 0 1px 0 rgba(192,132,252,0.2);
}
.sn-biblioteca .ship-body::before{background:rgba(192,132,252,0.7);}
.sn-biblioteca .ship-label{color:#c084fc;}

/* ── OBSERVADOR: ojo cósmico flotante ── */
#observador{
  position:absolute;
  cursor:pointer;
  z-index:15;
  user-select:none;
  animation:observadorFloat 6s ease-in-out infinite;
}
@keyframes observadorFloat{
  0%,100%{transform:translate(-50%,-50%) translateY(0px);}
  50%{transform:translate(-50%,-50%) translateY(-8px);}
}
.obs-eye{
  position:relative;
  width:54px;height:34px;
  display:flex;align-items:center;justify-content:center;
}
.obs-eye::before,.obs-eye::after{
  content:'';position:absolute;
  width:54px;height:34px;
  border-radius:50%;
  background:transparent;
}
.obs-eye::before{
  border:1.5px solid rgba(14,165,233,0.6);
  box-shadow:0 0 14px rgba(14,165,233,0.3),inset 0 0 10px rgba(14,165,233,0.08);
  clip-path:ellipse(50% 50% at 50% 50%);
}
.obs-iris{
  width:22px;height:22px;border-radius:50%;
  background:radial-gradient(circle at 38% 38%,#7dd3fc,#0284c7 50%,#0c4a6e);
  border:1.5px solid rgba(14,165,233,0.8);
  box-shadow:0 0 12px rgba(14,165,233,0.5),0 0 24px rgba(14,165,233,0.2);
  position:relative;z-index:1;
  animation:irisPulse 3s ease-in-out infinite;
}
@keyframes irisPulse{0%,100%{box-shadow:0 0 12px rgba(14,165,233,0.5),0 0 24px rgba(14,165,233,0.2);}50%{box-shadow:0 0 20px rgba(14,165,233,0.8),0 0 40px rgba(14,165,233,0.35);}}
.obs-pupil{
  width:9px;height:9px;border-radius:50%;
  background:#020617;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  box-shadow:inset 0 0 4px rgba(14,165,233,0.3);
}
.obs-lashes{
  position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  width:40px;height:6px;
  background:linear-gradient(to bottom,transparent,rgba(14,165,233,0.15));
  clip-path:polygon(10% 0%,90% 0%,100% 100%,0% 100%);
}
.obs-label{
  font-family:'Bebas Neue',sans-serif;
  font-size:8px;letter-spacing:2.5px;
  color:#38bdf8;opacity:0.7;
  text-align:center;margin-top:4px;
  text-transform:uppercase;
}
.obs-glow{
  position:absolute;inset:-12px;border-radius:50%;
  background:radial-gradient(circle,rgba(14,165,233,0.12) 0%,transparent 70%);
  pointer-events:none;
  animation:obsGlow 4s ease-in-out infinite;
}
@keyframes obsGlow{0%,100%{opacity:0.5;}50%{opacity:1;}}
.ship-icon{font-size:20px;line-height:1;}
.ship-label{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:2px;text-align:center;line-height:1.2;}

/* WIP NODES */
.sn-wip{opacity:0.55;filter:saturate(0.3);}
.sn-wip:hover{opacity:0.75;filter:saturate(0.5);}
.wip-badge{
  position:absolute;top:-6px;right:-6px;
  font-size:11px;line-height:1;
  background:rgba(10,14,26,0.9);border-radius:50%;
  padding:2px;z-index:20;
  animation:wipPulse 2.5s ease-in-out infinite;
}
@keyframes wipPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.25);}}

/* PEDIDOS ship node */
.sn-pedidos .ship-body{
  background:linear-gradient(160deg,#0a1520,#0f2030,#152840);
  border:1.5px solid rgba(100,148,237,0.45);
  box-shadow:0 0 18px rgba(100,148,237,0.15),inset 0 1px 0 rgba(100,148,237,0.1);
}
.sn-pedidos .ship-body::before{background:rgba(100,148,237,0.4);}
.sn-pedidos .ship-label{color:#93b4f0;}

/* CONNECTION LINES */
#connections{position:absolute;inset:0;pointer-events:none;z-index:2;}

/* PANEL */
#panel-overlay{
  position:fixed;inset:0;z-index:50;
  display:none;align-items:center;justify-content:center;
  background:rgba(3,5,8,0.75);backdrop-filter:blur(12px);
}
#panel-overlay.show{display:flex;}
.panel-box{
  background:rgba(10,14,26,0.98);
  border:1px solid var(--border);
  border-radius:18px;
  width:min(680px,92vw);max-height:85vh;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 0 60px rgba(124,58,237,0.2);
  animation:panelIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes panelIn{from{opacity:0;transform:scale(0.88) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;
}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;}
.panel-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px;transition:color 0.2s;line-height:1;}
.panel-close:hover{color:var(--text);}
.panel-body{padding:18px 20px;overflow-y:auto;flex:1;}
.panel-body::-webkit-scrollbar{width:3px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ===== NUCLEUS PANEL ===== */
.north-star-panel{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;background:rgba(124,58,237,0.06);border:1px solid rgba(124,58,237,0.2);border-radius:12px;padding:18px 20px;margin-bottom:14px;position:relative;overflow:hidden;}
.north-star-panel::before{content:'★';position:absolute;right:120px;top:-15px;font-size:130px;opacity:0.03;color:var(--gold);pointer-events:none;}
.nsp-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:4px;}
.nsp-title{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1.1;margin-bottom:6px;}
.nsp-title span{color:var(--gold);}
.nsp-desc{font-size:11px;color:var(--muted);line-height:1.6;}
.nsp-metrics{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.nsp-m{text-align:right;}
.nsp-val{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;}
.nsp-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.status-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;text-align:center;}
.sc-val{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;}
.sc-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}

.prog-row{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;}
.prog-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:6px;}
.prog-track{height:7px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--teal));position:relative;}
.prog-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;background:#fff;border-radius:2px;box-shadow:0 0 8px var(--teal);}

/* ===== BILLING PANEL ===== */
.bill-top{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.bill-card-p{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.bill-card-p::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.bcp-current::before{background:linear-gradient(90deg,var(--accent),var(--teal));}
.bcp-target::before{background:linear-gradient(90deg,var(--gold),var(--orange));}
.bc-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:5px;}
.bc-val{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;}
.bc-sub{font-size:10px;color:var(--muted);margin-top:3px;}
.bc-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:600;margin-top:5px;}
.bcb-ok{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.bcb-warn{background:rgba(245,158,11,0.15);color:var(--gold);border:1px solid rgba(245,158,11,0.3);}

.channels-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.ch-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:9px;padding:9px 12px;}
.ch-icon-s{font-size:16px;width:24px;text-align:center;}
.ch-info{flex:1;}
.ch-name-s{font-size:11px;font-weight:500;}
.ch-amt{font-size:10px;color:var(--muted);}
.ch-pct-s{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;}
.ch-bar-wrap{width:80px;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;}
.ch-bar-fill{height:100%;border-radius:2px;}

.monthly-hist{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:12px 14px;}
.mh-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
.mh-bars{display:flex;align-items:flex-end;gap:6px;height:56px;}
.mhb-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.mhb{width:100%;border-radius:3px 3px 0 0;min-height:2px;cursor:pointer;position:relative;}
.mhb:hover::after{content:attr(data-v);position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);background:rgba(12,18,32,0.97);border:1px solid var(--border);border-radius:4px;padding:2px 5px;font-size:9px;white-space:nowrap;z-index:5;}
.mhb-lbl{font-size:8px;color:var(--muted);}

/* ===== TEAM PANEL ===== */
.team-cards-p{display:flex;flex-direction:column;gap:10px;}
.tc{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;}
.tc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.tc-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;flex-shrink:0;}
.av-d2{background:linear-gradient(135deg,var(--accent),var(--accent2));}
.av-k2{background:linear-gradient(135deg,var(--teal),#0891b2);}
.av-h2{background:linear-gradient(135deg,#374151,#6b7280);}
.tc-name{font-weight:600;font-size:13px;}
.tc-role{font-size:10px;color:var(--muted);}
.tc-badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:9px;margin-bottom:8px;}
.tb-ceo2{background:rgba(124,58,237,0.18);color:var(--accent2);border:1px solid rgba(124,58,237,0.3);}
.tb-ops2{background:rgba(6,182,212,0.15);color:var(--teal);border:1px solid rgba(6,182,212,0.3);}
.tb-prod2{background:rgba(100,116,139,0.2);color:#94a3b8;border:1px solid rgba(100,116,139,0.3);}
.tc-funcs{display:flex;flex-wrap:wrap;gap:4px;}

<script>
// ─── FIREBASE SYNC LAYER ──────────────────────────────────────────────────────
const HUB_FB_CONFIG = {
  apiKey: "AIzaSyDnOYVdYsve9H7jj8hxmaB1blyilc4RaIU",
  authDomain: "cosmo-98107.firebaseapp.com",
  projectId: "cosmo-98107",
  storageBucket: "cosmo-98107.firebasestorage.app",
  messagingSenderId: "748680846493",
  appId: "1:748680846493:web:1d6f8b2a3bc494c555c874"
};

// Keys to sync with Firebase (skip UI state keys)
const HUB_SYNC_KEYS = ['cosmo_metas2026', 'cosmo_missions', 'cosmo_inversiones', 'cosmo_team', 'cosmo_prod_meta', 'cosmo_embajadores', 'cosmo_ideas', 'cosmo_canales', 'cg_gastos', 'cg_ingresos', 'cg_tags', 'cg_itags', 'cosmo_biblioteca', 'cosmo_verif_mant', 'cosmo_verif_hist', 'cosmo_meta_mensual', 'cosmo_shopify_pedidos'];

let _hubDb = null, _hubDoc, _hubGetDoc, _hubSetDoc, _hubOnSnapshot;
let _hubSaveTimers = {};
let _hubListeners = {}; // active onSnapshot unsubscribers

async function hubInitFirebase(){
  try{
    const {initializeApp, getApps, getApp} = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const {getFirestore, doc, getDoc, setDoc, onSnapshot, collection} = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
    const existing = getApps().find(a => a.name === 'cosmo-hub-app');
    const app = existing ? getApp('cosmo-hub-app') : initializeApp(HUB_FB_CONFIG, 'cosmo-hub-app');
    _hubDb = getFirestore(app);
    _hubDoc = doc; _hubGetDoc = getDoc; _hubSetDoc = setDoc; _hubOnSnapshot = onSnapshot;
  } catch(e){ console.warn('Hub Firebase init error:', e); }
}

// ── COLA OFFLINE ─────────────────────────────────────────────────────────────
// Escrituras que fallaron sin conexión — se reintentan cuando vuelve la red
const OFFLINE_QUEUE_KEY = 'cosmo_hub_offline_queue';

function _offlineQueueLoad(){
  try{ return JSON.parse(_origGetItem(OFFLINE_QUEUE_KEY)||'{}'); } catch(e){ return {}; }
}
function _offlineQueueSave(q){
  _origSetItem(OFFLINE_QUEUE_KEY, JSON.stringify(q));
}
function _offlineQueueAdd(key, value){
  var q = _offlineQueueLoad();
  q[key] = value; // last-write-wins por key
  _offlineQueueSave(q);
}
function _offlineQueueClear(){
  _origSetItem(OFFLINE_QUEUE_KEY, '{}');
}

async function _flushOfflineQueue(){
  if(!_hubDb) return;
  var q = _offlineQueueLoad();
  var keys = Object.keys(q);
  if(!keys.length) return;
  console.log('Hub: vaciando cola offline —', keys.length, 'pendientes');
  var flushed = [];
  for(var i=0; i<keys.length; i++){
    var k = keys[i];
    try{
      if(q[k] === '__DELETED__'){
        const {deleteDoc} = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
        await deleteDoc(_hubDoc(_hubDb, 'cosmo-hub', k));
      } else {
        await _hubSetDoc(_hubDoc(_hubDb, 'cosmo-hub', k), { data: q[k], updatedAt: Date.now() });
      }
      flushed.push(k);
    } catch(e){ console.warn('Hub: error al subir pendiente:', k, e); }
  }
  if(flushed.length){
    var remaining = _offlineQueueLoad();
    flushed.forEach(function(k){ delete remaining[k]; });
    _offlineQueueSave(remaining);
    console.log('Hub: cola offline vaciada —', flushed.length, 'subidos');
    var dot = document.querySelector('.pulse-dot');
    if(dot){
      dot.style.background = '#22c55e';
      dot.style.boxShadow = '0 0 8px #22c55e';
      setTimeout(function(){ dot.style.background=''; dot.style.boxShadow=''; }, 2000);
    }
    var banner = document.getElementById('hub-offline-banner');
    if(banner) banner.remove();
  }
}

// Escuchar reconexión a la red
window.addEventListener('online', function(){
  console.log('Hub: red recuperada — intentando sincronizar pendientes');
  if(!_hubDb){
    // Firebase no estaba inicializado — reintentar boot completo
    hubInitFirebase().then(function(){
      _flushOfflineQueue();
      hubStartRealtimeListeners();
    });
  } else {
    _flushOfflineQueue();
  }
});

// ── Indicador de sync ────────────────────────────────────────────────────────
var _syncPending = 0;
function _syncShow(){
  _syncPending++;
  var dot = document.querySelector('.pulse-dot');
  if(dot){ dot.style.background='#f59e0b'; dot.style.boxShadow='0 0 8px #f59e0b'; dot.title='Sincronizando...'; }
}
function _syncDone(ok){
  _syncPending = Math.max(0, _syncPending-1);
  if(_syncPending > 0) return;
  var dot = document.querySelector('.pulse-dot');
  if(!dot) return;
  if(ok){
    dot.style.background='#22c55e'; dot.style.boxShadow='0 0 8px #22c55e'; dot.title='Sincronizado ✅';
    setTimeout(function(){ dot.style.background=''; dot.style.boxShadow=''; dot.title=''; }, 2000);
  } else {
    dot.style.background='#ef4444'; dot.style.boxShadow='0 0 8px #ef4444'; dot.title='Error de sync — dato en cola offline';
    setTimeout(function(){ dot.style.background='#f59e0b'; dot.style.boxShadow='0 0 8px #f59e0b'; dot.title='Modo offline — datos en cola'; }, 3000);
  }
}

function hubFbSave(key, value){
  if(!_hubDb || !navigator.onLine){
    _offlineQueueAdd(key, value);
    _syncDone(false);
    return;
  }
  _syncShow();
  clearTimeout(_hubSaveTimers[key]);
  var ts = Date.now();
  // Guardar timestamp local inmediatamente para last-write-wins en el próximo boot
  _origSetItem('__ts_'+key, String(ts));
  _hubSaveTimers[key] = setTimeout(async () => {
    try{
      await _hubSetDoc(_hubDoc(_hubDb, 'cosmo-hub', key), { data: value, updatedAt: ts });
      _syncDone(true);
    } catch(e){
      console.warn('Hub fbSave error — encolando:', key, e);
      _offlineQueueAdd(key, value);
      _syncDone(false);
    }
  }, 1000);
}

function hubFbDelete(key){
  if(!_hubDb || !navigator.onLine){
    // Encolar el borrado marcando el value como null con timestamp
    _offlineQueueAdd(key, '__DELETED__');
    return;
  }
  clearTimeout(_hubSaveTimers[key]);
  setTimeout(async function(){
    try{
      const {deleteDoc} = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      await deleteDoc(_hubDoc(_hubDb, 'cosmo-hub', key));
      _syncDone(true);
    } catch(e){ console.warn('Hub fbDelete error:', key, e); }
  }, 500);
}

async function hubFbLoad(key){
  if(!_hubDb) return null;
  try{
    const snap = await _hubGetDoc(_hubDoc(_hubDb, 'cosmo-hub', key));
    if(snap.exists()){
      const d = snap.data();
      // Devolver objeto con data + updatedAt para last-write-wins
      if(d.updatedAt !== undefined){
        return JSON.stringify({ data: d.data, updatedAt: d.updatedAt });
      }
      return d.data;
    }
  } catch(e){ console.warn('Hub fbLoad error:', e); }
  return null;
}

// Keys that should be watched in real time (updated from other devices)
const HUB_REALTIME_KEYS = [
  'cosmo_prod_meta',
  'cosmo_verif_mant',
  'cosmo_verif_hist',
  'cosmo_missions',
  'cosmo_metas2026',
  'cosmo_inversiones',
  'cosmo_team',
  'cosmo_embajadores',
  'cosmo_ideas',
  'cosmo_canales',
  'cosmo_biblioteca',
  'cosmo_shopify_pedidos',
  'cg_gastos',
  'cg_ingresos',
  'cg_tags',
  'cg_itags',
  'cosmo_meta_mensual',
];

function _todayKey(){
  var n=new Date();
  return 'cosmo_prod_'+n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}

function _recentProdKeys(){
  var keys = [];
  for(var i = 0; i < 7; i++){
    var d = new Date(); d.setDate(d.getDate() - i);
    var ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    keys.push('cosmo_prod_'+ds);
    keys.push('cosmo_verif_'+ds);
  }
  return keys;
}

function hubStartRealtimeListeners(){
  if(!_hubDb || !_hubOnSnapshot) return;

  // Build list: static keys + last 7 days of production keys
  var keysToWatch = HUB_REALTIME_KEYS.concat(_recentProdKeys());

  keysToWatch.forEach(function(key){
    if(_hubListeners[key]) return; // already listening
    try{
      var unsubscribe = _hubOnSnapshot(
        _hubDoc(_hubDb, 'cosmo-hub', key),
        function(snap){
          if(!snap.exists()) return;
          var remoteVal = snap.data().data;
          var localVal  = localStorage.getItem(key);

          // Detectar marcador de borrado enviado por otro dispositivo
          if(remoteVal === '__DELETED__'){
            if(localVal !== null){
              _origRemoveItem(key);
              _origRemoveItem('__ts_'+key);
              _hubReactToChange(key + '__DELETED__');
            }
            return;
          }

          // Solo actualizar si el valor remoto es diferente al local
          if(remoteVal !== null && remoteVal !== undefined && remoteVal !== localVal){
            _origSetItem(key, remoteVal);
            _hubReactToChange(key);
          }
        },
        function(err){ console.warn('onSnapshot error for', key, err); }
      );
      _hubListeners[key] = unsubscribe;
    } catch(e){ console.warn('hubStartRealtimeListeners error:', key, e); }
  });
}

// Refresh the relevant UI after a remote change lands
function _hubReactToChange(key){
  try{
    // Normalizar key — puede venir con sufijo __DELETED__
    var isDeleted = key.endsWith('__DELETED__');
    var cleanKey  = isDeleted ? key.replace('__DELETED__','') : key;

    // Production panel: day data changed or deleted
    if(cleanKey.startsWith('cosmo_prod_') && cleanKey !== 'cosmo_prod_meta'){
      if(isDeleted){
        // Día borrado en otro dispositivo → refrescar historial
        if(typeof renderProdHistorial === 'function') renderProdHistorial();
        if(typeof updateNucleusStats === 'function') updateNucleusStats();
      } else {
        if(window._prodActiveToday && cleanKey === 'cosmo_prod_'+window._prodActiveToday){
          if(typeof window._prodActiveRefresh === 'function') window._prodActiveRefresh();
        }
        if(typeof updateNucleusStats === 'function') updateNucleusStats();
      }
    }
    // prod_meta changed
    if(cleanKey === 'cosmo_prod_meta'){
      var overlay = document.getElementById('panel-overlay');
      if(overlay && overlay.classList.contains('show')){
        var title = (document.querySelector('.panel-title')||{}).textContent||'';
        if(title.includes('PRODUCCIÓN') || title.includes('PRODUCCION')){
          if(typeof initProd === 'function') initProd();
        }
      }
    }
    // Billing / income data changed
    if(cleanKey.startsWith('cg_') || cleanKey === 'cosmo_meta_mensual'){
      var overlay2 = document.getElementById('panel-overlay');
      if(overlay2 && overlay2.classList.contains('show')){
        var title2 = (document.querySelector('.panel-title')||{}).textContent||'';
        if(title2.includes('FINANZAS') || title2.includes('BILLING') || title2.includes('FACTURACIÓN')){
          if(typeof initBilling === 'function') initBilling();
        }
      }
    }
    // Verif daily data changed or deleted
    if(cleanKey.startsWith('cosmo_verif_') && cleanKey !== 'cosmo_verif_mant' && cleanKey !== 'cosmo_verif_hist'){
      var overlay3 = document.getElementById('panel-overlay');
      if(overlay3 && overlay3.classList.contains('show')){
        var title3 = (document.querySelector('.panel-title')||{}).textContent||'';
        if(title3.includes('VERIF') || title3.includes('DIARIA')){
          if(typeof initVerificacion === 'function') initVerificacion();
        }
      }
    }
    // Misiones changed
    if(cleanKey === 'cosmo_missions'){
      var sbRoot = document.getElementById('missions-root');
      if(sbRoot && typeof renderMissions === 'function') renderMissions();
    }
    // Pulsar punto verde en el header
    var dot = document.querySelector('.pulse-dot');
    if(dot){
      dot.style.background = isDeleted ? '#ef4444' : '#06b6d4';
      dot.style.boxShadow  = '0 0 8px '+(isDeleted?'#ef4444':'#06b6d4');
      setTimeout(function(){
        dot.style.background = '';
        dot.style.boxShadow  = '';
      }, 1500);
    }
  } catch(e){}
}

// Override localStorage to intercept writes AND deletes, syncing both to Firebase
const _origSetItem = localStorage.setItem.bind(localStorage);
const _origGetItem = localStorage.getItem.bind(localStorage);
const _origRemoveItem = localStorage.removeItem.bind(localStorage);

localStorage.setItem = function(key, value){
  _origSetItem(key, value);
  // Sync known keys OR any daily-keyed records (prod + verif)
  var isDailyKey = /^cosmo_prod_\d{4}-\d{2}-\d{2}$/.test(key) || /^cosmo_verif_\d{4}-\d{2}-\d{2}$/.test(key);
  if(isDailyKey || HUB_SYNC_KEYS.some(k => key === k)){
    hubFbSave(key, value);
  }
};

// Interceptar removeItem — borra de Firebase también
localStorage.removeItem = function(key){
  _origRemoveItem(key);
  var isDailyKey = /^cosmo_prod_\d{4}-\d{2}-\d{2}$/.test(key) || /^cosmo_verif_\d{4}-\d{2}-\d{2}$/.test(key);
  if(isDailyKey || HUB_SYNC_KEYS.some(k => key === k)){
    hubFbDelete(key);
  }
};

// Boot: load Firebase data into localStorage before modules init
async function hubBoot(){
  const bar = document.getElementById('hub-boot-bar');
  const msg = document.getElementById('hub-boot-msg');

  if(bar) bar.style.width = '20%';

  // Timeout de seguridad: si Firebase tarda >8s, arranca en modo offline
  var bootTimedOut = false;
  var bootTimeout = setTimeout(function(){
    bootTimedOut = true;
    _finalizeBoot(false, 'Sin conexión — modo offline');
  }, 8000);

  try{
    await hubInitFirebase();
    if(bootTimedOut) return; // ya se resolvió por timeout
    if(bar) bar.style.width = '50%';
    if(msg) msg.textContent = 'Cargando datos...';

    if(_hubDb){
      // Cargar todos los docs de Firebase en paralelo
      const entries = await Promise.all(
        HUB_SYNC_KEYS.map(async key => {
          const val = await hubFbLoad(key);
          return [key, val];
        })
      );
      if(bootTimedOut) return;

      // Last-write-wins: solo sobreescribir si Firebase es MÁS RECIENTE que local
      // Cada doc en Firebase tiene { data, updatedAt }
      entries.forEach(([key, val]) => {
        if(val === null || val === undefined) return;
        var fbData = val;
        var fbTs   = 0;
        try{
          var parsed = JSON.parse(val);
          if(parsed && typeof parsed === 'object' && 'updatedAt' in parsed){
            fbData = parsed.data;
            fbTs   = parsed.updatedAt || 0;
          }
        } catch(e){}
        // Si Firebase dice que fue borrado, borrar localmente
        if(fbData === '__DELETED__'){
          _origRemoveItem(key);
          _origRemoveItem('__ts_'+key);
          return;
        }
        var localTs = parseInt(_origGetItem('__ts_'+key)||'0');
        if(fbTs >= localTs){
          _origSetItem(key, typeof fbData === 'string' ? fbData : JSON.stringify(fbData));
          _origSetItem('__ts_'+key, String(fbTs));
        }
      });

      // Also load all production/verif day records from Firebase — con last-write-wins
      try{
        const {collection, getDocs} = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
        const colSnap = await getDocs(collection(_hubDb, 'cosmo-hub'));
        colSnap.forEach(function(docSnap){
          var k = docSnap.id;
          if(/^cosmo_prod_\d{4}-\d{2}-\d{2}$/.test(k) || /^cosmo_verif_\d{4}-\d{2}-\d{2}$/.test(k)){
            var d = docSnap.data();
            var fbTs  = d.updatedAt || 0;
            var fbVal = d.data;
            if(fbVal === null || fbVal === undefined) return;
            // Si es marcador de borrado, borrar localmente
            if(fbVal === '__DELETED__'){
              _origRemoveItem(k);
              _origRemoveItem('__ts_'+k);
              return;
            }
            var localTs = parseInt(_origGetItem('__ts_'+k)||'0');
            if(fbTs >= localTs){
              _origSetItem(k, fbVal);
              _origSetItem('__ts_'+k, String(fbTs));
            }
          }
        });
      } catch(e){ console.warn('Hub: error cargando días:', e); }

      clearTimeout(bootTimeout);
      _finalizeBoot(true, '✅ Sincronizado');
      _flushOfflineQueue();

      // ── Push único: subir datos locales que nunca llegaron a Firebase ──
      // Aplica a todos los keys en HUB_SYNC_KEYS que tengan datos pero sin timestamp
      setTimeout(function(){
        HUB_SYNC_KEYS.forEach(function(key){
          var localTs = parseInt((_origGetItem)('__ts_'+key)||'0');
          if(localTs === 0){
            var val = _origGetItem(key);
            if(val && val !== 'null' && val !== '[]' && val !== '{}'){
              hubFbSave(key, val);
            }
          }
        });
      }, 4000); // subir datos que quedaron pendientes de sesiones offline
    } else {
      clearTimeout(bootTimeout);
      _finalizeBoot(false, '⚠️ Sin Firebase — usando datos locales');
    }
  } catch(e){
    if(bootTimedOut) return;
    clearTimeout(bootTimeout);
    console.warn('Hub boot error:', e);
    _finalizeBoot(false, '⚠️ Error de conexión — datos locales');
  }
}

function _finalizeBoot(online, statusMsg){
  const bar = document.getElementById('hub-boot-bar');
  const msg = document.getElementById('hub-boot-msg');
  if(bar) bar.style.width = '100%';
  if(msg){ msg.textContent = statusMsg; msg.style.color = online ? '#22c55e' : '#f59e0b'; }

  // Si es offline, mostrar banner persistente después del splash
  if(!online){
    setTimeout(function(){
      var existing = document.getElementById('hub-offline-banner');
      if(existing) return;
      var banner = document.createElement('div');
      banner.id = 'hub-offline-banner';
      banner.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);border-radius:10px;padding:8px 16px;font-size:10px;color:#f59e0b;z-index:9000;display:flex;align-items:center;gap:8px;font-family:DM Sans,sans-serif;';
      banner.innerHTML = '⚠️ Modo offline — los cambios se guardarán localmente'
        +'<button onclick="this.parentElement.remove()" style="background:none;border:none;color:#f59e0b;cursor:pointer;font-size:12px;padding:0 0 0 8px;">✕</button>';
      document.body.appendChild(banner);
    }, 600);
  }

  // Fade out splash overlay
  setTimeout(function(){
    const overlay = document.getElementById('hub-boot-overlay');
    if(overlay){
      overlay.style.transition = 'opacity 0.4s';
      overlay.style.opacity = '0';
      setTimeout(function(){ overlay.remove(); safePositionNodes(); }, 400);
    }
  }, online ? 400 : 1200); // offline: más tiempo para que el usuario lea el mensaje

  if(online){
    hubStartRealtimeListeners();
    setTimeout(_loadMapDataFromFirestore, 2000); // cargar datos del Mapa desde Firestore
  }

  // At midnight, refresh listeners for new day keys
  (function scheduleMidnightRefresh(){
    var now = new Date();
    var msToMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1) - now + 1000;
    setTimeout(function(){
      hubStartRealtimeListeners();
      scheduleMidnightRefresh();
    }, msToMidnight);
  })();
}

// ─── MOTOR DE AUDITORÍA ───────────────────────────────────────────────────────
// Escribe en Firestore colección 'cosmo-audit' — NUNCA se borra desde la UI
// También mantiene un buffer local para mostrar si Firebase no está disponible

const _AUDIT_LOCAL_KEY = 'cosmo_audit_buffer';
const _AUDIT_MAX_LOCAL = 500; // máximo en localStorage

function _auditLog(accion, modulo, detalle, valorAntes, valorDespues){
  var entry = {
    ts:      new Date().toISOString(),
    accion:  accion   || 'acción',
    modulo:  modulo   || 'desconocido',
    detalle: detalle  || '',
    antes:   valorAntes   !== undefined ? String(valorAntes).slice(0,200)   : undefined,
    despues: valorDespues !== undefined ? String(valorDespues).slice(0,200) : undefined,
  };
  // Remover undefined
  Object.keys(entry).forEach(function(k){ if(entry[k]===undefined) delete entry[k]; });

  // 1) Guardar en localStorage buffer (para offline y visualización rápida)
  try{
    var buf = JSON.parse(_origGetItem(_AUDIT_LOCAL_KEY)||'[]');
    buf.push(entry);
    if(buf.length > _AUDIT_MAX_LOCAL) buf = buf.slice(-_AUDIT_MAX_LOCAL);
    _origSetItem(_AUDIT_LOCAL_KEY, JSON.stringify(buf));
  } catch(e){}

  // 2) Enviar a Firestore colección 'cosmo-audit' (append-only, sin sobrescribir)
  if(_hubDb && _hubSetDoc && _hubDoc){
    var docId = entry.ts.replace(/[:.]/g,'-'); // ID único por timestamp
    setTimeout(async function(){
      try{
        await _hubSetDoc(_hubDoc(_hubDb, 'cosmo-audit', docId), entry);
      } catch(e){ console.warn('Audit Firestore error:', e); }
    }, 200);
  }
}

// ─── STARFIELD ───
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];
function initStars(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({length:180},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    r:Math.random()*1.2+0.2, o:Math.random()*0.6+0.1,
    s:Math.random()*0.003+0.001
  }));
}
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    s.o += s.s; if(s.o>0.8||s.o<0.1) s.s*=-1;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,210,255,${s.o})`; ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
initStars(); drawStars();
window.addEventListener('resize',()=>{ initStars(); });

// ─── LAYOUT ───

function getCosmos(){ return document.getElementById('cosmos'); }
function center(){
  const el = getCosmos();
  return { x: el.offsetWidth/2, y: el.offsetHeight/2 };
}

function positionNodes(){
  const cosmos = getCosmos();
  const W = cosmos.offsetWidth, H = cosmos.offsetHeight;
  if(!W || !H) return; // not painted yet, skip
  const {x,y} = center();

  // ── Órbitas elípticas adaptativas ──
  // Mínimos garantizados para que los nodos nunca se sobrepongan
  const nucleusR = 60; // radio del nucleus + margen
  const nodeSize = W < 480 ? 52 : W < 768 ? 62 : 80; // tamaño del nodo según pantalla
  const minInner = nucleusR + nodeSize;  // distancia mínima inner desde centro
  const minOuter = minInner + nodeSize + 10; // distancia mínima outer desde centro

  const aInner = Math.max(Math.min(W * 0.16, 150), minInner);
  const bInner = Math.max(Math.min(H * 0.28, 130), minInner);
  const aOuter = Math.max(Math.min(W * 0.30, 280), minOuter);
  const bOuter = Math.max(Math.min(H * 0.40, 170), minOuter);
  const R1 = (aInner + bInner) / 2;

  // Nucleus
  document.getElementById('nucleus').style.left = x+'px';
  document.getElementById('nucleus').style.top  = y+'px';

  // Rings — subtle guides (usamos el promedio como radio visual)
  const R2 = (aOuter + bOuter) / 2;
  ['orbit1','orbit2','orbit3'].forEach((id,i)=>{
    const R = [R1, R2, R2][i]*2;
    const el = document.getElementById(id);
    el.style.width  = R+'px'; el.style.height = R+'px';
    el.style.left   = x+'px'; el.style.top    = y+'px';
    if(id==='orbit3') el.style.opacity='0';
  });

  // Función para posicionar en órbita elíptica
  function ellipPos(a, b, angleDeg){
    const rad = angleDeg * Math.PI / 180;
    return { px: x + a * Math.cos(rad), py: y + b * Math.sin(rad) };
  }

  // Inner orbit — triángulo equilátero con leve rotación
  const orbit1Nodes = [
    {id:'sn-map',     angle: -80},
    {id:'sn-billing', angle:  40},
    {id:'sn-team',    angle: 160},
  ];

  // Outer orbit — 7 nodos distribuidos evitando extremos ±90°
  // Ángulos elegidos para maximizar separación y evitar bordes verticales
  const orbit2Nodes = [
    {id:'sn-prod',         angle:   0 },  // derecha
    {id:'sn-verificacion', angle:  55 },  // bajo-derecha
    {id:'sn-ruta',         angle: 108 },  // bajo-izquierda
    {id:'sn-pedidos',      angle: 155 },  // izquierda-abajo
    {id:'sn-content',      angle:-160 },  // izquierda-arriba
    {id:'sn-inversiones',  angle:-108 },  // arriba-izquierda
    {id:'sn-biblioteca',   angle: -52 },  // arriba-derecha
  ];

  const allNodes = [...orbit1Nodes.map(n=>({...n,orbit:1})), ...orbit2Nodes.map(n=>({...n,orbit:2}))];

  allNodes.forEach(({id, angle, orbit})=>{
    const a = orbit===1 ? aInner : aOuter;
    const b = orbit===1 ? bInner : bOuter;
    const {px, py} = ellipPos(a, b, angle);
    const el = document.getElementById(id);
    if(el){ el.style.left = px+'px'; el.style.top = py+'px'; }
  });

  // Posicionar el Observador — flotante en esquina superior izquierda del cosmos
  (function(){
    var obs = document.getElementById('observador');
    if(!obs) return;
    // Esquina superior izquierda, a ~15% del ancho y ~18% del alto
    obs.style.left = Math.round(W * 0.10) + 'px';
    obs.style.top  = Math.round(H * 0.14) + 'px';
  })();

  // SVG connections
  const svg = document.getElementById('connections');
  svg.setAttribute('width', W); svg.setAttribute('height', H);
  svg.innerHTML = '';
  allNodes.forEach(({id, angle, orbit})=>{
    const a = orbit===1 ? aInner : aOuter;
    const b = orbit===1 ? bInner : bOuter;
    const {px: nx, py: ny} = ellipPos(a, b, angle);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x); line.setAttribute('y1',y);
    line.setAttribute('x2',nx); line.setAttribute('y2',ny);
    line.setAttribute('stroke', orbit===1 ? 'rgba(124,58,237,0.18)' : 'rgba(100,100,180,0.1)');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('stroke-dasharray', orbit===1 ? '4 6' : '3 7');
    svg.appendChild(line);
  });
}
// Defer until layout is fully painted (igual que v15)
function safePositionNodes(){
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      var cosmos = document.getElementById('cosmos');
      if(!cosmos || !cosmos.offsetWidth || !cosmos.offsetHeight){
        // Boot overlay still showing — retry after it's gone
        setTimeout(safePositionNodes, 200);
        return;
      }
      positionNodes();
    }, 60);
  });
}

window.addEventListener('resize', safePositionNodes);

      (cdata.distributors||[]).forEach(function(d){

          var faltan = 180 - Math.floor((hoy - new Date(d.dist_espera_inicio)) / 86400000);
          if(faltan <= 30) count++;
        }
      });
    });

function updateNucleusBadge(){
  var badge = document.getElementById('nucleus-mission-badge'); if(!badge) return;
  var count = 0;
  // Misiones: tareas vencidas o próximas 3 días
  var missions = JSON.parse(localStorage.getItem('cosmo_missions')||'[]');
  var hoy0 = new Date(); hoy0.setHours(0,0,0,0);
  missions.forEach(function(m){
    if(m.status==='done'||m.status==='blocked') return;
    (m.tasks||[]).forEach(function(t){
      if(t.done||!t.due) return;
      if(Math.round((new Date(t.due+'T00:00:00')-hoy0)/86400000) <= 3) count++;
    });
  });
  // Ingresos bajo meta
  var ingresos = JSON.parse(localStorage.getItem('cg_ingresos')||'[]');
  var mesActual = new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0');
  var ingMes = ingresos.filter(function(i){return i.mes===mesActual;}).reduce(function(s,i){return s+(parseFloat(i.monto)||0);},0);
  var meta = parseFloat(localStorage.getItem('cosmo_meta_mensual')||'3000000');
  if(ingMes/meta < 0.6) count++;
  // Insumos críticos (≤7 días)
  var prodMeta = JSON.parse(localStorage.getItem('cosmo_prod_meta')||'{}');
  ['impresion','corte','resinado','empaque'].forEach(function(ek){
    ((prodMeta[ek]||{}).insumos||[]).forEach(function(ins){
      var dias=(ins.consumo||0)>0?Math.floor((ins.stock||0)/ins.consumo):null;
      if(dias!==null && dias<=7) count++;
    });
  });
  // Mantenimiento vencido
  var per = JSON.parse(localStorage.getItem('cosmo_verif_mant')||'[]');
  per.forEach(function(p){
    if(!p.ultimaVez){ count++; return; }
    if(Math.floor((new Date()-new Date(p.ultimaVez))/86400000) >= p.dias*2) count++;
  });
  // Contenido urgente
  var ideas = JSON.parse(localStorage.getItem('cosmo_ideas_pool')||'[]');
  var hoyMs = new Date(); hoyMs.setHours(0,0,0,0);
  ideas.forEach(function(idea){
    if(idea.fecha && !idea.link){
      var diff = Math.round((new Date(idea.fecha+'T00:00:00')-hoyMs)/86400000);
      if(diff >= 0 && diff <= 1) count++;
    }
  });
  // Distribuidores del Mapa próximos o listos
  try {
    var mapData3 = window._mapDataCache || JSON.parse(localStorage.getItem('cosmo_map_v5')||'null');
    if(mapData3){
      var hoyMap3 = new Date(); hoyMap3.setHours(0,0,0,0);
      Object.values(mapData3).forEach(function(cdata){
        (cdata.distributors||[]).forEach(function(d){
          if(d.dist_pipeline==='en_espera' && d.dist_espera_inicio){
            var faltan = 180 - Math.floor((hoyMap3-new Date(d.dist_espera_inicio))/86400000);
            if(faltan<=30) count++;
          }
        });
      });
    }
  } catch(e){}
  if(count > 0){ badge.style.display='flex'; badge.textContent=count; }
  else badge.style.display='none';
}

  window._rutaToggleEtapas=function(idx){
    if(expandedIdx===idx){ expandedIdx=null; }
    else { expandedIdx=idx; editingIdx=null; }
    render();
    if(expandedIdx!==null){
      var p=document.getElementById('ruta-etapas-panel');
      if(p) setTimeout(function(){ p.scrollIntoView({behavior:'smooth',block:'nearest'}); },50);
    }
  };

  window._etapaAdd=function(idx){
    var inp=document.getElementById('nueva-etapa-txt');
    if(!inp) return;
    var txt=inp.value.trim(); if(!txt) return;
    if(!metas[idx].etapas) metas[idx].etapas=[];
    metas[idx].etapas.push({
      eid:'eta_'+Date.now(),
      titulo:txt,
      estado:'Por iniciar'
    });
    save(); render();
    // Re-focus input
    setTimeout(function(){
      var ni=document.getElementById('nueva-etapa-txt');
      if(ni) ni.focus();
    },50);
  };

  window._etapaNextEstado=function(mi,ei){
    var eta=metas[mi].etapas[ei];
    var prev=eta.estado;
    var i=ESTADOS.indexOf(eta.estado);
    eta.estado=ESTADOS[(i+1)%ESTADOS.length];

    // If transitioning TO "En progreso" or "Completado" → push to missions
    if((eta.estado==='En progreso'||eta.estado==='Completado')&&
       (prev==='Por iniciar'||prev==='Pausado')){
      pushEtapaToMissions(metas[mi], eta);
    }
    // If going back to Por iniciar → remove empty mission
    if(eta.estado==='Por iniciar'){
      removeEtapaFromMissions(eta.eid);
    }

    save(); render();
  };

  window._etapaEditTitulo=function(mi,ei,val){
    val=val.trim();
    if(!val) return;
    metas[mi].etapas[ei].titulo=val;
    save();
    var ms=getMissions();
    var m=ms.find(function(mx){ return mx.fromEtapa===metas[mi].etapas[ei].eid; });
    if(m){ m.title=metas[mi].icon+' '+val; saveMissions(ms); }
  };

  window._etapaDel=function(mi,ei){
    var eta=metas[mi].etapas[ei];
    removeEtapaFromMissions(eta.eid);
    metas[mi].etapas.splice(ei,1);
    save(); render();
  };

  // ── Edit handlers ──
  window._rutaEditCard=function(idx){
    editingIdx=(editingIdx===idx)?null:idx;
    if(editingIdx!==null) expandedIdx=null;
    render();
    if(editingIdx!==null){
      var p=document.getElementById('ruta-edit-panel');
      if(p) setTimeout(function(){ p.scrollIntoView({behavior:'smooth',block:'nearest'}); },50);
    }
  };
  window._rutaCerrarEdit=function(){ editingIdx=null; render(); };
  window._rutaCerrarEtapas=function(){ expandedIdx=null; render(); };

  window._rutaSetPrio=function(p){
    if(editingIdx===null) return;
    metas[editingIdx].prioridad=p; render();
  };
  window._rutaSetEstadoEdit=function(e){
    if(editingIdx===null) return;
    metas[editingIdx].estado=e; render();
  };
  window._rutaToggleDep=function(oid){
    if(editingIdx===null) return;
    var req=metas[editingIdx].requiere||[];
    var i=req.indexOf(oid);
    if(i===-1) req.push(oid); else req.splice(i,1);
    metas[editingIdx].requiere=req; render();
  };
  window._rutaGuardarEdit=function(){
    if(editingIdx===null) return;
    var m=metas[editingIdx];
    var ti=document.getElementById('re-icon'); if(ti) m.icon=ti.value.trim()||m.icon;
    var tt=document.getElementById('re-titulo'); if(tt) m.titulo=tt.value.trim()||m.titulo;
    var td=document.getElementById('re-desc'); if(td) m.desc=td.value.trim()||m.desc;
    save(); editingIdx=null; render();
  };

  window._rutaNextEstado=function(idx){
    var m=metas[idx];
    var i=ESTADOS.indexOf(m.estado);
    m.estado=ESTADOS[(i+1)%ESTADOS.length];
    save(); render();
  };

  window._rutaDragStart=function(e,idx){
    if(editingIdx!==null||expandedIdx!==null) return;
    dragSrc=idx; e.dataTransfer.effectAllowed='move';
    e.currentTarget.style.opacity='0.3';
  };
  window._rutaDragOver=function(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; };
  window._rutaDrop=function(e,idx){
    e.preventDefault();
    if(dragSrc===null||dragSrc===idx) return;
    var tmp=metas[dragSrc]; metas.splice(dragSrc,1); metas.splice(idx,0,tmp);
    dragSrc=null; save(); render();
  };
  window._rutaDragEnd=function(){ dragSrc=null; render(); };
  window._rutaRender=render;

  render();
}

// ── Limpieza de claves huérfanas de producción (>60 días) ──
setTimeout(function(){
  try{
    var cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 60);
    var toDelete = [];
    for(var i = 0; i < localStorage.length; i++){
      var k = localStorage.key(i);
      if(k && /^cosmo_prod_\d{4}-\d{2}-\d{2}$/.test(k)){
        var dateStr = k.replace('cosmo_prod_','');
        if(new Date(dateStr) < cutoff) toDelete.push(k);
      }
    }
    toDelete.forEach(function(k){
      localStorage.removeItem(k);
      localStorage.removeItem('__ts_'+k);
    });
    if(toDelete.length) console.log('[COSMO] Limpieza: '+toDelete.length+' claves de producción antiguas eliminadas.');
  } catch(e){}
}, 3000);

  function getAxes(m){
    const primaryRole = (m.roleTags||[])[0]||'';
    return AREAS_BY_ROLE[primaryRole] || AREAS_DEFAULT;
  }

  const AREAS = ['Ejecución','Inteligencia','Creatividad','Comunicación','Técnica','Liderazgo'];
  const AREA_ICONS = ['⚡','🧠','🎨','💬','🔧','🔥'];
  const AREA_COLORS = ['#06b6d4','#a855f7','#f472b6','#22c55e','#f97316','#f59e0b'];

  function buildRadar(stats, mi){
    const size = 140, cx = size/2, cy = size/2, r = 48;
    const axes = getAxes(members[mi]||{});
    const AICONS = axes.icons;
    const ACOLORS = axes.colors;
    const n = axes.areas.length;
    // Hexagon points at each angle
    function pt(i, val){
      const angle = (Math.PI*2/n)*i - Math.PI/2;
      const rv = r * (val/100);
      return [cx + rv*Math.cos(angle), cy + rv*Math.sin(angle)];
    }
    function ptOuter(i){
      const angle = (Math.PI*2/n)*i - Math.PI/2;
      return [cx + r*Math.cos(angle), cy + r*Math.sin(angle)];
    }
    // Background hex rings
    let bgHexes = '';
    [0.25,0.5,0.75,1].forEach(function(scale){
      const pts = AREAS.map(function(_,i){
        const angle = (Math.PI*2/n)*i - Math.PI/2;
        return (cx+r*scale*Math.cos(angle))+','+(cy+r*scale*Math.sin(angle));
      }).join(' ');
      bgHexes += '<polygon points="'+pts+'" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>';
    });
    // Axis lines
    let axisLines = '';
    axes.areas.forEach(function(_,i){
      const op = ptOuter(i);
      axisLines += '<line x1="'+cx+'" y1="'+cy+'" x2="'+op[0]+'" y2="'+op[1]+'" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>';
    });
    // Stat polygon
    const statPts = stats.map(function(v,i){ const p=pt(i,v); return p[0]+','+p[1]; }).join(' ');
    const avgStat = stats.reduce(function(a,b){return a+b;},0)/stats.length;
    const fillAlpha = 0.15 + (avgStat/100)*0.25;
    const statPoly = '<polygon points="'+statPts+'" fill="rgba(124,58,237,'+fillAlpha.toFixed(2)+')" stroke="'+ACOLORS[0]+'" stroke-width="1.5"/>';
    // Dots
    let dots = '';
    stats.forEach(function(v,i){
      const p = pt(i,v);
      dots += '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2.5" fill="'+ACOLORS[i]+'"/>';
    });
    // Labels
    let labels = '';
    axes.areas.forEach(function(name,i){
      const op = ptOuter(i);
      const angle = (Math.PI*2/n)*i - Math.PI/2;
      const lx = cx + (r+16)*Math.cos(angle);
      const ly = cy + (r+16)*Math.sin(angle);
      labels += '<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" fill="'+ACOLORS[i]+'" font-size="6" font-weight="600" font-family="DM Sans,sans-serif">'+AICONS[i]+'</text>';
    });
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+bgHexes+axisLines+statPoly+dots+labels+'</svg>';
  }

var _prodActiveTab='hoy';
var _alertRango={modo:'mes', mes:new Date().toISOString().slice(0,7)};
function initProd(){
  // ── Subir a Firebase datos locales que nunca se sincronizaron ──
  // Resuelve el caso de registros hechos antes de que las reglas de Firestore estuvieran abiertas
  (function _pushLocalDataToFirebase(){
    if(!window._hubDb) return;
    setTimeout(function(){
      // Días de producción
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i);
        if(k && /^cosmo_prod_\d{4}-\d{2}-\d{2}$/.test(k)){
          var localTs=parseInt((_origGetItem||localStorage.getItem.bind(localStorage))('__ts_'+k)||'0');
          if(localTs===0){ // nunca subido
            var val=localStorage.getItem(k);
            if(val) try{ var d=JSON.parse(val); if(d&&d._saved) hubFbSave(k,val); } catch(e){}
          }
        }
      }
      // Pedidos Shopify
      var shopTs=parseInt((_origGetItem||localStorage.getItem.bind(localStorage))('__ts_cosmo_shopify_pedidos')||'0');
      if(shopTs===0){
        var shopVal=localStorage.getItem('cosmo_shopify_pedidos');
        if(shopVal && shopVal!=='[]') hubFbSave('cosmo_shopify_pedidos', shopVal);
      }
    }, 3000);
  })();
  function todayStr(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
  var today=todayStr();
  function loadDay(ds){return JSON.parse(localStorage.getItem('cosmo_prod_'+ds)||'null');}
  function saveDay(ds,d){localStorage.setItem('cosmo_prod_'+ds,JSON.stringify(d));}
  function getAllDays(){
    var keys=[],days=[];
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      // Solo keys con formato exacto cosmo_prod_YYYY-MM-DD
      if(k && /^cosmo_prod_\d{4}-\d{2}-\d{2}$/.test(k)) keys.push(k);
    }
    keys.sort();
    keys.forEach(function(k){
      var d=JSON.parse(localStorage.getItem(k)||'null');
      if(d&&d._saved) days.push(d);
    });
    return days;
  }

  // Al inicializar producción, subir a Firebase todos los días locales que aún no estén ahí
  // Esto resuelve el caso de días registrados antes de que las reglas de Firestore estuvieran abiertas
  (function syncLocalDaysToFirebase(){
    if(!window._hubDb) return;
    setTimeout(function(){
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i);
        if(k && /^cosmo_prod_\d{4}-\d{2}-\d{2}$/.test(k)){
          var val=localStorage.getItem(k);
          if(!val) continue;
          try{ var d=JSON.parse(val); if(!d||!d._saved) continue; } catch(e){ continue; }
          // Solo subir si no tiene timestamp local (nunca se subió antes)
          var localTs=parseInt((window._origGetItem||localStorage.getItem.bind(localStorage))('__ts_'+k)||'0');
          if(localTs===0){
            hubFbSave(k, val);
          }
        }
      }
    }, 2000); // esperar 2s a que Firebase esté listo
  })();
  var data=loadDay(today)||{date:today,impresion:0,corte:0,resinado:0,empaque:0,despachos:[],_saved:false};
  // Expose for real-time sync
  window._prodActiveData   = data;
  window._prodActiveToday  = today;
  window._prodActiveRefresh = function(){
    var fresh = loadDay(today);
    if(!fresh) return;
    Object.keys(fresh).forEach(function(k){ data[k] = fresh[k]; });

    var ETAPAS_KEYS = ['impresion','corte','resinado','empaque'];
    ETAPAS_KEYS.forEach(function(k){
      var inp = document.querySelector('input[data-key="'+k+'"]');
      if(inp && document.activeElement !== inp) inp.value = data[k]||0;
    });
  };

  var ETAPAS=[
    {key:'impresion',icon:'🖨️',label:'Impresión',color:'#06b6d4'},
    {key:'corte',    icon:'✂️', label:'Corte',    color:'#a855f7'},
    {key:'resinado', icon:'🧪', label:'Resinado', color:'#f472b6'},
    {key:'empaque',  icon:'📦', label:'Empaque',  color:'#f97316'}
  ];

  var _tab='hoy';

  function totalP(){return data.despachos.length;}
  function totalPl(){return data.despachos.reduce(function(s,d){return s+(parseInt(d.plantillas)||0);},0);}

  function updateNums(){
    ETAPAS.forEach(function(e){var el=document.getElementById('ps-'+e.key);if(el)el.textContent=data[e.key]||0;});
    ['pa','pb'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=totalP();});
    ['pla','plb'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=totalPl();});
    // Update meta bar in real time
    var META=(function(){ try{ var pm=JSON.parse(localStorage.getItem('cosmo_prod_meta')||'{}'); return parseInt(pm._metaDiaria)||100; } catch(e){ return 100; } })();
    var mejor=Math.max(data.impresion||0,data.corte||0,data.resinado||0,data.empaque||0);
    var pct=Math.min(100,Math.round((mejor/META)*100));
    var col=pct>=100?'#22c55e':pct>=70?'#f59e0b':'#ef4444';

  // ── CHART (pure canvas, no libs) ──
  function drawChart(days){
    var canvas=document.getElementById('prod-chart');
    if(!canvas)return;
    var W=canvas.width=canvas.offsetWidth||560, H=canvas.height=180;
    var ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,W,H);
    if(!days.length){
      ctx.fillStyle='#334155';ctx.font='12px sans-serif';ctx.textAlign='center';
      ctx.fillText('Sin datos guardados aún',W/2,H/2);return;
    }
    // total plantillas per day = max of etapas (tendencia general)
    var vals=days.map(function(d){return Math.max(d.impresion||0,d.corte||0,d.resinado||0,d.empaque||0);});
    var maxV=Math.max.apply(null,vals)||1;
    var pad={l:36,r:16,t:16,b:36};
    var gW=W-pad.l-pad.r, gH=H-pad.t-pad.b;
    var step=gW/(days.length>1?days.length-1:1);

    // Grid lines
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
    for(var g=0;g<=4;g++){
      var gy=pad.t+gH*(1-g/4);
      ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();
      ctx.fillStyle='#334155';ctx.font='9px Space Mono,monospace';ctx.textAlign='right';
      ctx.fillText(Math.round(maxV*g/4),pad.l-4,gy+3);
    }

    // Area fill
    ctx.beginPath();
    ctx.moveTo(pad.l, pad.t+gH);
    days.forEach(function(d,i){
      var x=pad.l+i*step;
      var y=pad.t+gH*(1-vals[i]/maxV);
      if(i===0) ctx.lineTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.lineTo(pad.l+(days.length-1)*step, pad.t+gH);
    ctx.closePath();
    var grad=ctx.createLinearGradient(0,pad.t,0,pad.t+gH);
    grad.addColorStop(0,'rgba(124,58,237,0.25)');
    grad.addColorStop(1,'rgba(124,58,237,0.02)');
    ctx.fillStyle=grad;ctx.fill();

    // Line
    ctx.beginPath();ctx.strokeStyle='#a855f7';ctx.lineWidth=2;ctx.lineJoin='round';
    days.forEach(function(d,i){
      var x=pad.l+i*step, y=pad.t+gH*(1-vals[i]/maxV);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();

    // Dots + labels
    days.forEach(function(d,i){
      var x=pad.l+i*step, y=pad.t+gH*(1-vals[i]/maxV);
      ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fillStyle='#a855f7';ctx.fill();
      ctx.strokeStyle='#0c1220';ctx.lineWidth=2;ctx.stroke();
      // date label
      ctx.fillStyle='#475569';ctx.font='8px monospace';ctx.textAlign='center';
      var label=d.date.slice(5); // MM-DD
      ctx.fillText(label,x,H-pad.b+14);
      // value above dot
      ctx.fillStyle='#e2e8f0';ctx.font='9px Space Mono,monospace';
      ctx.fillText(vals[i],x,y-8);
    });
  }

  function _renderCostosPane(){
    var gastos  = JSON.parse(localStorage.getItem('cg_gastos')||'[]');
    var ingresos= JSON.parse(localStorage.getItem('cg_ingresos')||'[]');

    // ── Días guardados ──
    var keys=[], days=[];
    for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&/^cosmo_prod_\d{4}-\d{2}-\d{2}$/.test(k))keys.push(k);}
    keys.sort();
    keys.forEach(function(k){ var d=JSON.parse(localStorage.getItem(k)||'null'); if(d&&d._saved) days.push(d); });

    // ── Mes activo ──
    var now=new Date();
    var mesActivo=localStorage.getItem('cosmo_costos_mes')||(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'));
    var mesesSet={};
    days.forEach(function(d){ if(d.date) mesesSet[d.date.slice(0,7)]=true; });
    gastos.forEach(function(g){ if(g.fecha) mesesSet[g.fecha.slice(0,7)]=true; });
    ingresos.forEach(function(g){ if(g.fecha) mesesSet[g.fecha.slice(0,7)]=true; });
    var meses=Object.keys(mesesSet).sort().reverse();
    if(!meses.length) meses=[mesActivo];
    if(meses.indexOf(mesActivo)===-1) mesActivo=meses[0];

    var daysMes=days.filter(function(d){ return d.date&&d.date.slice(0,7)===mesActivo; });
    var totalPlantillas=daysMes.reduce(function(s,d){ return s+Math.max(d.impresion||0,d.corte||0,d.resinado||0,d.empaque||0); },0);

    // ── Ingresos ──
    var ingresosMes=ingresos.filter(function(g){ return g.fecha&&g.fecha.slice(0,7)===mesActivo; });
    var totalIngresos=ingresosMes.reduce(function(s,g){ return s+(parseFloat(g.monto)||0); },0);

    // ── COGS: solo insumos de producción directa ──
    var gastosInsumoMes=gastos.filter(function(g){ return g.tipo==='insumo'&&g.fecha&&g.fecha.slice(0,7)===mesActivo; });

// ─── CONTENT INIT ───
// ─── ALERT ENGINE ───
function computeAlertas(rango){
  var alerts = [];
  var MN = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  function mesLabel(m){ if(!m) return m; var p=m.split('-'); return MN[parseInt(p[1])-1]+' '+p[0]; }
  function fmtCOP(n){ return '$'+Math.round(n).toLocaleString('es-CO'); }

  var r = rango || {modo:'mes', mes:new Date().toISOString().slice(0,7)};
  var mesCur = r.modo==='mes' ? (r.mes||new Date().toISOString().slice(0,7)) : new Date().toISOString().slice(0,7);
  var _gastos   = (window._cgGastos)  || JSON.parse(localStorage.getItem('cg_gastos')  ||'[]');
  var _ingresos = (window._cgIngresos)|| JSON.parse(localStorage.getItem('cg_ingresos')||'[]').filter(function(i){return !!i.mes;});

  // Filter by range
  if(r.modo==='rango' && r.desde && r.hasta){
    _ingresos = _ingresos.filter(function(i){ return i.mes>=r.desde && i.mes<=r.hasta; });
    _gastos   = _gastos.filter(function(g){ return g.fecha && g.fecha.slice(0,7)>=r.desde && g.fecha.slice(0,7)<=r.hasta; });
    mesCur = r.hasta; // use last month as reference for current month alerts
  } else if(r.modo==='mes' && r.mes){
    _ingresos = _ingresos.filter(function(i){ return i.mes===r.mes; });
    _gastos   = _gastos.filter(function(g){ return g.fecha && g.fecha.slice(0,7)===r.mes; });
  }

  var gastosByMes = {};
  _gastos.forEach(function(g){ if(!g.fecha) return; var m=g.fecha.slice(0,7); gastosByMes[m]=(gastosByMes[m]||0)+(parseFloat(g.monto)||0); });
  var sorted = _ingresos.slice().sort(function(a,b){ return a.mes>b.mes?1:-1; });

  var ingCur = _ingresos.filter(function(i){return i.mes===mesCur;}).reduce(function(s,i){return s+(parseFloat(i.monto)||0);},0);
  var gasCur = gastosByMes[mesCur]||0;
  var excCur = ingCur - gasCur;
  var pct = ingCur>0 ? (gasCur/ingCur*100) : 0;

  // ── ALERTAS NEGATIVAS ──

  // 1. Gastos vs ingresos este mes
  if(ingCur>0 && pct >= 70){
    alerts.push({nivel:'rojo', icon:'🔴',
      msg:'Gastos de '+mesLabel(mesCur)+' en '+pct.toFixed(0)+'% de ingresos ('+fmtCOP(gasCur)+' de '+fmtCOP(ingCur)+') — excedente crítico '+fmtCOP(excCur)});
  } else if(ingCur>0 && pct >= 50){
    alerts.push({nivel:'amarillo', icon:'🟡',
      msg:'Gastos de '+mesLabel(mesCur)+' en '+pct.toFixed(0)+'% de ingresos ('+fmtCOP(gasCur)+' de '+fmtCOP(ingCur)+') — excedente '+fmtCOP(excCur)});
  }

  // 2. Tendencia excedente con meses específicos
  if(sorted.length >= 2){
    var last2 = sorted.slice(-2);
    var exc0 = last2[0].monto - (gastosByMes[last2[0].mes]||0);
    var exc1 = last2[1].monto - (gastosByMes[last2[1].mes]||0);
    var diff = exc1 - exc0;
    if(sorted.length >= 3){
      var last3 = sorted.slice(-3);
      var excA = last3[0].monto-(gastosByMes[last3[0].mes]||0);
      var excB = last3[1].monto-(gastosByMes[last3[1].mes]||0);
      var excC = last3[2].monto-(gastosByMes[last3[2].mes]||0);
      if(excC < excB && excB < excA){
        alerts.push({nivel:'amarillo', icon:'📉',
          msg:'Excedente bajando 3 meses: '+mesLabel(last3[0].mes)+' '+fmtCOP(excA)+' → '+mesLabel(last3[1].mes)+' '+fmtCOP(excB)+' → '+mesLabel(last3[2].mes)+' '+fmtCOP(excC)});
      } else if(exc1 < exc0){
        alerts.push({nivel:'amarillo', icon:'📉',
          msg:'Excedente de '+mesLabel(last2[1].mes)+' ('+fmtCOP(exc1)+') bajó vs '+mesLabel(last2[0].mes)+' ('+fmtCOP(exc0)+') — diferencia '+fmtCOP(diff)});
      }
    } else if(exc1 < exc0){
      alerts.push({nivel:'amarillo', icon:'📉',
        msg:'Excedente de '+mesLabel(last2[1].mes)+' ('+fmtCOP(exc1)+') bajó vs '+mesLabel(last2[0].mes)+' ('+fmtCOP(exc0)+') — diferencia '+fmtCOP(diff)});
    }
  }

  // 3. Gasto individual > 20% del ingreso del mes
  if(ingCur>0){
    var umbral = ingCur*0.20;
    _gastos.filter(function(g){ return g.fecha&&g.fecha.slice(0,7)===mesCur; })
      .forEach(function(g){
        if((parseFloat(g.monto)||0) >= umbral){
          alerts.push({nivel:'amarillo', icon:'💸',
            msg:'Gasto alto en '+mesLabel(mesCur)+': "'+g.nombre+'" es '+((g.monto/ingCur)*100).toFixed(0)+'% del ingreso ('+fmtCOP(g.monto)+' de '+fmtCOP(ingCur)+')'});
        }
      });
  }

  // ── ALERTAS POSITIVAS ──

  // 4. Mejor excedente del historial
  if(sorted.length >= 2){
    var excedentes = sorted.map(function(i){ return {mes:i.mes, exc:i.monto-(gastosByMes[i.mes]||0)}; });
    var mejor = excedentes.slice().sort(function(a,b){return b.exc-a.exc;})[0];
    var penultimo = sorted[sorted.length-2];
    var excPen = penultimo.monto-(gastosByMes[penultimo.mes]||0);
    // Mejor mes del historial (excluyendo el actual si no tiene datos completos)
    if(mejor.mes !== mesCur && mejor.exc > 0){
      // Only show if current month just beat it or is close
      if(excCur > mejor.exc){
        alerts.push({nivel:'verde', icon:'🏆',
          msg:'¡Mejor excedente registrado! '+mesLabel(mesCur)+' con '+fmtCOP(excCur)+' supera el récord anterior de '+mesLabel(mejor.mes)+' ('+fmtCOP(mejor.exc)+')'});
      }
    }
    // 5. Excedente subió respecto al mes anterior
    var lastSorted = sorted.slice(-2);
    if(lastSorted.length===2){
      var eA = lastSorted[0].monto-(gastosByMes[lastSorted[0].mes]||0);
      var eB = lastSorted[1].monto-(gastosByMes[lastSorted[1].mes]||0);
      if(eB > eA && eB > 0){
        var mejora = eB - eA;
        alerts.push({nivel:'verde', icon:'📈',
          msg:'Excedente de '+mesLabel(lastSorted[1].mes)+' ('+fmtCOP(eB)+') subió '+fmtCOP(mejora)+' vs '+mesLabel(lastSorted[0].mes)+' ('+fmtCOP(eA)+')'});
      }
    }
  }

  // 6. Margen neto >= 40% este mes
  if(ingCur>0 && pct <= 60 && excCur > 0){
    var margen = 100 - pct;
    if(margen >= 40){
      alerts.push({nivel:'verde', icon:'💚',
        msg:'Margen neto de '+mesLabel(mesCur)+' en '+margen.toFixed(0)+'% — '+fmtCOP(excCur)+' excedente sobre '+fmtCOP(ingCur)+' ingresos'});
    }
  }

  return alerts;
}

  window._cgGastos  = loadG('gastos',[]);

    var mes = new Date().toISOString().slice(0,7);

                 .reduce(function(s,g){return s+(parseFloat(g.monto)||0);},0);

  // ══ PANE: RENTABILIDAD ══
  var _rentMes = null; // null = mes actual
  function renderRentPane(){
    var el=document.getElementById('gp-rentabilidad'); if(!el) return;
    var MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    function ml(m){ if(!m) return m; var p=m.split('-'); return MN[parseInt(p[1])-1]+' '+p[0]; }

    // Collect months with data
    var mesesSet={};
    ingresos.forEach(function(i){ if(i.mes) mesesSet[i.mes]=1; });
    gastos.forEach(function(g){ if(g.fecha) mesesSet[g.fecha.slice(0,7)]=1; });
    var mesesList=Object.keys(mesesSet).sort().reverse();
    var mesCur=_rentMes || new Date().toISOString().slice(0,7);

    var gastosByMes={};
    gastos.forEach(function(g){ if(!g.fecha) return; var m=g.fecha.slice(0,7); gastosByMes[m]=(gastosByMes[m]||0)+(parseFloat(g.monto)||0); });

    var mesTotal=gastosByMes[mesCur]||0;
    var ingresoEst=ingresos.filter(function(i){return i.mes===mesCur;}).reduce(function(s,i){return s+(parseFloat(i.monto)||0);},0);
    var utilidad=ingresoEst-mesTotal;
    var margenOp=ingresoEst>0?(utilidad/ingresoEst*100):0;
    var margenCol=margenOp>=30?'#22c55e':margenOp>=10?'#f59e0b':'#ef4444';

    var html='';

    // ── Selector de mes ──
    html+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;">';
    var nowMes=new Date().toISOString().slice(0,7);
    var nowActive=!_rentMes||_rentMes===nowMes;
    html+='<button onclick="window._rentMesFiltro(null)" style="padding:3px 10px;border-radius:6px;font-size:8px;cursor:pointer;font-weight:'+(nowActive?'700':'400')+';border:1px solid '+(nowActive?'#f59e0b':'rgba(255,255,255,0.1)')+';background:'+(nowActive?'rgba(245,158,11,0.15)':'transparent')+';color:'+(nowActive?'#f59e0b':'#475569')+';">Hoy</button>';
    mesesList.forEach(function(m){
      if(m===nowMes) return;
      var act=_rentMes===m;
      html+='<button data-rm="'+m+'" onclick="window._rentMesFiltro(this.dataset.rm)" style="padding:3px 10px;border-radius:6px;font-size:8px;cursor:pointer;font-weight:'+(act?'700':'400')+';border:1px solid '+(act?'#a855f7':'rgba(255,255,255,0.1)')+';background:'+(act?'rgba(124,58,237,0.15)':'transparent')+';color:'+(act?'#a855f7':'#475569')+';">'+ml(m)+'</button>';
    });
    html+='</div>';

    // ── Alertas ──
    var alertas=computeAlertas({modo:'mes',mes:mesCur});
    if(alertas.length){
      var hasRojo=alertas.some(function(a){return a.nivel==='rojo';});
      var hasAma=alertas.some(function(a){return a.nivel==='amarillo';});
      var colBorder=hasRojo?'rgba(239,68,68,0.3)':hasAma?'rgba(245,158,11,0.3)':'rgba(34,197,94,0.3)';
      var colBg=hasRojo?'rgba(239,68,68,0.06)':hasAma?'rgba(245,158,11,0.06)':'rgba(34,197,94,0.06)';
      html+='<div style="background:'+colBg+';border:1px solid '+colBorder+';border-radius:10px;padding:10px 12px;margin-bottom:14px;">';
      html+='<div style="font-size:8px;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin-bottom:8px;">⚡ Alertas — '+ml(mesCur)+'</div>';
      alertas.forEach(function(a){
        var ac=a.nivel==='rojo'?'#ef4444':a.nivel==='amarillo'?'#f59e0b':'#22c55e';
        html+='<div style="display:flex;align-items:flex-start;gap:7px;margin-bottom:6px;">';
        html+='<span style="font-size:12px;flex-shrink:0;">'+a.icon+'</span>';
        html+='<span style="font-size:10px;color:'+ac+';line-height:1.4;">'+a.msg+'</span>';
        html+='</div>';
      });
      html+='</div>';
    }

    // ── Filtros por tipo ──
    var TIPOS_DEF=[['all','Todos','#94a3b8'],['insumo','📦 Insumo','#06b6d4'],['variable','🔄 Variable','#a855f7'],['fijo','🏢 Fijo','#f97316'],['otro','📌 Otro','#64748b'],['inversión','🚀 Inversión','#fbbf24']];
    html+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;">';
    TIPOS_DEF.forEach(function(t){
      var isAct=_rentTipoFilter===t[0];
      var bStyle='padding:3px 9px;border-radius:6px;font-size:9px;cursor:pointer;font-weight:'+(isAct?'700':'400')+';border:1px solid '+(isAct?t[2]:t[2]+'44')+';background:'+(isAct?t[2]+'22':'transparent')+';color:'+(isAct?t[2]:'#475569')+';transition:all 0.15s;';
      html+='<button class="rent-tipo-btn" data-tipo="'+t[0]+'" onclick="window._rentTipoFiltro(this.dataset.tipo,this)" style="'+bStyle+'">'+t[1]+'</button>';
    });
    html+='</div>';

    // ── Filtros por tag ──
    var allTags={};
    var gastosDelMesCur=gastos.filter(function(g){return g.fecha&&g.fecha.slice(0,7)===mesCur;});
    gastosDelMesCur.forEach(function(g){ (g.tags||[]).forEach(function(t){ allTags[t]=(allTags[t]||0)+1; }); });
    var tagKeys=Object.keys(allTags).sort();
    if(tagKeys.length){
      html+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;align-items:center;">';
      html+='<span style="font-size:8px;color:#334155;text-transform:uppercase;letter-spacing:1px;">Tags:</span>';
      tagKeys.forEach(function(tag){
        var isAct=_rentTagFilter===tag;
        var tAct=isAct?'1px solid #a855f7':'1px solid rgba(255,255,255,0.1)';
        var tBg=isAct?'rgba(168,85,247,0.15)':'transparent';
        var tCol=isAct?'#a855f7':'#475569';
        html+='<button data-tag="'+tag+'" onclick="window._rentTagFiltro(this.dataset.tag)" style="padding:2px 8px;border-radius:10px;font-size:9px;cursor:pointer;border:'+tAct+';background:'+tBg+';color:'+tCol+';">'+tag+' <span style="opacity:0.5;">('+allTags[tag]+')</span></button>';
      });
      html+='</div>';
    }

    // Apply tag filter to totals
    var gastosFiltered=_rentTipoFilter==='all'?gastosDelMesCur:gastosDelMesCur.filter(function(g){return (g.tipo||'otro')===_rentTipoFilter;});
    if(_rentTagFilter) gastosFiltered=gastosFiltered.filter(function(g){return (g.tags||[]).includes(_rentTagFilter);});
    var mesTotalFiltered=gastosFiltered.reduce(function(s,g){return s+(parseFloat(g.monto)||0);},0);

    // ── Cards cuantitativas ──
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">';
    var displayGastos=(_rentTipoFilter!=='all'||_rentTagFilter)?mesTotalFiltered:mesTotal;
    var displayUtil=ingresoEst-displayGastos;
    var displayMargen=ingresoEst>0?(displayUtil/ingresoEst*100):0;
    var displayMargenCol=displayMargen>=30?'#22c55e':displayMargen>=10?'#f59e0b':'#ef4444';
    [['💰 Ingresos',ingresoEst,'#22c55e'],['💸 Gastos',displayGastos,'#ef4444'],
     ['📈 Excedente',displayUtil,displayUtil>=0?'#22c55e':'#ef4444'],['📊 Margen',displayMargen.toFixed(1)+'%',displayMargenCol]
    ].forEach(function(r){
      html+='<div style="background:'+r[2]+'0d;border:1px solid '+r[2]+'22;border-radius:10px;padding:12px;">';
      html+='<div style="font-size:8px;color:'+r[2]+';margin-bottom:4px;">'+r[0]+'</div>';
      html+='<div style="font-size:18px;font-weight:700;color:'+r[2]+';font-family:Space Mono,monospace;">'+(typeof r[1]==='number'?fmtM(r[1]):r[1])+'</div>';
      html+='</div>';
    });
    html+='</div>';

    // ── Desglose quincenal del mes ──
    var ingsMes = ingresos.filter(function(i){ return i.mes===mesCur; });
    var ingQ1 = ingsMes.filter(function(i){ return (i.quincena||'Q1')==='Q1'; });
    var ingQ2 = ingsMes.filter(function(i){ return i.quincena==='Q2'; });
    var montoQ1 = ingQ1.reduce(function(s,i){ return s+(parseFloat(i.monto)||0); },0);
    var montoQ2 = ingQ2.reduce(function(s,i){ return s+(parseFloat(i.monto)||0); },0);
    var missions = JSON.parse(localStorage.getItem('cosmo_missions')||'[]');

    if(ingsMes.length){
      html+='<div style="background:rgba(34,197,94,0.03);border:1px solid rgba(34,197,94,0.12);border-radius:12px;padding:12px;margin-bottom:14px;">';
      html+='<div style="font-size:8px;text-transform:uppercase;letter-spacing:1px;color:#475569;margin-bottom:10px;">📅 Desglose quincenal — '+ml(mesCur)+'</div>';

      // Tabla Q1 / Q2
      html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">';
      [{q:'Q1',monto:montoQ1,regs:ingQ1,color:'#06b6d4'},{q:'Q2',monto:montoQ2,regs:ingQ2,color:'#a855f7'}].forEach(function(qd){
        html+='<div style="background:'+qd.color+'0d;border:1px solid '+qd.color+'22;border-radius:9px;padding:10px;">';
        html+='<div style="font-size:8px;color:'+qd.color+';margin-bottom:4px;">'+qd.q+' · días '+(qd.q==='Q1'?'1–15':'16–31')+'</div>';

          qd.regs.forEach(function(r){
            if(r.cliente) html+='<div style="font-size:8px;color:#475569;margin-top:4px;">👤 '+r.cliente+'</div>';
            if(r.producto) html+='<div style="font-size:8px;color:#475569;margin-top:1px;">📦 '+r.producto+'</div>';

        html+='<div style="width:'+pctQ1+'%;background:#06b6d4;"></div>';
        html+='<div style="width:'+pctQ2+'%;background:#a855f7;"></div>';
        html+='</div>';
      }
      html+='</div>';

    // ── Tabla histórica mes a mes ──

          '<td style="padding:7px 10px;color:'+excColor+';font-weight:700;font-family:Space Mono,monospace;font-size:9px;">'+(totIng>0||totGas>0?fmtM(exc):'—')+'</td>'+

    // ── Margen por producto ──

        html+='<span style="font-size:10px;font-weight:700;color:'+mc+';">'+mg.toFixed(1)+'%</span></div>';
        html+='<div style="height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;"><div style="height:100%;width:'+Math.max(0,Math.min(100,mg))+'%;background:'+mc+';border-radius:3px;"></div></div></div>';
      });
      html+='</div>';
    }

    // ── Donut gastos por categoría ──
    var gastosDelMes=gastos.filter(function(g){return g.fecha&&g.fecha.slice(0,7)===mesCur;});
    if(gastosDelMes.length){
      html+='<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px;margin-bottom:10px;">';

      html+='<canvas id="rent-chart" style="width:100%;height:200px;display:block;"></canvas>';
      html+='</div>';
