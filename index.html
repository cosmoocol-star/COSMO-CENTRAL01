  function calcProgress(m){
    if(!m.tasks.length) return 0;
    return Math.round(m.tasks.filter(function(t){return t.done;}).length / m.tasks.length * 100);
  }

  function buildCatTags(m, mi){
    var cats = m.categories||[];
    var html = '';
    CATEGORIES.forEach(function(cat){
      var active = cats.indexOf(cat.key) !== -1;
      html += '<span onclick="window._togCat('+mi+',\''+cat.key+'\')" style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:9px;cursor:pointer;border:1px solid '+(active?cat.color+'80':'rgba(255,255,255,0.08)')+';background:'+(active?cat.bg:'transparent')+';color:'+(active?cat.color:'#475569')+';transition:all 0.15s;">'+cat.label+'</span>';
    });
    return html;
  }

  function buildCalHTML(mi, ti, isTask, year, month){
    var currentVal = isTask ? missions[mi].tasks[ti].due : missions[mi].due;
    if(!year){ var d = currentVal ? new Date(currentVal+'T12:00:00') : new Date(); year=d.getFullYear(); month=d.getMonth(); }
    var months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    var firstDay = new Date(year,month,1).getDay();
    var daysInMonth = new Date(year,month+1,0).getDate();
    var today = new Date();
    var calId = isTask?'cal-t-'+mi+'-'+ti:'cal-m-'+mi;
    var prev = month===0?{y:year-1,m:11}:{y:year,m:month-1};
    var next = month===11?{y:year+1,m:0}:{y:year,m:month+1};
    var html = '<div style="background:#0f1628;border:1px solid rgba(124,58,237,0.4);border-radius:10px;padding:10px;width:196px;box-shadow:0 8px 32px rgba(0,0,0,0.6);">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
    html += '<button onclick="event.stopPropagation();window._calNav('+mi+','+ti+','+isTask+','+prev.y+','+prev.m+')" style="background:none;border:none;color:#a855f7;cursor:pointer;font-size:16px;line-height:1;">‹</button>';
    html += '<span style="font-size:10px;font-weight:700;color:#e2e8f0;">'+months[month]+' '+year+'</span>';
    html += '<button onclick="event.stopPropagation();window._calNav('+mi+','+ti+','+isTask+','+next.y+','+next.m+')" style="background:none;border:none;color:#a855f7;cursor:pointer;font-size:16px;line-height:1;">›</button>';
    html += '</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:3px;">';
    ['D','L','M','X','J','V','S'].forEach(function(d){ html += '<div style="font-size:8px;color:#475569;padding:2px;">'+d+'</div>'; });
    html += '</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;">';
    for(var i=0;i<firstDay;i++) html+='<div></div>';
    for(var day=1;day<=daysInMonth;day++){
      var ds = year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      var isTod = today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===day;
      var isSel = currentVal===ds;
      html += '<div onclick="event.stopPropagation();window._pickDate('+mi+','+ti+','+isTask+',\''+ds+'\')" style="text-align:center;padding:4px 1px;border-radius:4px;font-size:9px;cursor:pointer;'+(isSel?'background:#7c3aed;color:#fff;font-weight:700;':isTod?'background:rgba(124,58,237,0.25);color:#a855f7;':'color:#94a3b8;')+'">'+day+'</div>';
    }
    html += '</div>';
  html+='<button onclick="event.stopPropagation();window._clearDraftDate()" style="width:100%;margin-top:8px;padding:4px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#475569;font-size:9px;cursor:pointer;">Quitar fecha</button>';
    html += '</div>';
    return html;
  }

  function dateBtn(label, mi, ti, isTask){
    var wrapId = isTask?'calwrap-t-'+mi+'-'+ti:'calwrap-m-'+mi;
    var html = '<div style="position:relative;display:inline-block;">';
    html += '<button onclick="event.stopPropagation();window._toggleCal(\''+wrapId+'\')" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:2px 8px;color:#64748b;font-size:9px;cursor:pointer;">📅 '+label+'</button>';
    html += '<div id="'+wrapId+'" style="position:absolute;top:24px;left:0;z-index:9999;display:none;">'+buildCalHTML(mi,ti,isTask,null,null)+'</div>';
    html += '</div>';
    return html;
  }

  function buildCard(m, mi, isDone){
    var prog = calcProgress(m);
    var sc = STATUS_CFG[m.status]||STATUS_CFG.pending;
    var pc = PRIORITY_CFG[m.priority]||PRIORITY_CFG.med;
    var doneCount = m.tasks.filter(function(t){return t.done;}).length;

    var c = '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;margin-bottom:10px;overflow:visible;position:relative;'+(isDone?'opacity:0.6;':'')+'">';

    // Title row
    c += '<div style="padding:10px 12px 6px;">';
    c += '<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;">';
    c += '<span style="font-size:13px;cursor:pointer;" onclick="window._togMission('+mi+')">'+(m.status==='done'?'🏆':'⚔️')+'</span>';
    c += '<div contenteditable="true" onblur="window._updM('+mi+',\'title\',this.textContent)" style="flex:1;font-size:12px;font-weight:700;outline:none;color:#f1f5f9;">'+m.title+'</div>';
    c += '<span style="font-size:9px;padding:2px 8px;border-radius:20px;background:'+sc.bg+';color:'+sc.color+';border:1px solid '+sc.color+'40;white-space:nowrap;">'+sc.label+'</span>';
    c += '<span style="font-size:10px;color:#475569;cursor:pointer;" onclick="window._togMission('+mi+')">'+(m.collapsed?'▼':'▲')+'</span>';
    c += '</div>';

    // Category tags
    c += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;">'+buildCatTags(m,mi)+'</div>';

    // Meta row
    c += '<div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:6px;">';
    c += '<span style="font-size:9px;padding:1px 8px;border-radius:20px;background:rgba(0,0,0,0.3);color:'+pc.color+';border:1px solid '+pc.color+'30;">'+pc.label+'</span>';
    c += dateBtn(m.due||'sin fecha', mi, -1, false);
    c += '<span style="font-size:9px;color:#64748b;">👤 '+m.owner+'</span>';
    c += '<span style="font-size:9px;color:#475569;">'+doneCount+'/'+m.tasks.length+'</span>';
    c += '</div>';

    // Progress
    c += '<div style="height:4px;background:rgba(255,255,255,0.05);border-radius:2px;">';
    c += '<div style="width:'+prog+'%;height:100%;background:'+sc.color+';border-radius:2px;transition:width 0.4s;"></div></div>';
    c += '<div style="font-size:8px;color:'+sc.color+';text-align:right;margin-top:2px;">'+prog+'%</div>';
    c += '</div>';

    // Controls
    c += '<div style="display:flex;gap:5px;padding:0 12px 8px;flex-wrap:wrap;align-items:center;">';
    // Status
    c += '<select onchange="window._updM('+mi+',\'status\',this.value)" style="background:#0c1220;border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:3px 6px;color:#e2e8f0;font-size:9px;cursor:pointer;">';
    Object.keys(STATUS_CFG).forEach(function(k){ c += '<option value="'+k+'"'+(m.status===k?' selected':'')+'>'+STATUS_CFG[k].label+'</option>'; });
    c += '</select>';
    // Priority
    c += '<select onchange="window._updM('+mi+',\'priority\',this.value)" style="background:#0c1220;border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:3px 6px;color:#e2e8f0;font-size:9px;cursor:pointer;">';
    Object.keys(PRIORITY_CFG).forEach(function(k){ c += '<option value="'+k+'"'+(m.priority===k?' selected':'')+'>'+PRIORITY_CFG[k].label+'</option>'; });
    c += '</select>';
    // Owner
    c += '<select onchange="window._updM('+mi+',\'owner\',this.value)" style="background:#0c1220;border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:3px 6px;color:#e2e8f0;font-size:9px;cursor:pointer;">';
    MEMBERS.forEach(function(mem){ c += '<option value="'+mem+'"'+(m.owner===mem?' selected':'')+'>'+mem+'</option>'; });
    c += '</select>';
    c += '<button onclick="window._delM('+mi+')" style="margin-left:auto;background:none;border:none;color:#334155;cursor:pointer;font-size:12px;padding:2px 6px;" title="Eliminar misión">✕</button>';
    c += '</div>';

    // Reward
    c += '<div style="margin:0 12px 10px;background:rgba(234,179,8,0.06);border:1px solid rgba(234,179,8,0.15);border-radius:8px;padding:7px 10px;">';
    c += '<div style="font-size:8px;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:3px;">🏆 Recompensa</div>';
    c += '<div contenteditable="true" onblur="window._updM('+mi+',\'reward\',this.textContent)" style="font-size:10px;color:#f59e0b;outline:none;line-height:1.4;">'+(m.reward||'Define tu recompensa...')+'</div>';
    c += '</div>';

    // Tasks
    if(!m.collapsed){
      c += '<div style="border-top:1px solid rgba(255,255,255,0.05);padding:8px 12px;">';
      m.tasks.forEach(function(t,ti){
        c += '<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.03);">';
        c += '<div onclick="window._togTask('+mi+','+ti+')" style="width:16px;height:16px;border-radius:4px;border:1.5px solid '+(t.done?'#22c55e':'rgba(255,255,255,0.15)')+';background:'+(t.done?'#22c55e':'transparent')+';display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#fff;font-size:9px;">'+(t.done?'✓':'')+'</div>';
        c += '<div contenteditable="true" onblur="window._updTask('+mi+','+ti+',this.textContent)" style="flex:1;font-size:10px;outline:none;'+(t.done?'text-decoration:line-through;color:#475569;':'color:#cbd5e1;')+'">'+t.text+'</div>';
        c += dateBtn(t.due||'fecha', mi, ti, true);
        c += '<button onclick="window._delTask('+mi+','+ti+')" style="background:none;border:none;color:#334155;cursor:pointer;font-size:10px;padding:0 3px;">✕</button>';
        c += '</div>';
      });
      c += '<button onclick="window._addTask('+mi+')" style="width:100%;margin-top:6px;padding:5px;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.07);border-radius:6px;color:#475569;font-size:10px;cursor:pointer;">+ tarea</button>';
      c += '</div>';
    }
    c += '</div>';
    return c;
  }

  var activeFilter = 'all';

  function renderStats(){
    var statsEl = document.getElementById('missions-stats'); if(!statsEl) return;
    var total = missions.length;
    var done = missions.filter(function(m){return m.status==='done';}).length;
    var active = missions.filter(function(m){return m.status==='active';}).length;
    var launching = missions.filter(function(m){return m.priority==='high'&&m.status!=='done';}).length;
    var totalProg = total ? Math.round(missions.reduce(function(sum,m){return sum+calcProgress(m);},0)/total) : 0;
    statsEl.innerHTML = '<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;">'
      + '<div style="flex:1;min-width:60px;background:rgba(6,182,212,0.08);border:1px solid rgba(6,182,212,0.2);border-radius:8px;padding:7px 10px;text-align:center;">'
      + '<div style="font-size:18px;font-weight:700;color:#06b6d4;">'+active+'</div>'
      + '<div style="font-size:8px;color:#475569;">En curso</div></div>'
      + '<div style="flex:1;min-width:60px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:7px 10px;text-align:center;">'
      + '<div style="font-size:18px;font-weight:700;color:#ef4444;">'+launching+'</div>'
      + '<div style="font-size:8px;color:#475569;">🚀 Lanzar</div></div>'
      + '<div style="flex:1;min-width:60px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:7px 10px;text-align:center;">'
      + '<div style="font-size:18px;font-weight:700;color:#22c55e;">'+done+'</div>'
      + '<div style="font-size:8px;color:#475569;">Completadas</div></div>'
      + '<div style="flex:1;min-width:60px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:8px;padding:7px 10px;text-align:center;">'
      + '<div style="font-size:18px;font-weight:700;color:#f59e0b;">'+totalProg+'%</div>'
      + '<div style="font-size:8px;color:#475569;">Progreso</div></div>'
      + '</div>';
  }

  function renderFilters(){
    var el = document.getElementById('missions-filters'); if(!el) return;
    var html = '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;">';
    var allActive = activeFilter==='all';
    html += '<span id="filt-all" onclick="window._setFilter()" style="padding:3px 10px;border-radius:20px;font-size:9px;cursor:pointer;border:1px solid '+(allActive?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.1)')+';background:'+(allActive?'rgba(255,255,255,0.1)':'transparent')+';color:'+(allActive?'#f1f5f9':'#64748b')+';">Todas</span>';
    CATEGORIES.forEach(function(cat,ci){
      var isAct = activeFilter===cat.key;
      html += '<span id="filt-'+ci+'" onclick="window._setFilter('+ci+')" style="padding:3px 10px;border-radius:20px;font-size:9px;cursor:pointer;border:1px solid '+(isAct?cat.color+'80':'rgba(255,255,255,0.08)')+';background:'+(isAct?cat.bg:'transparent')+';color:'+(isAct?cat.color:'#64748b')+';transition:all 0.15s;">'+cat.label+'</span>';
    });
    html += '</div>';
    el.innerHTML = html;
  }

  function renderCatBars(){
    var el = document.getElementById('missions-catbars'); if(!el) return;
    if(activeFilter !== 'all'){ el.innerHTML=''; return; }
    var html = '<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:10px 12px;margin-bottom:10px;">';
    html += '<div style="font-size:8px;text-transform:uppercase;letter-spacing:1px;color:#475569;margin-bottom:8px;">Progreso por área</div>';
    CATEGORIES.forEach(function(cat){
      var catMissions = missions.filter(function(m){ return (m.categories||[]).indexOf(cat.key)!==-1; });
      if(!catMissions.length) return;
      var avg = Math.round(catMissions.reduce(function(s,m){return s+calcProgress(m);},0)/catMissions.length);
      html += '<div style="margin-bottom:7px;">';
      html += '<div style="display:flex;justify-content:space-between;margin-bottom:3px;">';
      html += '<span style="font-size:9px;color:'+cat.color+';">'+cat.label+'</span>';
      html += '<span style="font-size:9px;color:'+cat.color+';font-family:Space Mono,monospace;">'+avg+'%</span>';
      html += '</div>';
      html += '<div style="height:5px;background:rgba(255,255,255,0.05);border-radius:3px;">';
      html += '<div style="width:'+avg+'%;height:100%;background:'+cat.color+';border-radius:3px;transition:width 0.5s;opacity:0.8;"></div>';
      html += '</div></div>';
    });
    html += '</div>';
    el.innerHTML = html;
  }

  function renderMissions(){
    missions = getMissions(); // always fresh
    var root = document.getElementById('missions-root'); if(!root) return;
    renderStats();
    renderFilters();
    renderCatBars();
    var pOrder = {high:0,med:1,low:2};
    var filtered = activeFilter==='all' ? missions : missions.filter(function(m){ return (m.categories||[]).indexOf(activeFilter)!==-1; });
    var active = filtered.filter(function(m){return m.status!=='done';}).sort(function(a,b){return (pOrder[a.priority]||1)-(pOrder[b.priority]||1);});
    var done   = filtered.filter(function(m){return m.status==='done';});
    var html = '';
    active.forEach(function(m){ html += buildCard(m, missions.indexOf(m), false); });
    root.innerHTML = html;

    // Render completed section separately with more prominence
    var doneEl = document.getElementById('missions-done'); if(!doneEl) return;
    if(!done.length){ doneEl.innerHTML=''; return; }
    var open = localStorage.getItem('cosmo_done_open')==='true';
    var doneHtml = '<div style="margin-top:6px;">';
    doneHtml += '<div onclick="window._togDone()" style="cursor:pointer;background:linear-gradient(135deg,rgba(34,197,94,0.08),rgba(34,197,94,0.04));border:1px solid rgba(34,197,94,0.25);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:12px;">';
    doneHtml += '<div style="width:36px;height:36px;border-radius:50%;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">🏆</div>';
    doneHtml += '<div style="flex:1;">';
    doneHtml += '<div style="font-size:12px;font-weight:700;color:#22c55e;">Misiones completadas</div>';
    doneHtml += '<div style="font-size:9px;color:#475569;margin-top:1px;">'+done.length+' misión'+(done.length>1?'es':'')+' conquistada'+(done.length>1?'s':'')+' · Buen trabajo</div>';
    doneHtml += '</div>';
    // Mini progress bars per done mission
    doneHtml += '<div style="font-size:20px;font-weight:700;color:#22c55e;">'+done.length+'</div>';
    doneHtml += '<span style="font-size:12px;color:#22c55e;">'+(open?'▲':'▼')+'</span>';
    doneHtml += '</div>';
    if(open){
      doneHtml += '<div style="margin-top:8px;">';
      done.forEach(function(m){ doneHtml += buildCard(m, missions.indexOf(m), true); });
      doneHtml += '</div>';
    }
    doneHtml += '</div>';
    doneEl.innerHTML = doneHtml;
  }

  // Calendar controls
  window._toggleCal = function(wrapId){
    // Close all other calendars first
    document.querySelectorAll('[id^="calwrap-"]').forEach(function(el){ if(el.id!==wrapId) el.style.display='none'; });
    var el = document.getElementById(wrapId);
    if(el) el.style.display = el.style.display==='none'?'block':'none';
  };
  window._calNav = function(mi,ti,isTask,year,month){
    var wrapId = isTask?'calwrap-t-'+mi+'-'+ti:'calwrap-m-'+mi;
    var el = document.getElementById(wrapId);
    if(el){ el.innerHTML = buildCalHTML(mi,ti,isTask,year,month); }
  };
  window._pickDate = function(mi,ti,isTask,ds){
    if(isTask){ missions[mi].tasks[ti].due=ds; } else { missions[mi].due=ds; }
    saveM(); renderMissions();
  };

  // Mission controls
  window._togCat = function(mi,key){
    if(!missions[mi].categories) missions[mi].categories=[];
    var idx = missions[mi].categories.indexOf(key);
    if(idx===-1){ missions[mi].categories.push(key); } else { missions[mi].categories.splice(idx,1); }
    saveM(); renderMissions();
  };
  window._setFilter = function(idx){
    if(idx===undefined || idx===null){ activeFilter='all'; }
    else { activeFilter = CATEGORIES[idx] ? CATEGORIES[idx].key : 'all'; }
    renderMissions();
  };
  window._togDone = function(){ localStorage.setItem('cosmo_done_open', localStorage.getItem('cosmo_done_open')!=='true'); renderMissions(); };
  window._togMission = function(mi){ missions[mi].collapsed=!missions[mi].collapsed; saveM(); renderMissions(); };
  window._updM = function(mi,k,v){ missions[mi][k]=(typeof v==='string'?v.trim():v); saveM(); renderMissions(); };
  window._delM = function(mi){ if(window.confirm('Eliminar mision?')){ missions.splice(mi,1); saveM(); renderMissions(); } };

// ── Bidirectional sync: mission status/delete → etapa ──
window.syncMissionToEtapa = function(fromEtapaId, newStatus){
  var rutaRaw = localStorage.getItem('cosmo_metas2026');
  if(!rutaRaw) return;
  var metas = JSON.parse(rutaRaw);
  var changed = false;
  for(var mi=0;mi<metas.length;mi++){
    var etapas=metas[mi].etapas||[];
    for(var ei=0;ei<etapas.length;ei++){
      if(etapas[ei].eid===fromEtapaId){
        if(newStatus==='deleted'){
          metas[mi].etapas.splice(ei,1);
        } else {
          var map={'done':'Completado','active':'En progreso','pending':'Por iniciar','blocked':'Pausado'};
          if(map[newStatus]) metas[mi].etapas[ei].estado=map[newStatus];
        }
        changed=true;
        break;
      }
    }
    if(changed) break;
  }
  if(changed){
    localStorage.setItem('cosmo_metas2026', JSON.stringify(metas));
    // Re-render ruta panel if open
    var rutaPanel = document.getElementById('ruta-etapas-panel');
    if(rutaPanel || document.getElementById('ruta-anual-root')){
      if(typeof window._rutaRender==='function') window._rutaRender();
      else if(typeof render==='function') render();
    }
  }
};

function _sbRenderStats(){
  var missions=sbMissions(), done=missions.filter(function(m){return m.status==='done';});
  var el=sbBody(); if(!el) return;
  var html='<div style="font-size:8px;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:8px;">📊 Áreas más trabajadas</div>';
  SB_CATS_DEF.forEach(function(cat){
    var all=missions.filter(function(m){return (m.categories||[]).indexOf(cat.key)!==-1;}).length;
    var comp=done.filter(function(m){return (m.categories||[]).indexOf(cat.key)!==-1;}).length;
    if(!all) return;
    var pct=Math.round(comp/all*100);
    html+='<div style="margin-bottom:9px;">';
    html+='<div style="display:flex;justify-content:space-between;margin-bottom:3px;">';
    html+='<span style="font-size:9px;color:'+cat.color+';">'+cat.label+'</span>';
    html+='<span style="font-size:9px;color:#64748b;">'+comp+'/'+all+' · '+pct+'%</span></div>';
    html+='<div style="height:6px;background:rgba(255,255,255,0.05);border-radius:3px;">';
    html+='<div style="width:'+pct+'%;height:100%;background:'+cat.color+';border-radius:3px;"></div></div></div>';
  });
  html+='<div style="margin-top:8px;padding:10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;">';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">';
  ['active','pending','blocked','done'].forEach(function(s){
    var n=missions.filter(function(m){return m.status===s;}).length;
    var sc=STAT_CFG[s];
    html+='<div style="background:'+sc.c+'11;border:1px solid '+sc.c+'33;border-radius:6px;padding:5px 8px;text-align:center;">';

window._sbTogTask=function(mi,ti){
  var ms=sbMissions(); if(!ms[mi]||!ms[mi].tasks[ti]) return;
  ms[mi].tasks[ti].done=!ms[mi].tasks[ti].done;
  if(ms[mi].tasks.length&&ms[mi].tasks.every(function(t){return t.done;})&&ms[mi].status!=='done') ms[mi].status='done';
  if(ms[mi].status==='done') ms.forEach(function(m){if(m.unlockedBy===ms[mi].id&&m.status==='blocked')m.status='pending';});

window._detDraft = null;

function _nowStr(){
  var n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

window._detSaveDraft = function(){
  var d=window._detDraft; if(!d) return;
  var ms=sbMissions();
  var orig=ms.find(function(x){return x.id===d.id;});
  if(!orig) return;
  if(!orig.history) orig.history=[];

  // ── Log all changes ──
  var ts=_nowStr();
  function log(msg){ orig.history.push({date:ts,msg:msg}); }

  // Date
  if((orig.due||'')!==(d.due||''))
    log('📅 Fecha: "'+(orig.due||'sin fecha')+'" → "'+(d.due||'sin fecha')+'"');

  // Status
  if((orig.status||'')!==(d.status||'')){
    var SL={pending:'Pendiente',active:'En curso',blocked:'Bloqueada',done:'Completada'};
    log('🔄 Estado: "'+(SL[orig.status]||orig.status)+'" → "'+(SL[d.status]||d.status)+'"');
  }

  // Priority
  if((orig.priority||'')!==(d.priority||'')){
    var PL={high:'🚀 Lanzar',med:'⚡ Avanzar',low:'💤 Esperar'};
    log('⚡ Prioridad: "'+(PL[orig.priority]||orig.priority)+'" → "'+(PL[d.priority]||d.priority)+'"');
  }

  // Owner
  if((orig.owner||'')!==(d.owner||''))
    log('👤 Responsable: "'+(orig.owner||'—')+'" → "'+(d.owner||'—')+'"');

  // Title
  if((orig.title||'').trim()!==(d.title||'').trim())
    log('✏️ Nombre: "'+(orig.title||'—')+'" → "'+(d.title||'—')+'"');

  // Categories
  var origCats=(orig.categories||[]).slice().sort().join(',');
  var newCats=(d.categories||[]).slice().sort().join(',');
  if(origCats!==newCats){
    var added=(d.categories||[]).filter(function(k){return (orig.categories||[]).indexOf(k)===-1;});
    var removed=(orig.categories||[]).filter(function(k){return (d.categories||[]).indexOf(k)===-1;});
    var catMap=SB_CAT_MAP;
    if(added.length) log('🏷 Nodo añadido: '+added.map(function(k){return catMap[k]?catMap[k].label:k;}).join(', '));
    if(removed.length) log('🏷 Nodo quitado: '+removed.map(function(k){return catMap[k]?catMap[k].label:k;}).join(', '));
  }

  // Tasks added/deleted
  var origIds=(orig.tasks||[]).map(function(t){return t.id;});
  var newIds=(d.tasks||[]).map(function(t){return t.id;});
  newIds.forEach(function(id){
    if(origIds.indexOf(id)===-1){
      var t=d.tasks.find(function(x){return x.id===id;});
      if(t) log('✅ Paso añadido: "'+t.text+'"');
    }
  });
  origIds.forEach(function(id){
    if(newIds.indexOf(id)===-1){
      var t=orig.tasks.find(function(x){return x.id===id;});
      if(t) log('🗑 Paso eliminado: "'+t.text+'"');
    }
  });

  // Task reorder
  var origOrder=origIds.filter(function(id){return newIds.indexOf(id)!==-1;});
  var newOrder=newIds.filter(function(id){return origIds.indexOf(id)!==-1;});
  if(origOrder.join(',')!==newOrder.join(','))
    log('↕️ Pasos reordenados');

  // Apply all changes except history
  var savedHistory=orig.history;
  var idx=ms.indexOf(orig);
  ms[idx]=JSON.parse(JSON.stringify(d));
  ms[idx].history=savedHistory;
  delete ms[idx]._calY; delete ms[idx]._calM;

  // Auto-unblock
  if(ms[idx].status==='done'){
    ms.forEach(function(m){if(m.unlockedBy===ms[idx].id&&m.status==='blocked')m.status='pending';});
  }

  sbSave(ms);
  // Sync status back to etapa if linked
  var saved=ms[idx];
  if(saved&&saved.fromEtapa) syncMissionToEtapa(saved.fromEtapa, saved.status);
  window._detDraft=null;
  _SB_VIEW='list'; renderSidebar();
};

function _initTaskDnD(){
  var list = document.getElementById('det-tasks-list');
  if(!list) return;
  var rows = list.querySelectorAll('.det-task-row');
  var dragging = null;

  rows.forEach(function(row){
    row.addEventListener('dragstart', function(e){
      dragging = row;
      setTimeout(function(){ row.style.opacity='0.3'; }, 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', function(){
      row.style.opacity='1';
      list.querySelectorAll('.det-task-row').forEach(function(r){
        r.style.borderTop='';
        r.style.borderBottom='';
        r.style.background='';
      });
      dragging = null;
      // Sync new order to draft
      var newOrder = [];
      list.querySelectorAll('.det-task-row').forEach(function(r){
        var ti = parseInt(r.dataset.ti);
        if(!isNaN(ti) && window._detDraft && window._detDraft.tasks[ti])
          newOrder.push(window._detDraft.tasks[ti]);
      });
      if(window._detDraft) window._detDraft.tasks = newOrder;
      _sbRenderDetail();
    });
    row.addEventListener('dragover', function(e){
      e.preventDefault();
      if(!dragging || dragging===row) return;
      var rect = row.getBoundingClientRect();
      var mid = rect.top + rect.height/2;
      list.querySelectorAll('.det-task-row').forEach(function(r){
        r.style.borderTop=''; r.style.borderBottom='';
      });
      if(e.clientY < mid){
        row.style.borderTop = '2px solid #a855f7';
      } else {
        row.style.borderBottom = '2px solid #a855f7';
      }
    });
    row.addEventListener('dragleave', function(){
      row.style.borderTop=''; row.style.borderBottom='';
    });
    row.addEventListener('drop', function(e){
      e.preventDefault();
      if(!dragging||dragging===row) return;
      var rect = row.getBoundingClientRect();
      var mid = rect.top + rect.height/2;
      if(e.clientY < mid){
        list.insertBefore(dragging, row);
      } else {
        list.insertBefore(dragging, row.nextSibling);
      }
      row.style.borderTop=''; row.style.borderBottom='';
    });
    // Hover show handle
    row.addEventListener('mouseenter', function(){
      var h = row.querySelector('.det-drag-handle');
      if(h) h.style.opacity='1';
    });
    row.addEventListener('mouseleave', function(){
      var h = row.querySelector('.det-drag-handle');
      if(h) h.style.opacity='0.2';
    });
  });
}

  if(typeof initInversiones!=="undefined") window.initInversiones = initInversiones;
  if(typeof updateProdBadge!=="undefined") window.updateProdBadge = updateProdBadge;
  if(typeof updateBillingBadge!=="undefined") window.updateBillingBadge = updateBillingBadge;

  window.notif = notif;
  window.addMember = typeof addMember !== 'undefined' ? addMember : function(){};
  window.addMission = typeof addMission !== 'undefined' ? addMission : function(){};
  window.addEmbajador = typeof addEmbajador !== 'undefined' ? addEmbajador : function(){};
  window.addIdea = typeof addIdea !== 'undefined' ? addIdea : function(){};
  window.initGoals = typeof initGoals !== 'undefined' ? initGoals : function(){};

// ─── VERIFICACIÓN DIARIA ──────────────────────────────────────────────────────
function initVerificacion(){
  var root = document.getElementById('verif-root');
  if(!root) return;

  var hoy = new Date().toISOString().slice(0,10);
  var KEY_DAY  = 'cosmo_verif_' + hoy;
  var KEY_MANT = 'cosmo_verif_mant';
  var KEY_HIST = 'cosmo_verif_hist'; // {date: score}

  // ── CHECKLIST DIARIO (4 ítems CEO) ──
  var CHECKLIST = [
    {id:'gastos',      icon:'💸', titulo:'Registrar Gastos',              desc:'Ingresa todos los gastos del día.',            nodo:'💰 Facturación',        peso:25},
    {id:'satisfaccion',icon:'⭐', titulo:'Satisfacción al Cliente',       desc:'Anota novedades, quejas o felicitaciones.',    nodo:'🌐 Estado General',     peso:25},
    {id:'produccion',  icon:'⚙️', titulo:'Producción por Áreas',          desc:'Actualiza unidades producidas.',               nodo:'⚙️ Inventario & Prod.', peso:25},
    {id:'misiones',    icon:'⚔️', titulo:'Tareas de Misiones',            desc:'Dale check a las tareas completadas hoy.',     nodo:'⚔️ Misiones',           peso:25},
  ];

  // ── RECORDATORIOS PERIÓDICOS (no diarios) ──
  var PERIODICOS_DEFAULT = [
    {id:'ingresos', icon:'📊', nombre:'Registrar Ingresos',      dias:7,  ultimaVez:null},
    {id:'imp',      icon:'🔧', nombre:'Máquinas Impresión',       dias:7,  ultimaVez:null},
    {id:'res',      icon:'🔧', nombre:'Máquinas Resinado',        dias:14, ultimaVez:null},
    {id:'dom',      icon:'🔧', nombre:'Máquinas Doming',          dias:7,  ultimaVez:null},
    {id:'emp',      icon:'🔧', nombre:'Área Empaque',             dias:3,  ultimaVez:null},
  ];

  function loadDay(){ try{ return JSON.parse(localStorage.getItem(KEY_DAY)||'{}'); } catch(e){ return {}; } }
  function saveDay(d){ localStorage.setItem(KEY_DAY, JSON.stringify(d)); }

  function loadPer(){
    try{
      var m = JSON.parse(localStorage.getItem(KEY_MANT)||'null');
      if(m && m.length){
        // Merge: add any default items missing from saved data
        PERIODICOS_DEFAULT.forEach(function(def){
          if(!m.find(function(x){ return x.id===def.id; })){
            m.push(Object.assign({},def));
          }
        });
        return m;
      }
    } catch(e){}
    return PERIODICOS_DEFAULT.map(function(x){ return Object.assign({},x); });
  }
  function savePer(m){ localStorage.setItem(KEY_MANT, JSON.stringify(m)); }

  function loadHist(){ try{ return JSON.parse(localStorage.getItem(KEY_HIST)||'{}'); } catch(e){ return {}; } }
  function saveHist(h){ localStorage.setItem(KEY_HIST, JSON.stringify(h)); }

  function daysDiff(dateStr){
    if(!dateStr) return null;
    return Math.floor((new Date() - new Date(dateStr)) / 86400000);
  }

  function calcScore(d){
    var checks = d.checks || {};
    var done = CHECKLIST.filter(function(c){ return checks[c.id]; });
    return done.reduce(function(a,c){ return a+c.peso; }, 0);
  }

  function calcRacha(hist){
    var racha = 0;
    var d = new Date();
    while(true){
      var key = d.toISOString().slice(0,10);
      if((hist[key]||0) >= 100){ racha++; }
      else if(key === hoy){ break; } // hoy puede no estar completo aún
      else break;
      d.setDate(d.getDate()-1);
    }
    return racha;
  }

  function calcSemanal(hist){
    var total = 0, dias = 0;
    for(var i=0; i<7; i++){
      var d2 = new Date(); d2.setDate(d2.getDate()-i);
      var key = d2.toISOString().slice(0,10);
      if(hist[key] !== undefined){ total += hist[key]; dias++; }
    }
    return dias ? Math.round(total/dias) : 0;
  }

  function render(){
    var d   = loadDay();
    var per = loadPer();
    var hist = loadHist();
    var checks = d.checks || {};

    var score    = calcScore(d);
    var semanal  = calcSemanal(hist);
    var racha    = calcRacha(hist);

    // Save today's score to history
    hist[hoy] = score;
    saveHist(hist);

    var scoreColor  = score>=100?'#34d399':score>=50?'#f59e0b':'#94a3b8';
    var semColor    = semanal>=80?'#34d399':semanal>=50?'#f59e0b':'#ef4444';
    var rachaColor  = racha>=5?'#34d399':racha>=2?'#f59e0b':'#94a3b8';

    // Alertas periódicos vencidos
    var alertas = per.filter(function(p){ var dd=daysDiff(p.ultimaVez); return dd===null||dd>=p.dias; }).length;

    var html = '';

    // ── HEADER ──
    html += '<div style="font-size:10px;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;">📅 '+new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'})+'</div>';

    // ── CUMPLIMIENTO (3 métricas) ──
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;">';

    html += '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px;text-align:center;">';
    html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;line-height:1;color:'+scoreColor+';">'+score+'%</div>';
    html += '<div style="font-size:9px;color:#475569;margin-top:3px;text-transform:uppercase;letter-spacing:1px;">Hoy</div>';
    html += '</div>';

    html += '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px;text-align:center;">';
    html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;line-height:1;color:'+semColor+';">'+semanal+'%</div>';
    html += '<div style="font-size:9px;color:#475569;margin-top:3px;text-transform:uppercase;letter-spacing:1px;">Semana</div>';
    html += '</div>';

    html += '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px;text-align:center;">';
    html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;line-height:1;color:'+rachaColor+';">'+racha+'🔥</div>';
    html += '<div style="font-size:9px;color:#475569;margin-top:3px;text-transform:uppercase;letter-spacing:1px;">Racha</div>';
    html += '</div>';

    html += '</div>';

    // Barra de progreso del día
    html += '<div style="height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:18px;">';
    html += '<div style="width:'+score+'%;height:100%;background:linear-gradient(90deg,#34d399,#06b6d4);border-radius:2px;transition:width 0.4s;"></div>';
    html += '</div>';

    // ── CHECKLIST DIARIO ──
    html += '<div class="sec-lbl">Protocolo Diario CEO</div>';
    html += '<div style="display:flex;flex-direction:column;gap:7px;margin-bottom:18px;">';
    CHECKLIST.forEach(function(item){
      var checked = !!checks[item.id];
      html += '<div onclick="window._verifToggle(\''+item.id+'\')" style="display:flex;align-items:center;gap:12px;background:'+(checked?'rgba(52,211,153,0.05)':'rgba(255,255,255,0.02)')+';border:1px solid '+(checked?'rgba(52,211,153,0.25)':'rgba(255,255,255,0.06)')+';border-radius:10px;padding:11px 14px;cursor:pointer;transition:all 0.2s;">';
      html += '<div style="width:20px;height:20px;border-radius:6px;border:1.5px solid '+(checked?'#34d399':'rgba(255,255,255,0.15)')+';background:'+(checked?'#34d399':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:#000;">'+(checked?'✓':'')+'</div>';
      html += '<div style="flex:1;">';
      html += '<div style="font-size:12px;font-weight:600;color:'+(checked?'#475569':'#e2e8f0')+';'+(checked?'text-decoration:line-through;opacity:0.5;':'')+'">'+item.icon+' '+item.titulo+'</div>';
      html += '<div style="font-size:10px;color:#475569;margin-top:2px;">'+item.desc+'</div>';
      html += '<div style="font-size:9px;color:#1e3a4a;margin-top:2px;">→ '+item.nodo+'</div>';
      html += '</div>';
      html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:13px;color:'+(checked?'#34d399':'#334155')+';">'+item.peso+'%</div>';
      html += '</div>';
    });
    html += '</div>';

    // ── RECORDATORIOS PERIÓDICOS ──
    html += '<div class="sec-lbl">Recordatorios Periódicos'+(alertas>0?' <span style="background:#ef4444;color:#fff;border-radius:10px;padding:1px 6px;font-size:9px;font-family:sans-serif;">'+alertas+'</span>':'')+' </div>';
    html += '<div style="display:flex;flex-direction:column;gap:6px;" id="verif-per-list">';
    per.forEach(function(p, i){
      var dd = daysDiff(p.ultimaVez);
      var vencido = dd===null||dd>=p.dias;
      var porVencer = !vencido && dd>=p.dias-1;
      var restantes = dd===null ? null : p.dias - dd;
      var semaforo = dd===null ? '⚪' : vencido ? '🔴' : porVencer ? '🟡' : '🟢';
      var badgeTxt = dd===null ? 'Sin registro'
        : vencido ? 'Venció hace '+(dd-p.dias)+'d — REVISAR'
        : restantes===1 ? 'Vence mañana'
        : 'Faltan '+restantes+'d';
      var borderC = vencido?'rgba(239,68,68,0.25)':porVencer?'rgba(245,158,11,0.2)':'rgba(255,255,255,0.06)';
      // Icon as text to avoid undefined rendering issues
      var iconMap = {ingresos:'📊', imp:'🔧', res:'🔧', dom:'🔧', emp:'🔧'};
      var iconTxt = iconMap[p.id] || '🔧';
      html += '<div style="background:rgba(255,255,255,0.02);border:1px solid '+borderC+';border-radius:9px;padding:9px 12px;">';
      // Row 1: icon + nombre + semaforo + hecho
      html += '<div style="display:flex;align-items:center;gap:10px;">';
      html += '<span style="font-size:15px;line-height:1;">'+iconTxt+'</span>';
      html += '<div style="flex:1;">';
      html += '<div style="font-size:11px;font-weight:600;color:#e2e8f0;">'+p.nombre+'</div>';
      html += '<div style="font-size:9px;color:#475569;margin-top:1px;">'+semaforo+' '+badgeTxt+'</div>';
      html += '</div>';
      html += '<button onclick="event.stopPropagation();window._verifEditDias('+i+')" style="padding:3px 8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#64748b;font-size:9px;cursor:pointer;white-space:nowrap;" title="Cambiar frecuencia">✏️ '+p.dias+'d</button>';
      html += '<button onclick="event.stopPropagation();window._verifPerHecho('+i+')" style="padding:4px 10px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);border-radius:6px;color:#34d399;font-size:10px;cursor:pointer;white-space:nowrap;">✓ Hecho</button>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';

    // ── BOTÓN GUARDAR DÍA ──
    html += '<div style="margin-top:20px;">';
    html += '<button id="verif-save-btn" onclick="window._verifGuardarDia()" style="width:100%;padding:12px;background:linear-gradient(135deg,rgba(52,211,153,0.15),rgba(6,182,212,0.1));border:1px solid rgba(52,211,153,0.35);border-radius:12px;color:#34d399;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;">';
    html += '💾 Guardar día — '+score+'% completado</button>';
    html += '</div>';

    // ── HISTORIAL ──
    var hist2 = loadHist();
    var histKeys = Object.keys(hist2).filter(function(k){ return k.length===10 && k.indexOf('_saved')===-1; }).sort(function(a,b){ return b.localeCompare(a); }).slice(0,14);
    if(histKeys.length > 0){
      html += '<div class="sec-lbl" style="margin-top:20px;">📅 Historial reciente</div>';
      html += '<div style="display:flex;flex-direction:column;gap:4px;">';
      histKeys.forEach(function(k){
        var sc = hist2[k] || 0;
        var saved = hist2[k+'_saved'] || null;
        var col = sc>=100?'#34d399':sc>=50?'#f59e0b':'#ef4444';
        var barW = Math.min(sc,100);
        var esHoy = k === hoy;
        // Parse checks snapshot if saved
        var checksSnap = saved ? saved.checks : null;
        var checksList = checksSnap ? CHECKLIST.filter(function(c){ return checksSnap[c.id]; }).map(function(c){ return c.icon+' '+c.titulo; }) : [];
        html += '<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:9px;padding:9px 12px;">';
        html += '<div style="display:flex;align-items:center;gap:10px;">';
        html += '<div style="font-size:10px;color:#94a3b8;min-width:80px;">'+k+(esHoy?' <span style="color:#f59e0b;font-size:8px;">HOY</span>':'')+'</div>';
        html += '<div style="flex:1;height:4px;background:rgba(255,255,255,0.05);border-radius:2px;">';
        html += '<div style="width:'+barW+'%;height:100%;background:'+col+';border-radius:2px;transition:width 0.3s;"></div>';
        html += '</div>';
        html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:14px;color:'+col+';min-width:36px;text-align:right;">'+sc+'%</div>';
        if(saved) html += '<span style="font-size:9px;color:#34d399;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);border-radius:4px;padding:1px 5px;">💾</span>';
        html += '</div>';
        if(checksList.length){
          html += '<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px;">';
          checksList.forEach(function(lbl){
            html += '<span style="font-size:9px;color:#475569;background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.12);border-radius:4px;padding:1px 6px;">'+lbl+'</span>';
          });
          html += '</div>';
        }
        html += '</div>';
      });
      html += '</div>';
    }

    root.innerHTML = html;
  }

  window._verifToggle = function(id){
    var d = loadDay();
    d.checks = d.checks||{};
    d.checks[id] = !d.checks[id];
    saveDay(d);
    var hist = loadHist();
    hist[hoy] = calcScore(d);
    saveHist(hist);
    render();
  };

  window._verifPerHecho = function(i){
    var per = loadPer();
    per[i].ultimaVez = hoy;
    savePer(per);
    render();
  };

  window._verifEditDias = function(i){
    var per = loadPer();
    var actual = per[i].dias;
    var nuevo = prompt('¿Cada cuántos días? (actual: '+actual+')', actual);
    if(nuevo && !isNaN(parseInt(nuevo)) && parseInt(nuevo)>0){
      per[i].dias = parseInt(nuevo);
      savePer(per);
      render();
    }
  };

  window._verifGuardarDia = function(){
    var d = loadDay();
    var hist = loadHist();
    var score = calcScore(d);
    hist[hoy] = score;
    // Save full snapshot with checks
    hist[hoy+'_saved'] = { checks: d.checks||{}, score: score, ts: new Date().toISOString() };
    saveHist(hist);
    // Visual feedback
    var btn = document.getElementById('verif-save-btn');
    if(btn){ btn.textContent = '✅ Día guardado — '+score+'%'; btn.style.borderColor='rgba(52,211,153,0.6)'; btn.style.background='linear-gradient(135deg,rgba(52,211,153,0.25),rgba(6,182,212,0.18))'; }
    setTimeout(function(){ render(); }, 800);
  };

  render();
}
window.initVerificacion = initVerificacion;

})();
</script>
</body>
</html>
