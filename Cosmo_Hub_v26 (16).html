    +'<div style="font-size:7px;color:#475569;">progreso</div></div>';
}

function _sbMCard(m, missions){
  var mi=missions.indexOf(m), prog=calcProg(m);
  var sc=STAT_CFG[m.status]||STAT_CFG.pending, pc=PRIO_CFG[m.priority]||PRIO_CFG.med;
  var tasks=m.tasks||[], isBlocked=m.status==='blocked';
  var c='<div style="background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-left:2px solid '+sc.c+';border-radius:10px;padding:9px 10px;margin-bottom:7px;opacity:'+(isBlocked?'0.6':'1')+';">';
  c+='<div style="display:flex;align-items:flex-start;gap:5px;margin-bottom:4px;">';
  c+='<span style="font-size:10px;">'+(isBlocked?'🔒':m.status==='done'?'🏆':'⚔️')+'</span>';
  c+='<div style="flex:1;font-size:10px;font-weight:700;color:#f1f5f9;line-height:1.3;">'+m.title+'</div>';
  c+='<div style="display:flex;gap:3px;flex-shrink:0;">';
  c+='<button data-mi="'+mi+'" onclick="window._sbOpen(parseInt(this.dataset.mi))" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:2px 5px;color:#94a3b8;font-size:9px;cursor:pointer;">↗</button>';
  c+='<button data-mi="'+mi+'" onclick="window._sbDelete(parseInt(this.dataset.mi))" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);border-radius:5px;padding:2px 5px;color:#ef4444;font-size:9px;cursor:pointer;">✕</button>';
  c+='</div></div>';
  var cats=m.categories||[];
  if(cats.length){
    c+='<div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:5px;">';
    cats.forEach(function(k){var cat=SB_CAT_MAP[k];if(cat)c+='<span style="font-size:8px;padding:1px 5px;border-radius:10px;background:'+cat.bg+';color:'+cat.color+';">'+cat.label+'</span>';});
    c+='</div>';
  }
  c+='<div style="height:3px;background:rgba(255,255,255,0.05);border-radius:2px;margin-bottom:3px;">';
  c+='<div style="width:'+prog+'%;height:100%;background:'+sc.c+';border-radius:2px;"></div></div>';
  c+='<div style="display:flex;justify-content:space-between;margin-bottom:4px;">';
  c+='<span style="font-size:8px;color:'+pc.c+';">'+pc.l+'</span>';
  c+='<span style="font-size:8px;color:'+sc.c+';">'+prog+'%</span></div>';
  var expanded=localStorage.getItem('sb_exp_'+m.id)==='true';
  var showTasks=expanded?tasks:tasks.slice(0,4);
  showTasks.forEach(function(t,ti){
    var realTi=tasks.indexOf(t);
    c+='<div data-mi="'+mi+'" data-ti="'+realTi+'" onclick="window._sbTogTask(parseInt(this.dataset.mi),parseInt(this.dataset.ti))" style="display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;">';
    c+='<div style="width:12px;height:12px;border-radius:3px;border:1.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px;'+(t.done?'background:#22c55e;border-color:#22c55e;':'')+'color:#fff;">'+(t.done?'✓':'')+'</div>';
    c+='<span style="'+(t.done?'text-decoration:line-through;color:#475569;':'color:#94a3b8;')+'font-size:9px;flex:1;line-height:1.3;">'+t.text+'</span></div>';
  });
  if(tasks.length>4){
    c+='<button data-id="'+m.id+'" onclick="event.stopPropagation();window._sbTogExpand(this.dataset.id)" style="width:100%;margin-top:3px;padding:2px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:4px;color:#475569;font-size:8px;cursor:pointer;">'+(expanded?'▲ Menos':'▼ +'+(tasks.length-4)+' pasos más')+'</button>';
  }
  // Mostrar la fecha más próxima entre las tareas pendientes
  var _pendingDates = (m.tasks||[]).filter(function(t){return !t.done && t.due;}).map(function(t){return t.due;}).sort();
  if(_pendingDates.length){
    var _nd = _pendingDates[0];
    var _ndDiff = Math.round((new Date(_nd+'T12:00:00') - new Date()) / 86400000);
    var _ndColor = _ndDiff < 0 ? '#ef4444' : _ndDiff <= 1 ? '#f97316' : _ndDiff <= 3 ? '#f59e0b' : '#475569';
    c+='<div style="font-size:8px;color:'+_ndColor+';margin-top:3px;text-align:right;">📅 '+_nd.slice(5)+(_ndDiff<0?' · vencida':_ndDiff===0?' · hoy':_ndDiff===1?' · mañana':'')+'</div>';
  } else if(m.status!=='done'){
    c+='<div style="font-size:8px;color:#334155;margin-top:3px;text-align:right;">📅 Sin fecha</div>';
  }
  c+='</div>';
  return c;
}

function _sbRenderList(){
  var missions=sbMissions();
  var pOrder={high:0,med:1,low:2};

  // ── Filtros ──
  var SB_PRIO_FILTERS=[
    {key:'all',        label:'Todas',     color:'#94a3b8', bg:'rgba(148,163,184,0.1)'},
    {key:'priority:high', label:'🚀 Lanzar',  color:'#ef4444', bg:'rgba(239,68,68,0.12)'},
    {key:'priority:med',  label:'⚡ Avanzar', color:'#f59e0b', bg:'rgba(245,158,11,0.12)'},
    {key:'priority:low',  label:'💤 Esperar', color:'#475569', bg:'rgba(71,85,105,0.1)'},
    {key:'status:active', label:'▶ En curso', color:'#06b6d4', bg:'rgba(6,182,212,0.12)'},
    {key:'status:blocked',label:'🔒 Bloq.',   color:'#ef4444', bg:'rgba(239,68,68,0.1)'},
  ];
  var filterBar='<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.05);">';
  SB_PRIO_FILTERS.forEach(function(f){
    var act=_SB_FILTER===f.key;
    filterBar+='<span data-fk="'+f.key+'" onclick="window._sbSetFilter(this.dataset.fk)" style="padding:2px 8px;border-radius:20px;font-size:8px;cursor:pointer;white-space:nowrap;border:1px solid '+(act?f.color+'99':'rgba(255,255,255,0.08)')+';background:'+(act?f.bg:'transparent')+';color:'+(act?f.color:'#64748b')+';transition:all 0.15s;">'+f.label+'</span>';
  });
  filterBar+='</div>';

  // Aplicar filtro
  var allActive=missions.filter(function(m){return m.status==='active'||m.status==='pending';});
  var allBlocked=missions.filter(function(m){return m.status==='blocked';});
  var allDone=missions.filter(function(m){return m.status==='done';});

  var active, blocked, done;
  if(_SB_FILTER==='all'){
    active=allActive; blocked=allBlocked; done=allDone;
  } else if(_SB_FILTER.indexOf('priority:')===0){
    var pk=_SB_FILTER.replace('priority:','');
    active=allActive.filter(function(m){return m.priority===pk;});
    blocked=allBlocked.filter(function(m){return m.priority===pk;});
    done=allDone.filter(function(m){return m.priority===pk;});
  } else if(_SB_FILTER==='status:active'){
    active=allActive; blocked=[]; done=[];
  } else if(_SB_FILTER==='status:blocked'){
    active=[]; blocked=allBlocked; done=[];
  } else {
    active=allActive; blocked=allBlocked; done=allDone;
  }
  active=active.sort(function(a,b){return (pOrder[a.priority]||1)-(pOrder[b.priority]||1);});

  var el=sbBody(); if(!el) return;
  // ── Contadores por categoría ──
  var catCounts={};
  allActive.forEach(function(m){
    (m.categories||[]).forEach(function(k){ catCounts[k]=(catCounts[k]||0)+1; });
  });
  var catBar='';
  var activeCats=Object.keys(catCounts).filter(function(k){ return catCounts[k]>0; });
  if(activeCats.length){
    catBar='<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;">';
    activeCats.forEach(function(k){
      var cat=SB_CAT_MAP[k]; if(!cat) return;
      catBar+='<span style="font-size:7.5px;padding:1px 6px;border-radius:10px;background:'+cat.bg+';color:'+cat.color+';border:1px solid '+cat.color+'44;">'+cat.label+' <b>'+catCounts[k]+'</b></span>';
    });
    catBar+='</div>';
  }
  var html=catBar+filterBar;
  if(active.length){
    html+='<div style="font-size:8px;text-transform:uppercase;letter-spacing:1px;color:#475569;padding:2px 0 6px;">⚔️ En marcha</div>';
    active.forEach(function(m){html+=_sbMCard(m,missions);});
  }
  if(blocked.length){
    var bOpen=localStorage.getItem('sb_blocked_open')==='true';
    html+='<button onclick="window._sbTogSection(this.dataset.s)" data-s="blocked" style="width:100%;padding:5px 7px;background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15);border-radius:7px;color:#ef4444;font-size:9px;cursor:pointer;display:flex;justify-content:space-between;margin-bottom:6px;">';
    html+='<span>🔒 Bloqueadas ('+blocked.length+')</span><span>'+(bOpen?'▲':'▼')+'</span></button>';
    if(bOpen) blocked.forEach(function(m){html+=_sbMCard(m,missions);});
  }
  if(done.length){
    var dOpen=localStorage.getItem('sb_done_open')==='true';
    html+='<button onclick="window._sbTogSection(this.dataset.s)" data-s="done" style="width:100%;padding:5px 7px;background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.15);border-radius:7px;color:#22c55e;font-size:9px;cursor:pointer;display:flex;justify-content:space-between;margin-bottom:6px;">';
    html+='<span>🏆 Completadas ('+done.length+')</span><span>'+(dOpen?'▲':'▼')+'</span></button>';
    if(dOpen) done.forEach(function(m){html+=_sbMCard(m,missions);});
  }
  if(!active.length && !blocked.length && !done.length){
    html+='<div style="text-align:center;color:#334155;font-size:10px;padding:20px;">Sin misiones'+ (_SB_FILTER!=='all'?' con este filtro':'')+'</div>';
  }
  el.innerHTML=html;
  _sbStats();
  document.getElementById('sidebar-stats').style.display='flex';
}

window._draftTogTaskCal = function(ti){

window._draftPickTaskDate = function(ti, ds){
  if(!window._detDraft||!window._detDraft.tasks[ti]) return;
  window._detDraft.tasks[ti].due = ds;
  // Auto-sync mission due to latest task due
  var dates=window._detDraft.tasks.map(function(t){return t.due;}).filter(Boolean).sort();
  window._detDraft.due = dates.length?dates[dates.length-1]:'';

function _sbRenderStats(){
  var missions=sbMissions(), done=missions.filter(function(m){return m.status==='done';});

  var html='<div style="font-size:8px;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:8px;">📊 Áreas más trabajadas</div>';

    var comp=done.filter(function(m){return (m.categories||[]).indexOf(cat.key)!==-1;}).length;

window._sbTogTask=function(mi,ti){
  var ms=sbMissions(); if(!ms[mi]||!ms[mi].tasks[ti]) return;
  ms[mi].tasks[ti].done=!ms[mi].tasks[ti].done;
  var allDone=ms[mi].tasks.length&&ms[mi].tasks.every(function(t){return t.done;});
  if(allDone && ms[mi].status!=='done') ms[mi].status='done';
  if(!allDone && ms[mi].status==='done') ms[mi].status='active';
  if(ms[mi].status==='done') ms.forEach(function(m){if(m.unlockedBy===ms[mi].id&&m.status==='blocked')m.status='pending';});
  sbSave(ms);
  if(ms[mi]&&ms[mi].fromEtapa) syncMissionToEtapa(ms[mi].fromEtapa, ms[mi].status);
  renderSidebar();
};

window._sbDelete=function(mi){if(!confirm('¿Eliminar?'))return;var ms=sbMissions();ms.splice(mi,1);sbSave(ms);renderSidebar();};

window._detDraft = null;

function _nowStr(){
  var n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');

window._detSaveDraft = function(){
  var d=window._detDraft; if(!d) return;
  var ms=sbMissions();
  var orig=ms.find(function(x){return x.id===d.id;});
  if(!orig) return;
  if(!orig.history) orig.history=[];

  // ── Log all changes ──
  var ts=_nowStr();
  function log(msg){ orig.history.push({date:ts,msg:msg}); }

  // Date
  if((orig.due||'')!==(d.due||''))
    log('📅 Fecha: "'+(orig.due||'sin fecha')+'" → "'+(d.due||'sin fecha')+'"');

  // Status
  if((orig.status||'')!==(d.status||'')){
    var SL={pending:'Pendiente',active:'En curso',blocked:'Bloqueada',done:'Completada'};
    log('🔄 Estado: "'+(SL[orig.status]||orig.status)+'" → "'+(SL[d.status]||d.status)+'"');
  }

  // Priority
  if((orig.priority||'')!==(d.priority||'')){
    var PL={high:'🚀 Lanzar',med:'⚡ Avanzar',low:'💤 Esperar'};
    log('⚡ Prioridad: "'+(PL[orig.priority]||orig.priority)+'" → "'+(PL[d.priority]||d.priority)+'"');
  }

  // Owner
  if((orig.owner||'')!==(d.owner||''))
    log('👤 Responsable: "'+(orig.owner||'—')+'" → "'+(d.owner||'—')+'"');

  // Title
  if((orig.title||'').trim()!==(d.title||'').trim())
    log('✏️ Nombre: "'+(orig.title||'—')+'" → "'+(d.title||'—')+'"');

  // Categories
  var origCats=(orig.categories||[]).slice().sort().join(',');
  var newCats=(d.categories||[]).slice().sort().join(',');
  if(origCats!==newCats){
    var added=(d.categories||[]).filter(function(k){return (orig.categories||[]).indexOf(k)===-1;});
    var removed=(orig.categories||[]).filter(function(k){return (d.categories||[]).indexOf(k)===-1;});
    var catMap=SB_CAT_MAP;
    if(added.length) log('🏷 Nodo añadido: '+added.map(function(k){return catMap[k]?catMap[k].label:k;}).join(', '));
    if(removed.length) log('🏷 Nodo quitado: '+removed.map(function(k){return catMap[k]?catMap[k].label:k;}).join(', '));
  }

  // Tasks added/deleted
  var origIds=(orig.tasks||[]).map(function(t){return t.id;});
  var newIds=(d.tasks||[]).map(function(t){return t.id;});
  newIds.forEach(function(id){
    if(origIds.indexOf(id)===-1){
      var t=d.tasks.find(function(x){return x.id===id;});
      if(t) log('✅ Paso añadido: "'+t.text+'"');
    }
  });
  origIds.forEach(function(id){
    if(newIds.indexOf(id)===-1){
      var t=orig.tasks.find(function(x){return x.id===id;});
      if(t) log('🗑 Paso eliminado: "'+t.text+'"');
    }
  });

  // Task reorder
  var origOrder=origIds.filter(function(id){return newIds.indexOf(id)!==-1;});
  var newOrder=newIds.filter(function(id){return origIds.indexOf(id)!==-1;});
  if(origOrder.join(',')!==newOrder.join(','))
    log('↕️ Pasos reordenados');

  // Apply all changes except history
  var savedHistory=orig.history;
  var idx=ms.indexOf(orig);
  ms[idx]=JSON.parse(JSON.stringify(d));
  ms[idx].history=savedHistory;
  delete ms[idx]._calY; delete ms[idx]._calM;

  // Auto-unblock
  if(ms[idx].status==='done'){
    ms.forEach(function(m){if(m.unlockedBy===ms[idx].id&&m.status==='blocked')m.status='pending';});
  }

  sbSave(ms);
  // Sync status back to etapa if linked
  var saved=ms[idx];
  if(saved&&saved.fromEtapa) syncMissionToEtapa(saved.fromEtapa, saved.status);
  window._detDraft=null;
  _SB_VIEW='list'; renderSidebar();
};

  _SB_VIEW='list'; renderSidebar();
};

// Draft mutators - update draft in memory, re-render
window._draftPickDate = function(ds){
  if(!window._detDraft) return;
  window._detDraft.due=ds||'';
  window._detDraft._calY=null; window._detDraft._calM=null;
  _sbRenderDetail();
};
window._draftCalNav = function(dir){
  if(!window._detDraft) return;
  var today=new Date();
  var cy=window._detDraft._calY||today.getFullYear();
  var cm=(window._detDraft._calM!==undefined&&window._detDraft._calM!==null)?window._detDraft._calM:today.getMonth();
  cm+=dir; if(cm<0){cm=11;cy--;} if(cm>11){cm=0;cy++;}
  window._detDraft._calY=cy; window._detDraft._calM=cm;
  _sbRenderDetail();
};
window._draftTogCat = function(key){
  if(!window._detDraft) return;
  // Single select - if already selected deselect, else replace
  var cur=window._detDraft.categories||[];
  window._detDraft.categories = (cur.length===1&&cur[0]===key) ? [] : [key];
  _sbRenderDetail();
};
window._draftAddTask = function(){
  if(!window._detDraft) return;
  if(!window._detDraft.tasks) window._detDraft.tasks=[];
  window._detDraft.tasks.push({id:'t'+Date.now(),text:'Nuevo paso',done:false,due:''});

    if(ii.length){ ii[ii.length-1].focus(); ii[ii.length-1].select(); }

window._draftDelTask = function(ti){

  window._detDraft.tasks.splice(ti,1);
  _sbRenderDetail();
};
window._draftUpdTask = function(ti,v){
  if(window._detDraft&&window._detDraft.tasks[ti]) window._detDraft.tasks[ti].text=v;
};
window._draftTogTask = function(ti){
  if(!window._detDraft||!window._detDraft.tasks[ti]) return;
  window._detDraft.tasks[ti].done=!window._detDraft.tasks[ti].done;
  _sbRenderDetail();
};
window._draftMoveTask = function(ti,dir){
  if(!window._detDraft) return;
  var t=window._detDraft.tasks, ni=ti+dir;
  if(ni<0||ni>=t.length) return;
  var tmp=t[ti]; t[ti]=t[ni]; t[ni]=tmp;
  _sbRenderDetail();
};
window._draftTeamReward = function(mem,v){
  if(!window._detDraft) return;
  if(!window._detDraft.teamRewards) window._detDraft.teamRewards={};
  window._detDraft.teamRewards[mem]=v;
};
window._draftSetUnlock = function(depId){
  if(!window._detDraft) return;
  window._detDraft.unlockedBy=depId||null;
  window._detDraft.status=depId?'blocked':(window._detDraft.status==='blocked'?'pending':window._detDraft.status);
};
window._detTogHist = function(id){
  var k='sb_hist_'+id;
  localStorage.setItem(k,localStorage.getItem(k)!=='true');
  _sbRenderDetail();
};
function _initTaskDnD(){
  var list = document.getElementById('det-tasks-list');
  if(!list) return;
  var rows = list.querySelectorAll('.det-task-row');
  var dragging = null;

  rows.forEach(function(row){
    row.addEventListener('dragstart', function(e){
      dragging = row;
      setTimeout(function(){ row.style.opacity='0.3'; }, 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', function(){
      row.style.opacity='1';
      list.querySelectorAll('.det-task-row').forEach(function(r){
        r.style.borderTop='';
        r.style.borderBottom='';
        r.style.background='';
      });
      dragging = null;
      // Sync new order to draft
      var newOrder = [];
      list.querySelectorAll('.det-task-row').forEach(function(r){
        var ti = parseInt(r.dataset.ti);
        if(!isNaN(ti) && window._detDraft && window._detDraft.tasks[ti])
          newOrder.push(window._detDraft.tasks[ti]);
      });
      if(window._detDraft) window._detDraft.tasks = newOrder;
      _sbRenderDetail();
    });
    row.addEventListener('dragover', function(e){
      e.preventDefault();
      if(!dragging || dragging===row) return;
      var rect = row.getBoundingClientRect();
      var mid = rect.top + rect.height/2;
      list.querySelectorAll('.det-task-row').forEach(function(r){
        r.style.borderTop=''; r.style.borderBottom='';
      });
      if(e.clientY < mid){
        row.style.borderTop = '2px solid #a855f7';
      } else {
        row.style.borderBottom = '2px solid #a855f7';
      }
    });
    row.addEventListener('dragleave', function(){
      row.style.borderTop=''; row.style.borderBottom='';
    });
    row.addEventListener('drop', function(e){
      e.preventDefault();
      if(!dragging||dragging===row) return;
      var rect = row.getBoundingClientRect();
      var mid = rect.top + rect.height/2;
      if(e.clientY < mid){
        list.insertBefore(dragging, row);
      } else {
        list.insertBefore(dragging, row.nextSibling);
      }
      row.style.borderTop=''; row.style.borderBottom='';
    });
    // Hover show handle
    row.addEventListener('mouseenter', function(){
      var h = row.querySelector('.det-drag-handle');
      if(h) h.style.opacity='1';
    });
    row.addEventListener('mouseleave', function(){
      var h = row.querySelector('.det-drag-handle');
      if(h) h.style.opacity='0.2';
    });
  });
}

// ANÁLISIS 48H — Sistema de evaluación de contenido publicado
// ══════════════════════════════════════════════════════════════════
var _cnt48Key     = 'cosmo_cnt_analisis48';
var _cntPostsKey  = 'cosmo_ideas_pool';

function _cnt48Load(){ try{ return JSON.parse(localStorage.getItem(_cnt48Key)||'{}'); }catch(e){ return {}; } }
function _cnt48Save(d){ localStorage.setItem(_cnt48Key, JSON.stringify(d)); }

function _getIdeasPublicadas(){
  try{
    var ideas = JSON.parse(localStorage.getItem(_cntPostsKey)||'[]');
    return ideas.filter(function(i){ return i.estado==='publicado' && i.tsPublicado; });
  }catch(e){ return []; }
}

function _getCnt48Alertas(){
  var publicadas = _getIdeasPublicadas();
  var analisis   = _cnt48Load();
  var ahora      = Date.now();
  var alertas    = [];
  publicadas.forEach(function(idea){
    var a = analisis[idea.id] || {};
    var horasTransc = idea.tsPublicado ? Math.floor((ahora - idea.tsPublicado)/3600000) : 0;
    if(horasTransc >= 48 && !a.calificacion){
      alertas.push({ idea:idea, horas:horasTransc });
    }
  });
  return alertas.sort(function(a,b){ return b.horas - a.horas; });
}

function _updateCntBadges(){
  var alertas = _getCnt48Alertas();
  var n = alertas.length;

  // Badge en tab ANÁLISIS
  var badge = document.getElementById('cnt-analisis48-badge');
  if(badge){
    badge.style.display = n>0 ? 'flex' : 'none';
    badge.textContent   = n;
  }

  // Badge en nodo content — delegado a renderAlertasHub para evitar doble conteo
  if(typeof renderAlertasHub === 'function') renderAlertasHub();

  // Widget en núcleo — contenido
  var cntNucleoEl = document.getElementById('cnt-nucleo-analisis');
  var cntNucleoOk = document.getElementById('cnt-nucleo-ok');
  if(cntNucleoEl){
    if(n>0){
      cntNucleoEl.style.display = 'block';
      cntNucleoEl.innerHTML     = '📊 '+n+' pieza'+(n>1?'s':'')+' publicada'+(n>1?'s':'')+' esperan análisis (+48h)';
    } else {
      cntNucleoEl.style.display = 'none';
    }
  }
  if(cntNucleoOk){
    var totalPub = _getIdeasPublicadas().length;
    if(!totalPub){
      cntNucleoOk.innerHTML = 'Sin contenido publicado aún';
      cntNucleoOk.style.color = '#334155';
    } else if(n===0){
      cntNucleoOk.innerHTML = '✅ Todo analizado · '+totalPub+' publicada'+(totalPub>1?'s':'');
      cntNucleoOk.style.color = '#22c55e';
    } else {
      cntNucleoOk.innerHTML = totalPub+' publicadas en total';
      cntNucleoOk.style.color = '#475569';
    }
  }
}

function renderAnalisis48(){
  var el = document.getElementById('content-analisis48'); if(!el) return;
  var publicadas = _getIdeasPublicadas();
  var analisis   = _cnt48Load();
  var ahora      = Date.now();

  var h = '';

  // Header
  h += '<div style="background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.15);border-radius:12px;padding:12px 14px;margin-bottom:14px;">';
  h += '<div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#f59e0b;margin-bottom:3px;">📊 Análisis de Contenido · 48h</div>';
  h += '<div style="font-size:10px;color:#475569;line-height:1.6;">Después de 48 horas de publicada una pieza, registra sus métricas reales de Instagram y TikTok. Esto te permite identificar qué tipo de contenido genera más impacto.</div>';
  h += '</div>';

  if(!publicadas.length){
    h += '<div style="text-align:center;padding:40px 0;color:#334155;font-size:11px;">No hay piezas publicadas aún.<br><span style="font-size:9px;display:block;margin-top:4px;">Marca una idea como <strong style="color:#22c55e;">Publicado</strong> desde el tab IDEAS para que aparezca aquí.</span></div>';
    el.innerHTML = h;
    _updateCntBadges();
    return;
  }

  // Separar: pendientes de análisis vs ya evaluadas
  var pendientes = publicadas.filter(function(i){
    var horasTransc = Math.floor((ahora - i.tsPublicado)/3600000);
    return horasTransc >= 48 && !(analisis[i.id]||{}).calificacion;
  });
  var enEspera = publicadas.filter(function(i){
    var horasTransc = Math.floor((ahora - i.tsPublicado)/3600000);
    return horasTransc < 48;
  });
  var evaluadas = publicadas.filter(function(i){
    return (analisis[i.id]||{}).calificacion;
  });

  // ── PENDIENTES DE ANÁLISIS ──
  if(pendientes.length){
    h += '<div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#f59e0b;margin-bottom:8px;">⚠️ Requieren análisis ('+pendientes.length+')</div>';
    pendientes.forEach(function(idea){
      var a = analisis[idea.id] || {};
      var horas = Math.floor((ahora - idea.tsPublicado)/3600000);
      h += _buildAnalisisCard(idea, a, horas, false);
    });
  }

  // ── EN ESPERA (< 48h) — estilo Gestión de Pedidos ──
  if(enEspera.length){
    if(pendientes.length) h += '<div style="height:1px;background:rgba(255,255,255,0.05);margin:12px 0;"></div>';
    enEspera.forEach(function(idea){
      var horas    = Math.floor((ahora - idea.tsPublicado)/3600000);
      var horasRest= 48 - horas;
      var pct      = Math.min(100, Math.round(horas/48*100));
      var tsPubl   = new Date(idea.tsPublicado);
      var tsLabel  = tsPubl.toLocaleDateString('es-CO',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
      var PILARES  = {resultado:'✨',proceso:'⚙️',comunidad:'🤝',educacion:'💡'};
      var pIcon    = PILARES[idea.pilar]||'📄';

      h += '<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(244,114,182,0.12);border-radius:12px;padding:14px;margin-bottom:10px;">';

      // Header
      h += '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">';
      h += '<div style="flex:1;min-width:0;">';
      h += '<div style="font-size:12px;font-weight:600;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+pIcon+' '+(idea.titulo||'Sin título')+'</div>';
      if(idea.tipo||idea.formato) h += '<div style="font-size:9px;color:#475569;margin-top:2px;">'+(idea.tipo||'')+(idea.formato?' · '+idea.formato:'')+'</div>';
      h += '<div style="font-size:9px;color:#475569;margin-top:2px;">Publicado: '+tsLabel+'</div>';
      h += '</div>';
      // Contador horas restantes (igual que Pedidos)
      h += '<div style="text-align:right;flex-shrink:0;margin-left:12px;">';
      h += '<div style="font-size:9px;color:#475569;">Disponible en</div>';
      h += '<div style="font-family:Space Mono,monospace;font-size:22px;color:#f472b6;font-weight:700;line-height:1.1;">'+horasRest+'h</div>';
      h += '</div>';
      h += '<button onclick="window._cnt48DeleteIdea(\''+idea.id+'\')" title="Quitar" style="background:none;border:none;color:#334155;cursor:pointer;font-size:14px;line-height:1;padding:0 2px;flex-shrink:0;align-self:flex-start;" onmouseover="this.style.color=\'#ef4444\'" onmouseout="this.style.color=\'#334155\'">✕</button>';
      h += '</div>';

      // Barra de progreso (idéntica a Pedidos)
      h += '<div style="margin-bottom:8px;">';
      h += '<div style="display:flex;justify-content:space-between;font-size:8px;color:#334155;margin-bottom:4px;"><span>Período de espera (48h)</span><span>'+horas+'h / 48h</span></div>';
      h += '<div style="height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;">';
      h += '<div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#f472b6,#c084fc);border-radius:3px;"></div>';
      h += '</div></div>';

      h += '<div style="font-size:9px;color:#334155;text-align:center;">En '+horasRest+' horas podrás verificar las métricas alcanzadas.</div>';
      h += '</div>';
    });
  }

  // ── YA EVALUADAS ──
  if(evaluadas.length){
    h += '<div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#22c55e;margin-bottom:8px;margin-top:12px;">✅ Evaluadas ('+evaluadas.length+')</div>';
    evaluadas.forEach(function(idea){
      var a = analisis[idea.id] || {};
      var horas = Math.floor((ahora - idea.tsPublicado)/3600000);
      h += _buildAnalisisCard(idea, a, horas, true);
    });
  }

  el.innerHTML = h;

  // Bind botones guardar
  el.querySelectorAll('.btn-cnt48-guardar').forEach(function(btn){
    btn.addEventListener('click', function(){
      window._cnt48Guardar(this.dataset.ideaId);

function _buildAnalisisCard(idea, a, horas, yaEvaluado){
  // Determinar redes según plataforma de la idea
  var plat = idea.plataforma || 'ig';
  var REDES_ACTIVAS = plat==='ig' ? ['instagram'] : plat==='tt' ? ['tiktok'] : ['instagram','tiktok'];
  var ES_AMBAS = plat==='both';

  var RED_CFG = {
    instagram:{ icon:'📸', label:'Instagram', color:'rgba(225,48,108,0.15)', border:'rgba(225,48,108,0.3)', text:'#f472b6' },
    tiktok:   { icon:'🎵', label:'TikTok',    color:'rgba(0,242,234,0.08)', border:'rgba(0,242,234,0.2)', text:'#06b6d4' },
  };

  // Métricas comunes a ambas redes
  var METRICAS_COMUNES = [
    {key:'alcance',    label:'Alcance/Vistas', icon:'👁'},
    {key:'likes',      label:'Likes',          icon:'❤️'},
    {key:'comentarios',label:'Comentarios',    icon:'💬'},
    {key:'guardados',  label:'Guardados',      icon:'🔖'},
    {key:'compartidos',label:'Compartidos',    icon:'↗️'},
    {key:'dms',        label:'DMs recibidos',  icon:'✉️'},
    {key:'clicks',     label:'Clicks al link', icon:'🔗'},
  ];

  var CAL_OPCIONES = [
    {v:'excelente', l:'Excelente', c:'#22c55e', i:'🔥'},
    {v:'bueno',     l:'Bueno',     c:'#06b6d4', i:'👍'},
    {v:'regular',   l:'Regular',   c:'#f59e0b', i:'😐'},
    {v:'malo',      l:'Malo',      c:'#ef4444', i:'👎'},
  ];

  var PILARES = {resultado:'✨',proceso:'⚙️',comunidad:'🤝',educacion:'💡'};
  var pIcon = PILARES[idea.pilar]||'📄';
  var platLabel = plat==='ig'?'📸 Instagram':plat==='tt'?'🎵 TikTok':'📸🎵 Instagram + TikTok';

  var h = '';
  h += '<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:13px;margin-bottom:10px;">';

  // Header
  h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">';
  h += '<div style="flex:1;min-width:0;">';
  h += '<div style="font-size:12px;font-weight:600;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+pIcon+' '+(idea.titulo||'Sin título')+'</div>';
  h += '<div style="font-size:9px;color:#475569;margin-top:1px;">'+platLabel+(idea.formato?' · '+idea.formato:'')+'</div>';
  h += '</div>';
  h += '<span style="font-size:9px;color:#475569;white-space:nowrap;">+'+horas+'h publicado</span>';
  h += '<button onclick="window._cnt48DeleteIdea(\''+idea.id+'\')" title="Quitar de análisis" style="background:none;border:none;color:#334155;cursor:pointer;font-size:14px;line-height:1;padding:0 2px;flex-shrink:0;" onmouseover="this.style.color=\'#ef4444\'" onmouseout="this.style.color=\'#334155\'">✕</button>';
  if(yaEvaluado){
    var cal = CAL_OPCIONES.find(function(c){ return c.v===a.calificacion; })||{};
    h += '<span style="padding:2px 8px;border-radius:10px;font-size:9px;border:1px solid '+(cal.c||'#475569')+'33;background:'+(cal.c||'#475569')+'18;color:'+(cal.c||'#475569')+';white-space:nowrap;">'+(cal.i||'')+' '+(cal.l||a.calificacion)+'</span>';
  }
  h += '</div>';

  if(yaEvaluado){
    // ── RESUMEN POST-EVALUACIÓN ──
    if(ES_AMBAS){
      // Mostrar comparativa lado a lado
      var tieneAlguna = REDES_ACTIVAS.some(function(red){
        var rm = (a.redes||{})[red]||{};
        return METRICAS_COMUNES.some(function(m){ return rm[m.key]; });
      });
      if(tieneAlguna){
        h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;">';
        REDES_ACTIVAS.forEach(function(red){
          var rm  = (a.redes||{})[red]||{};
          var cfg = RED_CFG[red];
          h += '<div style="background:'+cfg.color+';border:1px solid '+cfg.border+';border-radius:8px;padding:8px;">';
          h += '<div style="font-size:9px;color:'+cfg.text+';font-weight:600;margin-bottom:6px;">'+cfg.icon+' '+cfg.label+'</div>';
          METRICAS_COMUNES.forEach(function(m){
            if(!rm[m.key]) return;
            h += '<div style="display:flex;justify-content:space-between;padding:2px 0;"><span style="font-size:8px;color:#475569;">'+m.icon+' '+m.label+'</span><span style="font-family:Space Mono,monospace;font-size:9px;color:#e2e8f0;font-weight:700;">'+Number(rm[m.key]).toLocaleString()+'</span></div>';
          });
          h += '</div>';
        });
        h += '</div>';
      }
    } else {
      // Una sola red
      var red = REDES_ACTIVAS[0];
      var rm  = (a.redes||{})[red]||{};
      var cfg = RED_CFG[red];
      var tieneMetricas = METRICAS_COMUNES.some(function(m){ return rm[m.key]; });

window._cnt48SelCal = function(ideaId, cal){
  ['excelente','bueno','regular','malo'].forEach(function(c){
    var btn = document.getElementById('cal48-'+ideaId+'-'+c);
    if(!btn) return;
    var colors = {excelente:'#22c55e',bueno:'#06b6d4',regular:'#f59e0b',malo:'#ef4444'};
    var col = colors[c];
    var sel = c===cal;
    btn.style.borderColor = sel ? col : col+'33';
    btn.style.background  = sel ? col+'20' : 'transparent';
  });
  if(!window._cnt48CalSel) window._cnt48CalSel = {};
  window._cnt48CalSel[ideaId] = cal;
};

window._cnt48Guardar = function(ideaId){
  var cal = (window._cnt48CalSel||{})[ideaId];
  if(!cal){
    alert('Selecciona una calificación editorial antes de guardar.');
    return;
  }
  // Leer redes activas desde el data attribute de la card
  var card = document.querySelector('[data-idea-id="'+ideaId+'"],[data-redes]');
  // Buscar el contenedor con data-redes
  var allCards = document.querySelectorAll('[data-redes]');
  var redesActivas = ['instagram','tiktok'];
  allCards.forEach(function(c){
    // Encontrar la card que contiene el botón de este ideaId
    if(c.querySelector('#cnt48-nota-'+ideaId)){
      redesActivas = c.dataset.redes.split(',');
    }
  });

  var METRICAS_KEYS = ['alcance','likes','comentarios','guardados','compartidos','dms','clicks'];
  var d = _cnt48Load();
  d[ideaId] = d[ideaId] || {};
  d[ideaId].calificacion = cal;
  d[ideaId].ts = Date.now();
  d[ideaId].redes = {};
  redesActivas.forEach(function(red){
    d[ideaId].redes[red] = {};
    METRICAS_KEYS.forEach(function(mk){
      var inp = document.getElementById('cnt48-'+ideaId+'-'+red+'-'+mk);
      var val = inp ? parseInt(inp.value)||0 : 0;
      if(val) d[ideaId].redes[red][mk] = val;
    });
  });
  var nota = document.getElementById('cnt48-nota-'+ideaId);
  d[ideaId].nota = nota ? nota.value.trim() : '';
  _cnt48Save(d);
  renderAnalisis48();
};

window._cnt48ResetEval = function(ideaId){
  var d = _cnt48Load();
  if(d[ideaId]) delete d[ideaId].calificacion;
  _cnt48Save(d);
  renderAnalisis48();
};

window._cnt48DeleteIdea = function(ideaId){
  // Remove from ideas pool published state
  var pool = JSON.parse(localStorage.getItem('cosmo_ideas_pool')||'[]');
  var idx = pool.findIndex(function(x){ return x.id===ideaId; });
  if(idx !== -1){
    // Remove the idea entirely from the pool
    pool.splice(idx, 1);
    localStorage.setItem('cosmo_ideas_pool', JSON.stringify(pool));
  }
  // Also remove its analisis data
  var d = _cnt48Load();
  if(d[ideaId]) delete d[ideaId];
  _cnt48Save(d);
  renderAnalisis48();
  // Update badges
  if(window._updateCntBadges) window._updateCntBadges();
};

  // Intercepta TODAS las escrituras a localStorage y genera eventos de auditoría
  // Funciona aunque las funciones de cada módulo sean closures privados
  var _auditPrevState = {};

  // Snapshot inicial del estado actual
  (function(){
    var keysToWatch = [
      'cosmo_missions','cosmo_prod_meta','cg_gastos','cg_ingresos',
      'cosmo_verif_hist','cosmo_verif_mant','cosmo_inversiones',
      'cosmo_biblioteca','cosmo_metas2026','cosmo_embajadores',
      'cosmo_pedidos_v2','cosmo_ideas_pool','cosmo_meta_mensual'
    ];
    keysToWatch.forEach(function(k){
      var v = localStorage.getItem(k);
      if(v) _auditPrevState[k] = v;
    });
  })();

  var _auditSetItem = localStorage.setItem.bind(localStorage);
  localStorage.setItem = function(key, value){
    var prev = _auditPrevState[key];
    _auditSetItem(key, value);

    // Solo auditar keys de datos relevantes
    if(!key.startsWith('cosmo_') && !key.startsWith('cg_')) return;
    if(key === _AUDIT_LOCAL_KEY) return; // no auditarse a sí mismo
    if(key.startsWith('prod_open_') || key === 'cosmo_done_open' || key === 'cosmo_costos_mes') return;

    try{
      // ── Producción: cierre de día ──
      if(/^cosmo_prod_\d{4}-\d{2}-\d{2}$/.test(key)){
        var curr = JSON.parse(value||'{}');
        var prevObj = prev ? JSON.parse(prev) : {};
        if(curr._saved && !prevObj._saved){
          _auditLog('cerrar día','Producción',
            'Día '+key.replace('cosmo_prod_',''),
            undefined,
            'Imp:'+curr.impresion+' Cort:'+curr.corte+' Res:'+curr.resinado+' Emp:'+curr.empaque);
        } else if(!curr._saved && prevObj._saved){
          _auditLog('reset','Producción','Día '+key.replace('cosmo_prod_','')+'  reabierto');
        } else if(prev && curr._saved){
          // Edición de valores individuales
          ['impresion','corte','resinado','empaque'].forEach(function(k){
            if(curr[k]!==prevObj[k])
              _auditLog('editar','Producción','Etapa '+k+' · '+key.slice(-10), prevObj[k]||0, curr[k]||0);
          });
        }
        _auditPrevState[key] = value;
        return;
      }

      // ── Producción meta (insumos, meta diaria) ──
      if(key === 'cosmo_prod_meta'){
        var currM = JSON.parse(value||'{}');
        var prevM = prev ? JSON.parse(prev) : {};
        // Meta diaria
        if(currM._metaDiaria !== prevM._metaDiaria)
          _auditLog('cambiar','Producción','Meta diaria', prevM._metaDiaria||100, currM._metaDiaria||100);
        // Insumos: detectar borrados y cambios de stock
        ['impresion','corte','resinado','empaque'].forEach(function(ek){
          var prevIns = (prevM[ek]||{}).insumos||[];
          var currIns = (currM[ek]||{}).insumos||[];
          if(prevIns.length > currIns.length){
            _auditLog('eliminar','Producción','Insumo eliminado en etapa '+ek);
          }
          currIns.forEach(function(ins, ii){
            var prevIn = prevIns[ii];
            if(prevIn && ins.stock !== prevIn.stock)
              _auditLog('editar','Producción','Stock '+ins.name, prevIn.stock, ins.stock);
            if(prevIn && ins.consumo !== prevIn.consumo)
              _auditLog('editar','Producción','Consumo/día '+ins.name, prevIn.consumo, ins.consumo);
          });
        });
        _auditPrevState[key] = value;
        return;
      }

      // ── Misiones ──
      if(key === 'cosmo_missions'){
        var currMs = JSON.parse(value||'[]');
        var prevMs = prev ? JSON.parse(prev) : [];
        // Misión nueva creada
        if(currMs.length > prevMs.length){
          var prevMsIds = prevMs.map(function(m){ return m.id; });
          currMs.forEach(function(m){
            if(prevMsIds.indexOf(m.id)===-1)
              _auditLog('crear','Misiones','Misión: "'+m.title+'" · prioridad '+m.priority);
          });
        }
        // Detectar misión eliminada
        if(currMs.length < prevMs.length){
          var currIds = currMs.map(function(m){ return m.id; });
          prevMs.forEach(function(m){
            if(currIds.indexOf(m.id)===-1)
              _auditLog('eliminar','Misiones','Misión: '+m.title);
          });
        }
        // Detectar cambios de status y tareas
        currMs.forEach(function(m){
          var prevM2 = prevMs.find(function(p){ return p.id===m.id; });
          if(prevM2 && prevM2.status !== m.status)
            _auditLog(m.status==='done'?'completar':m.status==='active'?'reactivar':'cambiar estado',
              'Misiones', m.title, prevM2.status, m.status);
          if(prevM2 && m.tasks){
            m.tasks.forEach(function(t, ti){
              var prevT = (prevM2.tasks||[])[ti];
              if(prevT && prevT.done !== t.done)
                _auditLog(t.done?'completar tarea':'revertir tarea','Misiones',
                  '"'+t.text.slice(0,50)+'" en "'+m.title+'"');

          });
        } else {

              _auditLog('editar','Facturación','Gasto "'+( g.descripcion||g.tipo||'')+'"', '$'+prevG2.monto, '$'+g.monto);
            else if((g.descripcion||'') !== (prevG2.descripcion||''))

          // Publicación (aparece link por primera vez)
          currIdeas.forEach(function(i){
            var prevI = prevIdeas.find(function(x){ return x.id===i.id; });
            if(prevI && !prevI.link && i.link)
              _auditLog('publicar','Contenido','"'+(i.titulo||'Sin título')+'" · '+i.link.slice(0,40));
          });
        } catch(e){}
        _auditPrevState[key] = value;
        return;
      }

      // ── Meta mensual ──
      if(key === 'cosmo_meta_mensual'){
        _auditLog('cambiar','Facturación','Meta mensual', prev ? '$'+prev : 'sin dato', '$'+value);
        _auditPrevState[key] = value;
        return;
      }

    } catch(e){ /* silencioso */ }

    _auditPrevState[key] = value;
  };

  window.notif = notif;
  window.addMember = typeof addMember !== 'undefined' ? addMember : function(){};
  window.addMission = typeof addMission !== 'undefined' ? addMission : function(){};
  window.addEmbajador = typeof addEmbajador !== 'undefined' ? addEmbajador : function(){};
  window.addIdea = typeof addIdea !== 'undefined' ? addIdea : function(){};
  window.initGoals = typeof initGoals !== 'undefined' ? initGoals : function(){};

  var CHECKLIST = [

  ];

    {id:'ingresos', icon:'📊', nombre:'Registrar Ingresos',      dias:7,  ultimaVez:null},
    {id:'imp',      icon:'🔧', nombre:'Máquinas Impresión',       dias:7,  ultimaVez:null},
    {id:'res',      icon:'🔧', nombre:'Máquinas Resinado',        dias:14, ultimaVez:null},
    {id:'dom',      icon:'🔧', nombre:'Máquinas Doming',          dias:7,  ultimaVez:null},
    {id:'emp',      icon:'🔧', nombre:'Área Empaque',             dias:3,  ultimaVez:null},
  ];

  function loadDay(){ try{ return JSON.parse(localStorage.getItem(KEY_DAY)||'{}'); } catch(e){ return {}; } }
  function saveDay(d){ localStorage.setItem(KEY_DAY, JSON.stringify(d)); }

  function loadPer(){
    try{
      var m = JSON.parse(localStorage.getItem(KEY_MANT)||'null');
      if(m && m.length){
        // Merge: add any default items missing from saved data
        PERIODICOS_DEFAULT.forEach(function(def){
          if(!m.find(function(x){ return x.id===def.id; })){
            m.push(Object.assign({},def));
          }
        });
        return m;
      }
    } catch(e){}
    return PERIODICOS_DEFAULT.map(function(x){ return Object.assign({},x); });
  }
  function savePer(m){ localStorage.setItem(KEY_MANT, JSON.stringify(m)); }

  function loadHist(){ try{ return JSON.parse(localStorage.getItem(KEY_HIST)||'{}'); } catch(e){ return {}; } }
  function saveHist(h){ localStorage.setItem(KEY_HIST, JSON.stringify(h)); }

  function daysDiff(dateStr){
    if(!dateStr) return null;
    return Math.floor((new Date() - new Date(dateStr)) / 86400000);
  }

  function calcScore(d){
    var checks = d.checks || {};
    var done = CHECKLIST.filter(function(c){ return checks[c.id]; });
    return done.reduce(function(a,c){ return a+c.peso; }, 0);
  }

  function calcRacha(hist){
    var racha = 0;
    var d = new Date();
    while(true){
      var key = d.toISOString().slice(0,10);
      if((hist[key]||0) >= 100){ racha++; }
      else if(key === hoy){ break; } // hoy puede no estar completo aún
      else break;
      d.setDate(d.getDate()-1);
    }
    return racha;
  }

  function calcSemanal(hist){
    var total = 0, dias = 0;
    for(var i=0; i<7; i++){
      var d2 = new Date(); d2.setDate(d2.getDate()-i);
      var key = d2.toISOString().slice(0,10);
      if(hist[key] !== undefined){ total += hist[key]; dias++; }
    }
    return dias ? Math.round(total/dias) : 0;
  }

    var racha    = calcRacha(hist);

    var allHistKeys = Object.keys(hist2).filter(function(k){ return k.length===10 && k.indexOf('_saved')===-1; });
    var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-90);
    var cutoffStr = cutoff.toISOString().slice(0,10);
    var viejasKeys = allHistKeys.filter(function(k){ return k < cutoffStr; });
    if(viejasKeys.length > 0){
      html += '<div style="margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.05);">';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">';
      html += '<div>';
      html += '<div style="font-size:9px;color:#475569;font-weight:600;">🗄️ Historial antiguo</div>';
      html += '<div style="font-size:8px;color:#334155;margin-top:2px;">'+viejasKeys.length+' entradas de más de 90 días</div>';
      html += '</div>';
      html += '<button onclick="window._verifArchivar()" style="padding:5px 12px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:7px;color:#fbbf24;font-size:9px;font-weight:600;cursor:pointer;">📥 Exportar y limpiar</button>';
      html += '</div></div>';
    }

    root.innerHTML = html;
  }

  window._verifToggle = function(id){
    var d = loadDay();
    d.checks = d.checks||{};
    d.checks[id] = !d.checks[id];
    saveDay(d);
    var hist = loadHist();
    hist[hoy] = calcScore(d);
    saveHist(hist);
    render();
  };

  window._verifPerHecho = function(i){
    var per = loadPer();
    per[i].ultimaVez = hoy;
    savePer(per);
    render();
  };

  window._verifEditDias = function(i){
    var per = loadPer();
    var actual = per[i].dias;
    var nuevo = prompt('¿Cada cuántos días? (actual: '+actual+')', actual);
    if(nuevo && !isNaN(parseInt(nuevo)) && parseInt(nuevo)>0){
      per[i].dias = parseInt(nuevo);
      savePer(per);
      render();
    }
  };

  window._verifEditPer = function(i){
    var form = document.getElementById('verif-per-edit-'+i);
    if(!form) return;
    form.style.display = form.style.display==='none' ? 'block' : 'none';
  };

  window._verifSaveEditPer = function(i){
    var per = loadPer();
    var nEl = document.getElementById('verif-per-edn-'+i);
    var iEl = document.getElementById('verif-per-edi-'+i);
    var dEl = document.getElementById('verif-per-edd-'+i);
    if(!nEl||!dEl) return;
    var nombre = nEl.value.trim();
    var icon = iEl ? iEl.value.trim() : (per[i].icon||'🔧');
    var dias = parseInt(dEl.value);
    if(!nombre || !dias || dias<1) return;
    per[i].nombre = nombre;
    per[i].icon = icon || '🔧';
    per[i].dias = dias;
    savePer(per);
    render();
  };

  window._verifDelPer = function(i){
    if(!confirm('¿Eliminar este recordatorio?')) return;
    var per = loadPer();
    per.splice(i, 1);
    savePer(per);
    render();
  };

  window._verifAddPerForm = function(){
    var form = document.getElementById('verif-add-per-form');
    if(!form) return;
    form.style.display = form.style.display==='none' ? 'block' : 'none';
    if(form.style.display==='block'){
      var inp = document.getElementById('new-per-nombre');
      if(inp) inp.focus();
    }
  };

  window._verifSaveNewPer = function(){
    var nombre = (document.getElementById('new-per-nombre')||{}).value||'';
    var icon = (document.getElementById('new-per-icon')||{}).value||'🔧';
    var dias = parseInt((document.getElementById('new-per-dias')||{}).value||'0');
    nombre = nombre.trim();
    icon = icon.trim()||'🔧';
    if(!nombre || !dias || dias<1){ alert('Escribe nombre y frecuencia en días.'); return; }
    var per = loadPer();
    per.push({ id: 'custom_'+Date.now(), icon: icon, nombre: nombre, dias: dias, ultimaVez: null });
    savePer(per);
    render();
  };

  window._verifArchivar = function(){
    var hist = loadHist();
    var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-90);
    var cutoffStr = cutoff.toISOString().slice(0,10);

    // Separar entradas viejas (incluyendo sus _saved)
    var archivo = {};
    var conservar = {};
    Object.keys(hist).forEach(function(k){
      var fecha = k.replace('_saved','');
      if(fecha < cutoffStr){
        archivo[k] = hist[k];
      } else {
        conservar[k] = hist[k];
      }
    });

    var viejas = Object.keys(archivo).filter(function(k){ return k.length===10 && k.indexOf('_saved')===-1; });
    if(viejas.length===0){ alert('No hay entradas de más de 90 días.'); return; }

    if(!confirm('Se exportarán '+viejas.length+' entradas (hasta '+cutoffStr+') a un archivo JSON y se borrarán del Hub.\n\n¿Continuar?')) return;

    // Descargar archivo
    var nombreArchivo = 'verif_hist_hasta_'+cutoffStr+'.json';
    var blob = new Blob([JSON.stringify(archivo, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = nombreArchivo;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // Guardar solo entradas recientes
    saveHist(conservar);

    // Feedback
    setTimeout(function(){ render(); }, 300);
  };

  window._verifDelDia = function(dateKey){
    if(!window.confirm('¿Borrar el registro del día '+dateKey+'?')) return;
    var hist = loadHist();
    var scoreAntes = hist[dateKey];
    delete hist[dateKey];
    delete hist[dateKey+'_saved'];
    saveHist(hist);
    var dayKey = 'cosmo_verif_'+dateKey;
    // Borrar localmente
    _origRemoveItem(dayKey);
    _origRemoveItem('__ts_'+dayKey);
    // Marcador de borrado para que el otro dispositivo lo detecte via onSnapshot
    hubFbSave(dayKey, '__DELETED__');
    if(typeof _auditLog==='function') _auditLog('eliminar','Verificación','Día borrado: '+dateKey, scoreAntes+'%', 'eliminado');
    render();
  };

  window._verifGuardarDia = function(){
    var score = calcScore(d);
    hist[hoy] = score;
    // Save full snapshot with checks
    hist[hoy+'_saved'] = { checks: d.checks||{}, score: score, ts: new Date().toISOString() };
    saveHist(hist);
    // Visual feedback
    var btn = document.getElementById('verif-save-btn');
    if(btn){ btn.textContent = '✅ Día guardado — '+score+'%'; btn.style.borderColor='rgba(52,211,153,0.6)'; btn.style.background='linear-gradient(135deg,rgba(52,211,153,0.25),rgba(6,182,212,0.18))'; }
    setTimeout(function(){ render(); }, 800);
  };

  render();
}
window.initVerificacion = initVerificacion;

})();
</script>

};

window._bibOpenAddDoc = function(){
